
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ardahlia Lore Files</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:         #0a0c14;
  --surface:    #0f1219;
  --surface2:   #151920;
  --surface3:   #1a1f2b;
  --border:     rgba(180,100,80,0.12);
  --border-mid: rgba(180,100,80,0.24);
  --border-hi:  rgba(180,100,80,0.48);
  --gold:       #a88050;
  --gold-lt:    #c9a070;
  --copper:     #b8683a;
  --copper-dim: #8b4a25;
  --txt:        #e8dcc8;
  --txt2:       #a89878;
  --txt3:       #5a4a38;
  --font-d: 'Cinzel Decorative', Georgia, serif;
  --font-h: 'Cinzel', Georgia, serif;
  --font-b: 'Crimson Pro', Georgia, serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(60,90,140,0.35) 0%, transparent 100%),
    radial-gradient(ellipse 60% 50% at 100% 110%, rgba(120,60,40,0.20) 0%, transparent 100%);
  background-attachment: fixed;
  color: var(--txt);
  font-family: var(--font-b);
  font-size: 16px;
  min-height: 100vh;
}

/* ── star field ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,240,.85) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,255,240,.55) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,255,240,.40) 1px, transparent 1px);
  background-size: 400px 400px, 250px 250px, 170px 170px;
  background-position: 23px 47px, 130px 200px, 60px 310px;
  opacity: 0.2;
}

/* ── page shell ── */
.page {
  position: relative;
  z-index: 1;
  max-width: 1060px;
  margin: 0 auto;
  padding: 0 1.5rem 5rem;
}

/* ── site header ── */
.hdr {
  text-align: center;
  padding: 3.2rem 0 2.4rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 3.5rem;
}
.hdr-orn {
  display: block;
  font-size: 11px;
  letter-spacing: 0.5em;
  color: var(--gold);
  opacity: 0.55;
  margin-bottom: 1rem;
}
.hdr-title {
  font-family: var(--font-d);
  font-size: clamp(1.7rem, 4vw, 2.7rem);
  font-weight: 700;
  color: var(--gold-lt);
  letter-spacing: 0.04em;
  line-height: 1.1;
  text-shadow: 0 0 50px rgba(210,160,60,0.28), 0 1px 0 rgba(0,0,0,0.6);
}
.hdr-sub {
  font-family: var(--font-b);
  font-size: 1rem;
  font-style: italic;
  color: var(--txt2);
  margin-top: 0.6rem;
  letter-spacing: 0.05em;
}
.hdr-intro {
  font-family: var(--font-b);
  font-size: 1rem;
  color: var(--txt2);
  max-width: 560px;
  margin: 1.2rem auto 0;
  line-height: 1.7;
}

/* ── section ── */
.section {
  margin-bottom: 3.5rem;
}

.sec-header {
  display: flex;
  align-items: baseline;
  gap: 0.9rem;
  margin-bottom: 1.25rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px solid var(--border);
}
.sec-title {
  font-family: var(--font-h);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.sec-rule {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.sec-tag {
  font-family: var(--font-h);
  font-size: 8.5px;
  letter-spacing: 0.12em;
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid transparent;
  white-space: nowrap;
}

/* section accent themes */
.sec-world  .sec-title { color: var(--gold); }
.sec-world  .sec-rule  { background: linear-gradient(to right, rgba(168,128,80,0.3), transparent); }

.sec-c2     .sec-title { color: #9a7a6a; }
.sec-c2     .sec-rule  { background: linear-gradient(to right, rgba(154,122,106,0.3), transparent); }
.sec-c2     .sec-tag   { background: rgba(154,122,106,0.12); color: #b8967a; border-color: rgba(154,122,106,0.3); }

.sec-c3     .sec-title { color: #b8a080; }
.sec-c3     .sec-rule  { background: linear-gradient(to right, rgba(184,160,128,0.3), transparent); }
.sec-c3     .sec-tag   { background: rgba(184,160,128,0.12); color: #d4b890; border-color: rgba(184,160,128,0.3); }

/* archive section */
.archive-toggle {
  display: flex;
  align-items: baseline;
  gap: 0.9rem;
  margin-bottom: 1.25rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px solid var(--border);
  background: transparent;
  border: none;
  color: inherit;
  font-family: inherit;
  cursor: pointer;
  width: 100%;
  transition: opacity 0.2s ease;
}

.archive-toggle:hover {
  opacity: 0.8;
}

.archive-title {
  font-family: var(--font-h);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--txt2);
}

.archive-rule {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.archive-chevron {
  font-size: 11px;
  color: var(--txt2);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}

.archive-toggle.open .archive-chevron {
  transform: rotate(90deg);
}

.archive-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.archive-toggle.open ~ .archive-content {
  max-height: 1200px;
}

/* ── card grid ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 0.85rem;
}

/* ── doc card ── */
.doc-card {
  display: block;
  text-decoration: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem 1.35rem;
  transition: all 0.18s ease;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.doc-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.18s;
}
.doc-card:hover {
  background: var(--surface2);
  transform: translateY(-2px);
}
.doc-card:hover::before { opacity: 1; }

/* world card accent */
.card-world { border-color: var(--border); }
.card-world::before { background: linear-gradient(to right, transparent, var(--gold), transparent); }
.card-world:hover { border-color: rgba(168,128,80,0.3); box-shadow: 0 6px 30px rgba(168,128,80,0.08); }

/* c2 card accent */
.card-c2::before { background: linear-gradient(to right, transparent, #9a7a6a, transparent); }
.card-c2:hover { border-color: rgba(154,122,106,0.3); box-shadow: 0 6px 30px rgba(154,122,106,0.08); }

/* c3 card accent */
.card-c3::before { background: linear-gradient(to right, transparent, #c9a070, transparent); }
.card-c3:hover { border-color: rgba(201,160,112,0.3); box-shadow: 0 6px 30px rgba(201,160,112,0.1); }

/* card innards */
.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 0.6rem;
  gap: 0.5rem;
}
.card-icon {
  font-size: 18px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0.7;
}
.card-arrow {
  font-size: 12px;
  color: var(--txt3);
  flex-shrink: 0;
  margin-top: 4px;
  transition: transform 0.18s, color 0.18s;
  font-family: var(--font-h);
  letter-spacing: 0.05em;
}
.doc-card:hover .card-arrow {
  color: var(--txt2);
  transform: translateX(3px);
}

.card-title {
  font-family: var(--font-h);
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: var(--txt);
  line-height: 1.25;
  flex: 1;
  margin: 0 0.5rem;
}
/* accent on hover per section */
.card-world:hover .card-title { color: var(--gold-lt); }
.card-c2:hover    .card-title { color: #b8967a; }
.card-c3:hover    .card-title { color: #d4b890; }

.card-desc {
  font-family: var(--font-b);
  font-size: 13.5px;
  color: var(--txt2);
  line-height: 1.55;
  padding-left: 2px;
}

/* ── ornamental footer ── */
.orn {
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--txt3);
  padding: 2rem 0 0;
  border-top: 1px solid var(--border);
  margin-top: 1rem;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SECTIONS = [
  {
    id: 'world',
    label: 'World Lore',
    tag: null,
    theme: 'world',
    docs: [
      {
        icon: '✦',
        title: 'Pantheon',
        desc: 'Quick-reference sheet for all 26 deities of Ardahlia — alignment, domain, patron type, and core identity at a glance.',
        href: 'Auroran_Pantheon.html',
      },
      {
        icon: '☽',
        title: 'Deity Lore',
        desc: 'Full narrative entries for each deity: origin, theology, folk practices, and place in the divine order.',
        href: 'pantheon-players_1.html',
      },
      {
        icon: '◎',
        title: 'Calendar',
        desc: 'The Ardahlian calendar: months, seasons, named festivals, and how time is reckoned across the empire.',
        href: 'ardahlia-calendar.html',
      },
      {
        icon: '✿',
        title: 'Folk Worship',
        desc: 'How ordinary Ardahlians practise religion day-to-day — household shrines, folk rites, and regional devotion.',
        href: 'ardahlia_folk_polytheism_matrix.html',
      },
      {
        icon: '⊛',
        title: 'Day Name Reference',
        desc: 'The names and divine associations of the days of the Ardahlian week.',
        href: 'ardahlian_day_names.html',
      },
    ],
  },
  {
    id: 'c3',
    label: 'Campaign 3',
    tag: 'Upcoming',
    theme: 'c3',
    docs: [
      {
        icon: '⟁',
        title: 'Campaign 3 Primer',
        desc: 'Everything new players need before the first session — the world, the stakes, and the questions Campaign 3 begins with.',
        href: 'Campaign3_PlayerPrimer.html',
      },
      {
        icon: '∴',
        title: 'Auroran Religious Strata',
        desc: 'The layered religious culture of the Auroran Empire: the state faith, hidden folk devotions, and the faultlines between them.',
        href: 'auroran_religious_strata.html',
      },
      {
        icon: '◉',
        title: 'Location Guide',
        desc: "A traveller's guide to the five regions of the Auroran Empire — cities, settlements, waterways, and the territories beyond the frontier.",
        href: 'player-location-guide.html',
      },
    ],
  },
];

const ARCHIVED_SECTIONS = [
  {
    id: 'c2',
    label: 'Campaign 2',
    tag: 'Closed',
    theme: 'c2',
    docs: [
      {
        icon: '⬡',
        title: 'The Lore of the Codex',
        desc: 'The history and significance of the Codex — what it is, where it came from, and why it sits at the heart of Campaign 2.',
        href: 'archive/campaign2/codex_lore.html',
      },
      {
        icon: '◈',
        title: 'The Eclipse Sigil',
        desc: 'Mechanics and mythology of the Eclipse Sigil artifact: its five principles, the Eclipse Strain, and the burden it carries.',
        href: 'archive/campaign2/eclipse-sigil.html',
      },
      {
        icon: '⊕',
        title: 'The Final Use',
        desc: 'Lore for the three resolution paths of the Eclipse Sigil — The Seal, The Banishment, and The Restoration.',
        href: 'archive/campaign2/the-eclipse-sigil-final-use.html',
      },
      {
        icon: '✧',
        title: 'Campaign 2 Epilogue Guide',
        desc: 'A planning guide for player epilogues: arc reflection prompts, closing tone choices, and what to bring for final character send-offs.',
        href: 'archive/campaign2/Campaign2_Epilogue_Guide.html',
      },
    ],
  },
];

function DocCard({ doc, theme }) {
  return (
    <a className={`doc-card card-${theme}`} href={doc.href}>
      <div className="card-top">
        <span className="card-icon">{doc.icon}</span>
        <span className="card-title">{doc.title}</span>
        <span className="card-arrow">→</span>
      </div>
      <p className="card-desc">{doc.desc}</p>
    </a>
  );
}

function Section({ section }) {
  return (
    <div className={`section sec-${section.theme}`}>
      <div className="sec-header">
        <span className="sec-title">{section.label}</span>
        {section.tag && <span className="sec-tag">{section.tag}</span>}
        <span className="sec-rule" />
      </div>
      <div className="card-grid">
        {section.docs.map(doc => (
          <DocCard key={doc.href} doc={doc} theme={section.theme} />
        ))}
      </div>
    </div>
  );
}

function Archive({ sections }) {
  const [isOpen, setIsOpen] = React.useState(false);
  
  return (
    <div className="section">
      <button 
        className={`archive-toggle${isOpen ? ' open' : ''}`}
        onClick={() => setIsOpen(!isOpen)}
      >
        <span className="archive-title">Archived Campaigns</span>
        <span className="archive-rule" />
        <span className="archive-chevron">▶</span>
      </button>
      {isOpen && (
        <div className="archive-content">
          {sections.map(section => (
            <Section key={section.id} section={section} />
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  return (
    <div className="page">
      <header className="hdr">
        <span className="hdr-orn">✦  ·  ✦  ·  ✦</span>
        <div className="hdr-title">Ardahlia Lore Files</div>
        <div className="hdr-sub">A living archive of the world of the campaign</div>
        <p className="hdr-intro">
          Select a document below to explore the history, faith, and lore of Ardahlia.
          World lore is open to all; campaign-specific entries are for players currently in that arc.
        </p>
      </header>

      {SECTIONS.map(s => <Section key={s.id} section={s} />)}
      
      <Archive sections={ARCHIVED_SECTIONS} />

      <div className="orn">✦ · ✦ · ✦</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
