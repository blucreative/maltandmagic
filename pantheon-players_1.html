function SectionBlock({ s }) {
  if (s.items) {
    return React.createElement('div', {className:'section'},
      React.createElement('div', {className:'section-label'}, s.label),
      React.createElement('ul', {className:'section-list'},
        s.items.map((item,i) =>
          React.createElement('li', {key:i},
            React.createElement('div', {className:'li-bar'}),
            React.createElement('div', {className:'li-content'},
              item.title
                ? React.createElement('span', null,
                    React.createElement('strong', null, item.title),
                    item.text ? ' — ' + item.text : ''
                  )
                : React.createElement('span', null, item.text || '')
            )
          )
        )
      )
    );
  }
  return React.createElement('div', {className:'section'},
    React.createElement('div', {className:'section-label'}, s.label),
    React.createElement('div', {className:'section-text'}, s.text)
  );
}

function DeityCard({ d, open, onToggle, sidebarRef }) {
  const cardRef = useRef(null);
  useEffect(() => {
    if (open && cardRef.current) {
      const sideEl = sidebarRef.current?.querySelector(`[data-id="${d.id}"]`);
      if (sideEl) sideEl.scrollIntoView({ block:'nearest', behavior:'smooth' });
    }
  }, [open]);

  return React.createElement('div', {
    id: 'card-' + d.id,
    ref: cardRef,
    className: 'deity-card' + (open ? ' open' : ''),
    onClick: onToggle
  },
    React.createElement('div', {className:'card-header'},
      React.createElement('div', {
        className:'card-accent',
        style:{ background: DOMAIN_COLOUR[d.domain] }
      }),
      React.createElement('div', {className:'card-main'},
        React.createElement('div', {className:'card-name-row'},
          React.createElement('div', {className:'card-name'}, d.name),
          React.createElement('div', {className:'card-alias'}, d.alias)
        ),
        React.createElement('div', {className:'card-tags'},
          React.createElement('span', {className:'ctag ctag-align'}, d.alignFull),
          React.createElement('span', {className:`ctag ctag-domain ${d.domain}`}, DOMAIN_LABELS[d.domain]),
          React.createElement('span', {className:`ctag ctag-patron ${d.patron}`}, PATRON_LABELS[d.patron])
        )
      ),
      React.createElement('div', {className:'card-chevron'}, '▼')
    ),
    open && React.createElement('div', {className:'card-body', onClick:e=>e.stopPropagation()},
      React.createElement('div', {className:'card-overview'}, d.overview),
      React.createElement('div', {className:'sections'},
        d.sections.map((s,i) => React.createElement(SectionBlock, {key:i, s}))
      )
    )
  );
}

function App() {
  const [openId, setOpenId] = useState(null);
  const [search, setSearch] = useState('');
  const [dFilt, setDFilt] = useState(null);
  const [aFilt, setAFilt] = useState(null);
  const [pFilt, setPFilt] = useState(null);
  const sidebarRef = useRef(null);

  const toggle = (id) => {
    setOpenId(prev => {
      const next = prev === id ? null : id;
      if (next) {
        setTimeout(() => {
          document.getElementById('card-' + next)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
        }, 60);
      }
      return next;
    });
  };

  const filtered = useMemo(() => DEITIES.filter(d => {
    if (dFilt && d.domain !== dFilt) return false;
    if (aFilt && d.align !== aFilt) return false;
    if (pFilt && d.patron !== pFilt) return false;
    if (search) {
      const q = search.toLowerCase();
      return d.name.toLowerCase().includes(q) || d.alias.toLowerCase().includes(q) ||
             d.alignFull.toLowerCase().includes(q) ||
             DOMAIN_LABELS[d.domain].toLowerCase().includes(q) ||
             PATRON_LABELS[d.patron].toLowerCase().includes(q);
    }
    return true;
  }), [search, dFilt, aFilt, pFilt]);

  const filteredIds = new Set(filtered.map(d => d.id));

  const pill = (label, val, setFn, current, cls) =>
    React.createElement('button', {
      className: `pill ${cls} ${current === val ? 'on ' + cls : ''}`,
      onClick: e => { e.stopPropagation(); setFn(current === val ? null : val); }
    }, label);

  // sidebar groups: Good / Neutral / Evil columns
  const sidebarDeities = DEITIES.filter(d => filteredIds.has(d.id));

  const domainGroups = [
    { label:'Knowledge', key:'know' }, { label:'Life', key:'life' },
    { label:'Light', key:'light' }, { label:'Trickery', key:'trick' },
    { label:'War', key:'war' }, { label:'Pestilence', key:'pest' },
  ];

  return React.createElement(React.Fragment, null,

    // masthead
    React.createElement('div', {className:'masthead'},
      React.createElement('div', {className:'masthead-eyebrow'}, 'Ardahlia'),
      React.createElement('h1', null, 'Gods of the World'),
      React.createElement('div', {className:'masthead-sub'},
        'Twenty-six deities  ·  Six domains  ·  Five patron types'
      )
    ),

    // filter bar
    React.createElement('div', {className:'filter-bar'},
      React.createElement('div', {className:'filter-bar-inner'},
        React.createElement('div', {className:'search-box'},
          React.createElement('span', {className:'search-icon'}, '⌕'),
          React.createElement('input', {
            className:'filter-search', type:'text',
            placeholder:'Search…', value:search,
            onChange:e => setSearch(e.target.value)
          })
        ),
        React.createElement('div', {className:'vr'}),
        React.createElement('div', {className:'pill-group'},
          ...['know','life','light','trick','war','pest'].map(k =>
            pill(DOMAIN_LABELS[k], k, setDFilt, dFilt, k)
          )
        ),
        React.createElement('div', {className:'vr'}),
        React.createElement('div', {className:'pill-group'},
          ...['lg','ln','ng','nn','cg','cn','le','ne','ce'].map(k =>
            pill(k.toUpperCase(), k, setAFilt, aFilt, k)
          )
        ),
        React.createElement('div', {className:'vr'}),
        React.createElement('div', {className:'pill-group'},
          ...['arch','cel','fnd','goo','ves'].map(k =>
            pill(PATRON_LABELS[k], k, setPFilt, pFilt, k)
          )
        ),
        React.createElement('span', {className:'count-label'},
          filtered.length === 26 ? '26 deities' : `${filtered.length} / 26`
        )
      )
    ),

    // main layout
    React.createElement('div', {className:'layout'},

      // sidebar
      React.createElement('aside', {className:'sidebar', ref:sidebarRef},
        domainGroups.map(dg => {
          const members = sidebarDeities.filter(d => d.domain === dg.key);
          if (!members.length) return null;
          return React.createElement('div', {className:'sidebar-group', key:dg.key},
            React.createElement('div', {className:'sidebar-group-label'}, dg.label),
            members.map(d =>
              React.createElement('div', {
                key:d.id,
                'data-id':d.id,
                className:'sidebar-item' + (openId === d.id ? ' active' : ''),
                onClick:e => { e.stopPropagation(); toggle(d.id); }
              },
                React.createElement('div', {
                  className:'sidebar-dot',
                  style:{ background: DOMAIN_COLOUR[d.domain] }
                }),
                React.createElement('div', {className:'sidebar-name'}, d.name)
              )
            )
          );
        })
      ),

      // card list
      React.createElement('div', {className:'card-list'},
        filtered.length === 0
          ? React.createElement('div', {className:'empty-state'}, 'No deities match those filters')
          : filtered.map(d =>
              React.createElement(DeityCard, {
                key:d.id, d,
                open: openId === d.id,
                onToggle: () => toggle(d.id),
                sidebarRef
              })
            )
      )
    ),

    // appendix
    React.createElement('div', {className:'appendix-wrap'},
      React.createElement('div', {className:'appendix'},
        React.createElement('div', {className:'appendix-eyebrow'}, 'Appendix'),
        React.createElement('div', {className:'appendix-title'}, 'On the Nature of the Two Darknesses'),
        React.createElement('div', {className:'appendix-source'},
          'From The Divided Void, author unknown, date unknown. Copy held in the Chrono Sanctum, acquisition date unrecorded.'
        ),
        React.createElement('p', null, 'The error most commonly made by those who study the old darkness is the assumption that Nocturna and Nyx are the same entity in different aspects, or that one is a diminished form of the other, or that they are sisters in any sense that implies equality of origin.'),
        React.createElement('p', null, 'They are not the same. They are not aspects. They are not sisters. They are what happened when one thing became two.'),
        React.createElement('p', null, 'Before light there was the Primordial Dark — not darkness as we understand it, which is defined by the absence of light, but darkness as a primary condition, a substance with properties of its own. When the first light came, it did not simply illuminate the darkness. It divided it. The part of the darkness that met the light and was changed by the encounter became Nyx. The part of the darkness that felt the light coming and chose to step back from it became Nocturna.'),
        React.createElement('p', null, 'This is why they are not enemies and not allies. They are not two sides of a conflict. They are the two things that a single substance became when it encountered something it could not absorb.'),
        React.createElement('p', null, "Nyx is the darkness that knows about light. Her entire existence is defined by the contrast — she is the goddess of secrets precisely because secrets are things that light has not yet reached. She is reactive by nature. She was created by reaction."),
        React.createElement('p', null, "Nocturna is the darkness that declined to be defined by light. She retained — or chose, it is impossible to know which — a quality of the original darkness that predates the distinction between known and hidden. She does not trade in secrets the way Nyx does. She is the quality of hiddenness itself. The shadow does not know what it conceals. It simply conceals."),
        React.createElement('p', null, "Their relationship in the current age is one of acknowledgment without warmth. They do not conflict because conflict requires a thing to be in dispute, and there is nothing between them to dispute — they divided completely, kept what was theirs, and have not needed to renegotiate."),
        React.createElement('p', null, "What troubles certain scholars is the question of the Primordial Dark itself — the original substance from which both of them emerged. It did not divide. It did not become conscious. It retreated. It is still present in the world. Nocturna watches it. Nyx knows about it but does not look directly at it. There are things even Nyx declines to make a secret of."),
        React.createElement('p', null, "What the Primordial Dark wants, if want is a concept that applies to it, is the question that Nocturna's waiting is aimed at answering. She has been watching it for longer than most gods have existed. She does not appear to have an answer yet. Or she does, and she is not saying.")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
