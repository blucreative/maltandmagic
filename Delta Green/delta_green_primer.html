
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DELTA GREEN // PLAYER PRIMER</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── ROOT ─────────────────────────────────── */
:root{
  --g:#3d7a3d;--gb:#5cb85c;--gd:#1a381a;--gg:rgba(92,184,92,.1);
  --bg:#080e08;--bg2:#0c140c;--sf:#101810;--sf2:#151f15;
  --bd:#1c2c1c;--bd2:#2a3e2a;
  --tx:#adc8ad;--txd:#507050;--txb:#d4ecd4;
  --red:#8b1a1a;--rb:#c0392b;
  --am:#7a5400;--ab:#c49000;
  --bl:#1a3a6a;--bb:#4a90d9;
  --fn:'Share Tech Mono',monospace;
  --fd:'Oswald',sans-serif;
  --ft:'Special Elite',cursive;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
html{font-size:13px}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:9999}

/* ── HEADER ───────────────────────────────── */
.site-header{background:var(--sf2);border-bottom:2px solid var(--g);padding:0;position:sticky;top:0;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.8)}
.header-inner{max-width:1100px;margin:0 auto;padding:12px 20px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:12px}
.logo-diamond{width:30px;height:30px;background:var(--gb);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.logo-text{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:5px;color:var(--gb);text-shadow:0 0 20px rgba(92,184,92,.4)}
.logo-sub{font-size:9px;letter-spacing:3px;color:var(--txd)}
.header-stamps{display:flex;gap:6px;flex-wrap:wrap}
.stamp{font-size:8px;letter-spacing:1.5px;padding:3px 8px;border:1px solid;text-transform:uppercase}
.stamp-red{color:var(--rb);border-color:var(--red);background:rgba(139,26,26,.1)}
.stamp-grn{color:var(--gb);border-color:var(--gd);background:var(--gg)}
.stamp-blu{color:var(--bb);border-color:var(--bl);background:rgba(26,58,106,.12)}

/* ── NAV TABS ─────────────────────────────── */
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.tab-btn{background:none;border:1px solid transparent;border-bottom:none;color:var(--txd);font-family:var(--fn);font-size:9.5px;letter-spacing:1.5px;padding:7px 14px;cursor:pointer;white-space:nowrap;transition:all .15s;text-transform:uppercase;position:relative}
.tab-btn:hover{color:var(--gb);border-color:var(--bd2)}
.tab-btn.active{color:var(--gb);border-color:var(--g);background:var(--gg)}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--sf2)}
.tab-num{color:var(--txd);font-size:8px;margin-right:4px}
.tab-btn.active .tab-num{color:var(--g)}

/* ── MAIN ─────────────────────────────────── */
.main{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
.section{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION HEADER ───────────────────────── */
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.sec-num{font-size:9px;letter-spacing:2px;color:var(--g)}
.sec-title{font-family:var(--fd);font-size:19px;font-weight:600;letter-spacing:3px;color:var(--txb)}
.sec-line{flex:1;height:1px;background:linear-gradient(to right,var(--bd),transparent)}

/* ── PANEL ────────────────────────────────── */
.panel{background:var(--sf);border:1px solid var(--bd);margin-bottom:14px;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gd)}
.panel.accent::before{background:var(--gb)}
.panel.danger::before{background:var(--red)}
.panel.warn::before{background:var(--am)}
.panel.info::before{background:var(--bl)}
.panel-hd{background:var(--sf2);border-bottom:1px solid var(--bd);padding:6px 14px;display:flex;justify-content:space-between;align-items:center}
.panel-hd h3{font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:2px;color:var(--gb);text-transform:uppercase}
.panel-hd h3.red{color:#e05050}
.panel-hd h3.amber{color:var(--ab)}
.panel-hd span{font-size:9px;letter-spacing:1px;color:var(--txd)}
.panel-body{padding:14px}

/* ── GRIDS ────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr}}
@media(max-width:900px){.g3{grid-template-columns:1fr 1fr}}

/* ── TEXT ─────────────────────────────────── */
p{margin-bottom:10px;color:var(--tx)}
p:last-child{margin-bottom:0}
.lead{font-family:var(--ft);font-size:13px;color:var(--txb);line-height:1.9;border-left:3px solid var(--g);padding-left:14px;margin-bottom:18px}
.lbl{font-size:8px;letter-spacing:2px;color:var(--txd);text-transform:uppercase;margin-bottom:3px}
.val{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--txb)}
.hl{color:var(--gb)}
.hl-r{color:#e05050}
.hl-a{color:var(--ab)}
.hl-b{color:var(--bb)}
strong{color:var(--txb)}

/* ── LIST ─────────────────────────────────── */
ul.dgl{list-style:none;padding:0}
ul.dgl li{padding:4px 0 4px 16px;position:relative;border-bottom:1px dotted var(--bd);font-size:12px;color:var(--tx)}
ul.dgl li:last-child{border-bottom:none}
ul.dgl li::before{content:'»';position:absolute;left:0;color:var(--g)}
ul.dgl.tight li{padding:2px 0 2px 14px;font-size:11.5px}

/* ── ROW DIVIDER ──────────────────────────── */
.divrow{display:flex;align-items:center;gap:8px;margin:14px 0 10px;color:var(--gd);font-size:8.5px;letter-spacing:2px}
.divrow::before,.divrow::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── FORMULA ──────────────────────────────── */
.formula{background:var(--bg);border:1px solid var(--gd);padding:8px 12px;font-family:var(--fn);font-size:12px;color:var(--gb);margin:6px 0}

/* ── CALLOUT ──────────────────────────────── */
.callout{background:var(--bg);border:1px solid var(--gd);border-left:3px solid var(--gb);padding:10px 14px;font-family:var(--ft);font-size:12.5px;color:var(--txb);line-height:1.8;margin:10px 0}
.callout.danger{border-left-color:var(--rb);border-color:rgba(139,26,26,.4)}
.callout.warn{border-left-color:var(--ab);border-color:rgba(122,84,0,.4)}
.callout.info{border-left-color:var(--bb);border-color:rgba(26,58,106,.4)}

/* ── STAT ROW ─────────────────────────────── */
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--bd)}
.stat-row:last-child{border-bottom:none}
.stat-name{font-size:11.5px;color:var(--txd)}
.stat-val{font-size:12px;color:var(--gb);font-weight:bold;text-align:right;max-width:65%}

/* ── BADGE ────────────────────────────────── */
.badge{display:inline-block;font-size:8px;letter-spacing:1.5px;padding:2px 6px;border:1px solid;vertical-align:middle;margin-left:5px;text-transform:uppercase}
.badge-g{color:var(--gb);border-color:var(--g);background:var(--gg)}
.badge-r{color:#e05050;border-color:var(--red);background:rgba(139,26,26,.1)}
.badge-a{color:var(--ab);border-color:var(--am);background:rgba(122,84,0,.1)}

/* ── PROFESSION CARDS ─────────────────────── */
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
@media(max-width:700px){.prof-grid{grid-template-columns:1fr 1fr}}
.prof-card{background:var(--sf);border:1px solid var(--bd);padding:12px;cursor:pointer;transition:all .2s;position:relative}
.prof-card:hover,.prof-card.open{border-color:var(--g);background:var(--sf2)}
.prof-name{font-family:var(--fd);font-size:12px;font-weight:600;color:var(--txb);letter-spacing:1px;margin-bottom:4px}
.prof-rec{font-size:9px;color:var(--ab);letter-spacing:1px;margin-bottom:4px}
.prof-bonds{font-size:9px;color:var(--txd);margin-bottom:6px}
.prof-teaser{font-size:11px;color:var(--txd);line-height:1.5}
.prof-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.prof-card.open .prof-detail{display:block}

/* ── SKILLS TABLE ─────────────────────────── */
.skills-2col{columns:2;gap:10px}
@media(max-width:600px){.skills-2col{columns:1}}
.sk-item{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dotted var(--bd);font-size:11.5px;break-inside:avoid}
.sk-name{color:var(--tx)}
.sk-pct{color:var(--gb);font-weight:bold;min-width:36px;text-align:right}

/* ── FULL SKILLS TABLE ────────────────────── */
.skill-table{width:100%;border-collapse:collapse}
.skill-table th{background:var(--bg);color:var(--g);font-size:9px;letter-spacing:2px;padding:5px 8px;text-align:left;border:1px solid var(--bd);font-weight:normal}
.skill-table td{padding:5px 8px;border:1px solid var(--bd);font-size:11.5px;color:var(--tx);vertical-align:top}
.skill-table tr:nth-child(even) td{background:var(--sf2)}
.skill-table td:first-child{color:var(--txb);font-weight:bold;white-space:nowrap}
.skill-table td.base{color:var(--gb);font-weight:bold;text-align:center;white-space:nowrap}
.skill-table td.desc{color:var(--txd);font-size:11px}

/* ── WEAPONS TABLE ────────────────────────── */
.wpn-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px}
.wpn-table th{background:var(--bg);color:var(--g);font-size:8.5px;letter-spacing:1.5px;padding:5px 8px;text-align:left;border:1px solid var(--bd);white-space:nowrap}
.wpn-table td{padding:4px 8px;border:1px solid var(--bd);color:var(--tx);vertical-align:top}
.wpn-table tr:nth-child(even) td{background:var(--sf2)}
.wpn-table td.wn{color:var(--txb);font-size:11px}
.wpn-table td.ws,.wpn-table td.wd{color:var(--gb);font-weight:bold;text-align:center}
.wpn-table td.lth{color:var(--rb);font-weight:bold;text-align:center}
.wpn-table td.exp{color:var(--ab);text-align:center;font-size:10px}
.wpn-table td.note{color:var(--txd);font-size:10px;font-style:italic}

/* ── SAN TABLES ───────────────────────────── */
.san-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.san-table th{background:rgba(139,26,26,.25);color:#e05050;font-size:9px;letter-spacing:1.5px;padding:5px 8px;text-align:left;border:1px solid rgba(139,26,26,.3)}
.san-table td{padding:4px 8px;border:1px solid var(--bd);color:var(--tx)}
.san-table td:last-child{color:var(--rb);font-weight:bold;text-align:right;font-family:var(--fn);white-space:nowrap}
.san-table tr:nth-child(even) td{background:var(--sf2)}

/* ── DICE DISPLAY ─────────────────────────── */
.dice-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.die{background:var(--bg);border:1px solid var(--gd);padding:4px 10px;font-family:var(--fd);font-size:13px;color:var(--gb);font-weight:600;text-align:center;min-width:44px}
.die.result{color:var(--txb)}
.die.crit{border-color:var(--gb);background:var(--gg)}
.die.fail{border-color:var(--red);color:var(--rb)}

/* ── STAT ARRAY TABLE ─────────────────────── */
.array-table{width:100%;border-collapse:collapse;text-align:center}
.array-table th{background:var(--bg);color:var(--g);font-size:9px;letter-spacing:1.5px;padding:5px;border:1px solid var(--bd)}
.array-table td{padding:7px;border:1px solid var(--bd);font-family:var(--fd);font-size:16px;font-weight:700;color:var(--txb)}
.array-table tr:nth-child(even) td{background:var(--sf2)}
.array-table tr:nth-child(odd) td{background:var(--bg2)}

/* ── COMBAT ACTIONS GRID ──────────────────── */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:600px){.action-grid{grid-template-columns:1fr}}
.action-item{background:var(--bg);border:1px solid var(--bd);padding:10px 12px}
.action-name{font-family:var(--fd);font-size:10px;font-weight:600;color:var(--gb);letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase}
.action-desc{font-size:11px;color:var(--txd);line-height:1.5}

/* ── QUICK REF CARDS ──────────────────────── */
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.qr-card{background:var(--sf);border:1px solid var(--bd);padding:12px}
.qr-lbl{font-size:8px;letter-spacing:2px;color:var(--txd);margin-bottom:4px;text-transform:uppercase}
.qr-val{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--gb)}
.qr-note{font-size:10px;color:var(--txd);margin-top:2px}

/* ── TUTORIAL OVERLAY ─────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.ov-box{background:var(--bg2);border:2px solid var(--g);max-width:540px;width:100%;padding:30px;position:relative;box-shadow:0 0 60px rgba(92,184,92,.15)}
.ov-stamp{position:absolute;top:-12px;right:20px;background:var(--bg2);padding:0 8px;font-size:8px;letter-spacing:3px;color:var(--g);border:1px solid var(--g)}
.ov-title{font-family:var(--fd);font-size:17px;font-weight:700;letter-spacing:3px;color:var(--gb);margin-bottom:4px}
.ov-step{font-size:9px;letter-spacing:2px;color:var(--txd);margin-bottom:18px}
.ov-body{font-family:var(--ft);font-size:13px;color:var(--tx);line-height:1.8;margin-bottom:20px}
.ov-body strong{color:var(--gb);font-family:var(--fn);font-style:normal}
.ov-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px}
.dot{width:8px;height:8px;border:1px solid var(--gd);border-radius:50%;cursor:pointer;transition:all .15s}
.dot.on{background:var(--gb);border-color:var(--gb)}
.ov-btns{display:flex;gap:8px;justify-content:flex-end}
.btn{background:none;border:1px solid var(--g);color:var(--gb);font-family:var(--fn);font-size:10px;letter-spacing:1px;padding:7px 16px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn:hover{background:var(--g);color:#000}
.btn.sec{border-color:var(--bd2);color:var(--txd)}
.btn.sec:hover{background:var(--sf2);color:var(--tx)}
.tut-btn{background:var(--gd);border:1px solid var(--g);color:var(--gb);font-family:var(--fn);font-size:10px;letter-spacing:1px;padding:5px 12px;cursor:pointer;transition:all .2s}
.tut-btn:hover{background:var(--g);color:#000}

/* ── SEPARATOR ────────────────────────────── */
hr.thin{border:none;border-top:1px solid var(--bd);margin:12px 0}

/* ── PRINT ────────────────────────────────── */
@media print{
  @page{size:A4;margin:10mm}
  body::before,.site-header,.overlay{display:none!important}
  body{background:#fff;color:#000;padding:0}
  .panel{background:#f8f8f8;border:1px solid #ccc;break-inside:avoid}
  .panel-hd{background:#e8e8e8}
}

/* ── SCROLL HINT ──────────────────────────── */
.scroll-hint{text-align:center;font-size:9px;letter-spacing:2px;color:var(--gd);padding:30px 0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="ov-box">
    <div class="ov-stamp">FIELD ORIENTATION</div>
    <div class="ov-title" id="ov-title">WELCOME</div>
    <div class="ov-step" id="ov-step">STEP 1 OF 8</div>
    <div class="ov-body" id="ov-body"></div>
    <div class="ov-dots" id="ov-dots"></div>
    <div class="ov-btns">
      <button class="btn sec" id="ov-back">← BACK</button>
      <button class="btn" id="ov-next">NEXT →</button>
    </div>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">
        <div class="logo-diamond"></div>
        <div>
          <div class="logo-text">DELTA GREEN</div>
          <div class="logo-sub">PLAYER PRIMER // AGENT'S HANDBOOK // NEED TO KNOW</div>
        </div>
      </div>
      <div class="header-stamps">
        <div class="stamp stamp-red">TOP SECRET // ORCON</div>
        <div class="stamp stamp-grn">DELTA GREEN EYES ONLY</div>
        <div class="stamp stamp-blu">FULL RULES REFERENCE</div>
        <button class="tut-btn" onclick="startTutorial()">⊞ ORIENTATION</button>
      </div>
    </div>
    <nav class="nav-tabs" id="tabs"></nav>
  </div>
</header>

<main class="main" id="main"></main>
<div class="scroll-hint" id="scroll-hint">// END OF TRANSMISSION — THE MISSION IS NEVER OVER //</div>

<script>
/* ═══════════════════════════════════════════════
   TUTORIAL
═══════════════════════════════════════════════ */
const TUTORIAL = [
  {title:'WELCOME TO DELTA GREEN',body:`This primer is your complete player reference, drawn directly from the <strong>Agent's Handbook</strong>.\n\nUse the <strong>tabs at the top</strong> to navigate. Everything you need to create an Agent and play the game is here — from character creation to the full equipment tables.`},
  {title:'SECTION 01 — OVERVIEW',body:`Covers the setting, tone, and your role as a player. Delta Green is a horror game about <strong>fear, conspiracy, and terrible choices</strong>. Read this first if you're new.`},
  {title:'SECTION 02 — CREATE YOUR AGENT',body:`Walk through all five steps: assign stats, choose a profession, pick skills, define bonds, and set motivations. <strong>Click profession cards</strong> to expand full skill lists.`},
  {title:'SECTION 03 — STATISTICS & SKILLS',body:`Full descriptions of all six stats and every skill in the game. Use this during play to know exactly what each skill covers. The <strong>skills table</strong> includes base ratings and descriptions.`},
  {title:'SECTION 04 — GAME MECHANICS',body:`How rolls work, success/failure/critical/fumble, opposed tests, pursuits, and willpower. <strong>Roll your skill or lower on 1D100</strong> — that's the core of everything.`},
  {title:'SECTION 05 — COMBAT',body:`Turn structure, actions, attack rolls, defense rolls, damage, lethality, and cover. Remember: <strong>DEX order, one action per turn</strong>, and combat can kill you in a single roll.`},
  {title:'SECTION 06 — SANITY',body:`The full sanity system including all three threat types, breaking points, disorders, and recovery. <strong>Check the SAN tables</strong> during play — they list exact loss amounts for every situation.`},
  {title:'SECTION 07 — EQUIPMENT',body:`Full weapon tables, armor, vehicles, and gear by expense category. Covers <strong>official requisition, personal purchase, and the black market</strong>. Check this before any operation.`},
];

let step = 0;
function renderOverlay(){
  const s = TUTORIAL[step];
  document.getElementById('ov-title').textContent = s.title;
  document.getElementById('ov-step').textContent = `STEP ${step+1} OF ${TUTORIAL.length}`;
  document.getElementById('ov-body').innerHTML = s.body.split('\n').map(l=>`<p>${l}</p>`).join('');
  const dots = document.getElementById('ov-dots');
  dots.innerHTML = TUTORIAL.map((_,i)=>`<div class="dot${i===step?' on':''}" onclick="gotoStep(${i})"></div>`).join('');
  document.getElementById('ov-back').style.display = step===0?'none':'';
  document.getElementById('ov-next').textContent = step===TUTORIAL.length-1?'BEGIN →':'NEXT →';
}
function gotoStep(i){step=i;renderOverlay()}
document.getElementById('ov-next').onclick=()=>{
  if(step<TUTORIAL.length-1){step++;renderOverlay();}
  else{document.getElementById('overlay').style.display='none';}
};
document.getElementById('ov-back').onclick=()=>{if(step>0){step--;renderOverlay();}};
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')e.target.style.display='none';});
function startTutorial(){step=0;document.getElementById('overlay').style.display='flex';renderOverlay();}
renderOverlay();

/* ═══════════════════════════════════════════════
   TABS & SECTIONS
═══════════════════════════════════════════════ */
const TABS=[
  {id:'overview',    label:'OVERVIEW'},
  {id:'creation',    label:'AGENT CREATION'},
  {id:'stats-skills',label:'STATS & SKILLS'},
  {id:'mechanics',   label:'GAME MECHANICS'},
  {id:'combat',      label:'COMBAT'},
  {id:'sanity',      label:'SANITY'},
  {id:'equipment',   label:'EQUIPMENT'},
  {id:'quickref',    label:'QUICK REF'},
];

let active = 'overview';

function buildTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map((t,i)=>
    `<button class="tab-btn${t.id===active?' active':''}" onclick="switchTab('${t.id}')">
       <span class="tab-num">0${i+1}</span>${t.label}
     </button>`
  ).join('');
}

function switchTab(id){
  active=id;
  buildTabs();
  document.getElementById('main').innerHTML = SECTIONS[id]();
  window.scrollTo(0,0);

function sh(txt){return `<div class="sec-hd">
  <span class="sec-num">[${TABS.findIndex(t=>t.id===active)+1<10?'0':''}${TABS.findIndex(t=>t.id===active)+1}]</span>
  <h2 class="sec-title">${txt}</h2><div class="sec-line"></div></div>`;}
function panel(title,body,cls='',hdr=''){return `<div class="panel${cls?' '+cls:''}"><div class="panel-hd"><h3${cls.includes('danger')?' class="red"':cls.includes('warn')?' class="amber"':''}>${title}</h3>${hdr?`<span>${hdr}</span>`:''}</div><div class="panel-body">${body}</div></div>`;}
function g2(a,b){return `<div class="g2">${a}${b}</div>`;}
function g3(a,b,c){return `<div class="g3">${a}${b}${c||''}</div>`;}
function divrow(t){return `<div class="divrow">${t}</div>`;}
function callout(txt,cls=''){return `<div class="callout${cls?' '+cls:''}">${txt}</div>`;}
function formula(txt){return `<div class="formula">${txt}</div>`;}
function statrow(name,val){return `<div class="stat-row"><span class="stat-name">${name}</span><span class="stat-val">${val}</span></div>`;}
function dgl(items,tight=false){return `<ul class="dgl${tight?' tight':''}">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;}
function badge(txt,cls='badge-g'){return `<span class="badge ${cls}">${txt}</span>`;}

let sanTab = 'violence';

function initSanTabs(){
  document.querySelectorAll('.san-tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      sanTab = btn.dataset.tab;

    });
  });
}
