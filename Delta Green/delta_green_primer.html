<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DELTA GREEN // PLAYER PRIMER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green: #3d7a3d;
    --green-bright: #5cb85c;
    --green-dim: #2a5a2a;
    --green-glow: rgba(92,184,92,0.15);
    --bg: #0a0c0a;
    --bg2: #0f120f;
    --bg3: #141814;
    --surface: #181d18;
    --surface2: #1e251e;
    --border: #2a352a;
    --text: #c8d4c8;
    --text-dim: #7a8f7a;
    --text-bright: #e8f0e8;
    --red: #8b2020;
    --red-bright: #c0392b;
    --amber: #b8860b;
    --amber-bright: #d4a017;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Oswald', sans-serif;
    --font-type: 'Special Elite', cursive;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* HEADER */
  .header {
    background: var(--bg2);
    border-bottom: 2px solid var(--green);
    padding: 16px 24px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }
  .header-inner { max-width: 1100px; margin: 0 auto; }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transform: rotate(45deg);
  }
  .logo-mark::after {
    content: '';
    width: 16px; height: 16px;
    background: var(--green);
    display: block;
    transform: rotate(0deg);
  }
  .logo-text {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--green-bright);
    text-shadow: 0 0 20px rgba(92,184,92,0.5);
  }
  .logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
  .classification {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--red-bright);
    border: 1px solid var(--red);
    padding: 3px 8px;
    background: rgba(139,32,32,0.1);
  }
  .tutorial-btn {
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green-bright);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tutorial-btn:hover { background: var(--green); color: #000; }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: none;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 6px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    position: relative;
  }
  .tab:hover { color: var(--green-bright); border-color: var(--border); }
  .tab.active {
    color: var(--green-bright);
    border-color: var(--green);
    background: var(--green-glow);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 2px;
    background: var(--bg2);
  }
  .tab-num {
    color: var(--text-dim);
    margin-right: 5px;
    font-size: 9px;
  }
  .tab.active .tab-num { color: var(--green); }

  /* MAIN LAYOUT */
  .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  /* SECTION */
  .section { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--green);
    letter-spacing: 1px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text-bright);
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 20px;
    margin-bottom: 16px;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--green-dim);
  }
  .card.accent::before { background: var(--green); }
  .card.danger::before { background: var(--red); }
  .card.warning::before { background: var(--amber); }
  .card-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--green-bright);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .card-title.red { color: #e05050; }
  .card-title.amber { color: var(--amber-bright); }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media(max-width:700px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  @media(max-width:900px) { .grid-3 { grid-template-columns: 1fr 1fr; } }

  /* TEXT ELEMENTS */
  p { margin-bottom: 10px; color: var(--text); }
  p:last-child { margin-bottom: 0; }
  .lead {
    font-family: var(--font-type);
    font-size: 14px;
    color: var(--text-bright);
    line-height: 1.8;
    border-left: 3px solid var(--green);
    padding-left: 16px;
    margin-bottom: 20px;
  }
  .rule-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .rule-value {
    font-size: 18px;
    color: var(--text-bright);
    font-family: var(--font-display);
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* STAT BLOCKS */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-name { color: var(--text-dim); letter-spacing: 1px; }
  .stat-detail { color: var(--green-bright); font-weight: bold; text-align: right; max-width: 60%; }

  /* FORMULA BOX */
  .formula {
    background: var(--bg);
    border: 1px solid var(--green-dim);
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--green-bright);
    margin: 8px 0;
    position: relative;
  }
  .formula::before {
    content: '//';
    position: absolute;
    top: 10px; left: -20px;
    color: var(--green-dim);
    font-size: 10px;
  }

  /* PROFESSION SELECTOR */
  .prof-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  @media(max-width:700px) { .prof-grid { grid-template-columns: 1fr 1fr; } }
  .prof-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .prof-card:hover { border-color: var(--green); background: var(--surface2); }
  .prof-card.selected { border-color: var(--green-bright); background: var(--green-glow); }
  .prof-card.selected::before {
    content: '▶ SELECTED';
    position: absolute;
    top: 4px; right: 6px;
    font-size: 8px;
    color: var(--green-bright);
    letter-spacing: 1px;
  }
  .prof-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .prof-bonds {
    font-size: 10px;
    color: var(--amber-bright);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .prof-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* SKILL LIST */
  .skill-list { columns: 2; gap: 10px; }
  @media(max-width:600px) { .skill-list { columns: 1; } }
  .skill-item {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px dotted var(--border);
    font-size: 11px;
    break-inside: avoid;
  }
  .skill-name { color: var(--text); }
  .skill-pct { color: var(--green-bright); font-weight: bold; min-width: 36px; text-align: right; }

  /* STAT ARRAY TABLE */
  .stat-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin: 8px 0;
  }
  .stat-table th {
    background: var(--bg);
    color: var(--green);
    letter-spacing: 1px;
    font-size: 10px;
    padding: 6px 10px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-table td {
    text-align: center;
    padding: 6px 10px;
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-size: 14px;
    font-family: var(--font-display);
  }
  .stat-table tr:nth-child(even) td { background: var(--surface); }
  .stat-table tr:nth-child(odd) td { background: var(--bg2); }

  /* SANITY TABLE */
  .san-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin: 8px 0;
  }
  .san-table th {
    background: rgba(139,32,32,0.3);
    color: #e05050;
    letter-spacing: 1px;
    font-size: 10px;
    padding: 5px 8px;
    text-align: left;
    border: 1px solid rgba(139,32,32,0.4);
  }
  .san-table td {
    padding: 4px 8px;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .san-table td:last-child { color: var(--red-bright); text-align: right; font-family: var(--font-mono); }
  .san-table tr:nth-child(even) td { background: var(--surface); }

  /* COMBAT ACTIONS */
  .action-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media(max-width:600px) { .action-list { grid-template-columns: 1fr; } }
  .action-item {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 12px;
  }
  .action-name {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    color: var(--green-bright);
    letter-spacing: 1px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .action-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

  /* BADGES */
  .badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 2px 6px;
    border: 1px solid;
    text-transform: uppercase;
    vertical-align: middle;
    margin-left: 6px;
  }
  .badge-green { color: var(--green-bright); border-color: var(--green); background: var(--green-glow); }
  .badge-red { color: #e05050; border-color: var(--red); background: rgba(139,32,32,0.1); }
  .badge-amber { color: var(--amber-bright); border-color: var(--amber); background: rgba(184,134,11,0.1); }

  /* CALLOUT */
  .callout {
    background: var(--bg);
    border: 1px solid var(--green-dim);
    border-left: 4px solid var(--green);
    padding: 12px 16px;
    margin: 12px 0;
    font-family: var(--font-type);
    font-size: 13px;
    color: var(--text-bright);
    line-height: 1.7;
  }
  .callout.danger {
    border-left-color: var(--red-bright);
    border-color: rgba(139,32,32,0.5);
  }
  .callout.warning {
    border-left-color: var(--amber-bright);
    border-color: rgba(184,134,11,0.5);
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
    color: var(--green-dim);
    font-size: 10px;
    letter-spacing: 2px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* TUTORIAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay-box {
    background: var(--bg2);
    border: 2px solid var(--green);
    max-width: 560px;
    width: 100%;
    padding: 32px;
    position: relative;
    box-shadow: 0 0 60px rgba(92,184,92,0.2);
  }
  .overlay-stamp {
    position: absolute;
    top: -14px; right: 20px;
    background: var(--bg2);
    padding: 0 8px;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--green);
    border: 1px solid var(--green);
  }
  .overlay-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--green-bright);
    margin-bottom: 6px;
  }
  .overlay-step {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  .overlay-body {
    font-family: var(--font-type);
    font-size: 13px;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .overlay-body strong { color: var(--green-bright); font-family: var(--font-mono); font-style: normal; }
  .overlay-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .dot {
    width: 8px; height: 8px;
    border: 1px solid var(--green-dim);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .dot.active { background: var(--green-bright); border-color: var(--green-bright); }
  .overlay-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn {
    background: none;
    border: 1px solid var(--green);
    color: var(--green-bright);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--green); color: #000; }
  .btn.secondary { border-color: var(--border); color: var(--text-dim); }
  .btn.secondary:hover { background: var(--surface); color: var(--text); }

  /* QUICK REF */
  .quick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 10px; }
  .quick-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
  }
  .quick-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
  .quick-val { font-family: var(--font-display); font-size: 16px; color: var(--green-bright); font-weight: 600; }
  .quick-note { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  /* SCROLL INDICATOR */
  .scroll-tip {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-dim);
    margin-top: 40px;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* HIGHLIGHT */
  .hl { color: var(--green-bright); }
  .hl-red { color: #e05050; }
  .hl-amber { color: var(--amber-bright); }

  hr.thin { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  ul.dg-list { list-style: none; padding: 0; }
  ul.dg-list li {
    padding: 4px 0 4px 16px;
    border-bottom: 1px dotted var(--border);
    font-size: 12px;
    color: var(--text);
    position: relative;
  }
  ul.dg-list li::before {
    content: '»';
    position: absolute;
    left: 0;
    color: var(--green);
  }
  ul.dg-list li:last-child { border-bottom: none; }

  .tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 1px 5px;
    border: 1px solid var(--green-dim);
    color: var(--green);
    margin-right: 4px;
    vertical-align: middle;
  }
</style>
</head>

<div id="root"></div>

function Tutorial({ onClose }) {
  const [step, setStep] = useState(0);
  const s = TUTORIAL_STEPS[step];
  return (
    <div className="overlay" onClick={onClose}>
      <div className="overlay-box" onClick={e=>e.stopPropagation()}>
        <div className="overlay-stamp">FIELD ORIENTATION</div>
        <div className="overlay-title">{s.title}</div>
        <div className="overlay-step">STEP {step+1} OF {TUTORIAL_STEPS.length}</div>
        <div className="overlay-body">
          {s.body.split('\n').map((l,i)=>(
            <p key={i} style={{marginBottom:l===''?12:0}}
               dangerouslySetInnerHTML={{__html:l.replace(/\n/g,'')}}/>
          ))}
        </div>
        <div className="overlay-dots">
          {TUTORIAL_STEPS.map((_,i)=>(
            <div key={i} className={`dot${i===step?' active':''}`}
                 onClick={()=>setStep(i)} style={{cursor:'pointer'}}/>
          ))}
        </div>
        <div className="overlay-btns">
          {step>0&&<button className="btn secondary" onClick={()=>setStep(step-1)}>← BACK</button>}
          {step<TUTORIAL_STEPS.length-1
            ?<button className="btn" onClick={()=>setStep(step+1)}>NEXT →</button>
            :<button className="btn" onClick={onClose}>BEGIN →</button>
          }
        </div>
      </div>
    </div>
  );
}

            <li>Protecting the American people</li>
            <li>Rooting out dangerous conspiracies</li>
            <li>Intellectual curiosity</li>
            <li>Devotion to a child or loved one</li>
            <li>Duty above personal cost</li>

          <div className="card-title">STEP 06 // BONUS SKILLS</div>

// ── MAIN APP ───────────────────────────────────────────────────────────────────

const TABS = [
  {id:'overview', label:'OVERVIEW'},
  {id:'creation', label:'AGENT CREATION'},
  {id:'rules', label:'CORE RULES'},
  {id:'combat', label:'COMBAT'},
  {id:'sanity', label:'SANITY & WP'},
  {id:'quickref', label:'QUICK REF'},
];

function App() {
  const [tab, setTab] = useState('overview');
  const [showTutorial, setShowTutorial] = useState(true);

  const renderSection = () => {
    switch(tab) {
      case 'overview': return <OverviewSection/>;
      case 'creation': return <CreationSection/>;
      case 'rules': return <RulesSection/>;
      case 'combat': return <CombatSection/>;
      case 'sanity': return <SanitySection/>;
      case 'quickref': return <QuickRefSection/>;
      default: return null;
    }
  };

  return (
    <>
      {showTutorial && <Tutorial onClose={()=>setShowTutorial(false)}/>}
      <div className="header">
        <div className="header-inner">
          <div className="header-top">
            <div className="logo">
              <div className="logo-mark"/>
              <div>
                <div className="logo-text">DELTA GREEN</div>
                <div className="logo-sub">PLAYER RULES PRIMER // NEED TO KNOW</div>
              </div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <div className="classification">TOP SECRET // ORCON</div>
              <button className="tutorial-btn" onClick={()=>setShowTutorial(true)}>⊞ ORIENTATION</button>
            </div>
          </div>
          <nav className="nav-tabs">
            {TABS.map((t,i)=>(
              <button key={t.id} className={`tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
                <span className="tab-num">0{i+1}</span>{t.label}
              </button>
            ))}
          </nav>
        </div>
      </div>
      <main className="main">
        {renderSection()}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
