  --font-mono: 'Courier Prime', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {

font-size: 16px;

}

body::before {

pointer-events: none;
z-index: 9999;
opacity: 0.6;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 0; }

/* ── HEADER ── */
.header {
background: var(--bg2);
border-bottom: 1px solid var(--border2);
position: sticky;
top: 0;
z-index: 200;
box-shadow: 0 4px 30px rgba(0,0,0,0.8);
}

.header-top {
max-width: 1200px;
margin: 0 auto;
padding: 14px 28px 0;
display: flex;
align-items: flex-end;
gap: 20px;
flex-wrap: wrap;
}

.cthulhu-eye {
font-size: 32px;
line-height: 1;
filter: drop-shadow(0 0 8px rgba(201,168,76,0.6));
flex-shrink: 0;
}

.header-text { flex: 1; }

.header-eyebrow {
font-family: var(--font-mono);
font-size: 9px;
letter-spacing: 3px;
color: var(--gold-dim);
text-transform: uppercase;
margin-bottom: 2px;
}

.header-title {
font-family: var(--font-display);
font-size: clamp(16px, 2.5vw, 24px);
color: var(--gold);
letter-spacing: 2px;
text-shadow: 0 0 20px rgba(201,168,76,0.3);

}

.header-subtitle {
font-family: var(--font-deco);
font-size: 11px;

letter-spacing: 2px;
}

.header-actions {
display: flex;

}

.primer-btn {

}
.primer-btn:hover {

}
.primer-btn.ghost {

}
.primer-btn.ghost:hover {
background: var(--surface);
color: var(--text);
border-color: var(--border2);
}

/* ── NAV ── */
.nav-bar {
max-width: 1200px;
margin: 0 auto;
padding: 0 28px;
display: flex;
gap: 0;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.nav-bar::-webkit-scrollbar { display: none; }

.nav-tab {
background: none;
border: none;
border-bottom: 2px solid transparent;
color: var(--text-dim);
font-family: var(--font-deco);
font-size: 10px;
letter-spacing: 1.5px;
padding: 10px 18px;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
text-transform: uppercase;
position: relative;
}
.nav-tab:hover { color: var(--gold-pale); }
.nav-tab.active {
color: var(--gold);
border-bottom-color: var(--gold);
}
.nav-tab .tab-num {
display: block;
font-size: 7px;
letter-spacing: 2px;
color: var(--gold-dim);
margin-bottom: 1px;
text-align: center;
}

/* ── MAIN ── */
.main {
max-width: 1200px;
margin: 0 auto;
padding: 36px 28px 80px;
}

/* ── SECTION HEADER ── */
.sec-header {
text-align: center;
margin-bottom: 36px;
position: relative;
}

.sec-ornament {
font-size: 28px;
color: var(--gold-dim);
display: block;
margin-bottom: 8px;
opacity: 0.7;
}

.sec-num {
font-family: var(--font-mono);
font-size: 10px;
letter-spacing: 4px;
color: var(--teal);
display: block;
margin-bottom: 6px;
text-transform: uppercase;
}

.sec-title {
font-family: var(--font-display);
font-size: clamp(18px, 3vw, 28px);
color: var(--gold);
letter-spacing: 3px;
text-shadow: 0 0 30px rgba(201,168,76,0.2);
margin-bottom: 8px;
}

.sec-rule {
display: flex;
align-items: center;
gap: 12px;
max-width: 500px;
margin: 8px auto 0;
}
.sec-rule::before,
.sec-rule::after {
content: '';
flex: 1;
height: 1px;
background: linear-gradient(to right, transparent, var(--gold-dim));
}
.sec-rule::after {
background: linear-gradient(to left, transparent, var(--gold-dim));
}
.sec-diamond {
width: 6px;
height: 6px;
background: var(--gold-dim);
transform: rotate(45deg);
flex-shrink: 0;
}

/* ── GRID ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; }

@media (max-width: 768px) {
.grid-2, .grid-3 { grid-template-columns: 1fr; }
.header-top { flex-direction: column; align-items: flex-start; }
}

/* ── CARDS ── */
.card {
background: var(--surface);
border: 1px solid var(--border);
padding: 20px;
position: relative;
}

.card::before,
.card::after {
content: '';
position: absolute;
width: 10px;
height: 10px;
border-color: var(--gold-dim);
border-style: solid;
}
.card::before {
top: -1px; left: -1px;
border-width: 1px 0 0 1px;
}
.card::after {
bottom: -1px; right: -1px;
border-width: 0 1px 1px 0;
}

.card.teal {
border-color: var(--teal-dim);
background: rgba(42,96,88,0.12);
}
.card.teal::before, .card.teal::after { border-color: var(--teal-dim); }

.card.gold {
border-color: var(--gold-dim);
background: rgba(122,98,48,0.1);
}
.card.gold::before, .card.gold::after { border-color: var(--gold-dim); }

.card.red {
border-color: var(--red);
background: rgba(155,58,40,0.1);
}
.card.red::before, .card.red::after { border-color: var(--red); }

.card-title {
font-family: var(--font-deco);
font-size: 11px;
letter-spacing: 2px;
color: var(--gold);
text-transform: uppercase;
margin-bottom: 12px;
padding-bottom: 8px;
border-bottom: 1px solid var(--border);
}
.card.teal .card-title { color: var(--teal-pale); border-bottom-color: var(--teal-dim); }
.card.red .card-title { color: var(--red-bright); border-bottom-color: var(--red); }

.card p + p { margin-top: 8px; }

/* ── LEAD TEXT ── */
.lead {
font-family: var(--font-body);
font-size: 17px;
font-style: italic;
color: var(--text-pale);
line-height: 1.7;
text-align: center;
max-width: 750px;
margin: 0 auto 32px;
}

/* ── STAT BLOCK ── */
.stat-block {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
gap: 10px;
margin: 16px 0;
}

.stat-item {
background: var(--surface2);
border: 1px solid var(--border);
padding: 12px 10px;
text-align: center;
}
.stat-name {
font-family: var(--font-mono);
font-size: 9px;
letter-spacing: 2px;
color: var(--text-dim);
display: block;
margin-bottom: 4px;
}
.stat-abbr {
font-family: var(--font-deco);
font-size: 20px;
font-weight: 700;
color: var(--gold);
display: block;
line-height: 1;
}
.stat-roll {
font-family: var(--font-mono);
font-size: 10px;
color: var(--teal);
display: block;
margin-top: 2px;
}
.stat-desc {
font-size: 11px;
color: var(--text-dim);
margin-top: 4px;
}

/* ── LISTS ── */
ul.coc-list {
list-style: none;
padding: 0;
}
ul.coc-list li {
padding: 5px 0 5px 20px;
border-bottom: 1px solid var(--border);
font-size: 14px;
position: relative;
color: var(--text);
}
ul.coc-list li:last-child { border-bottom: none; }
ul.coc-list li::before {
content: '◆';
position: absolute;
left: 2px;
font-size: 7px;
color: var(--gold-dim);
top: 8px;
}

/* ── DIFFICULTY TABLE ── */
.diff-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.diff-table th {
font-family: var(--font-deco);
font-size: 9px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(--gold-dim);
text-align: left;
padding: 6px 10px;
border-bottom: 1px solid var(--border2);
}
.diff-table td {
font-size: 13px;
padding: 7px 10px;
border-bottom: 1px solid var(--border);
vertical-align: top;
}
.diff-table tr:last-child td { border-bottom: none; }
.diff-table td:first-child {
font-family: var(--font-deco);
font-weight: 600;
color: var(--gold);
white-space: nowrap;
font-size: 11px;
letter-spacing: 0.5px;
}
.diff-table td.teal { color: var(--teal); font-family: var(--font-mono); font-size: 12px; }
.diff-table td.red { color: var(--red-bright); font-family: var(--font-mono); font-size: 12px; }

/* ── DICE VISUAL ── */
.dice-example {

padding: 14px;
text-align: center;

}
.dice-big {
font-family: var(--font-display);
font-size: 36px;
color: var(--gold);
display: block;
line-height: 1;
text-shadow: 0 0 20px rgba(201,168,76,0.4);
}
.dice-label {
font-family: var(--font-mono);
font-size: 10px;
letter-spacing: 2px;
color: var(--text-dim);
margin-top: 4px;
display: block;
}

/* ── STEP INDICATOR ── */
.steps {
display: flex;
gap: 0;
margin-bottom: 28px;
border: 1px solid var(--border);
overflow-x: auto;
}
.step-item {
flex: 1;
min-width: 120px;
padding: 12px 10px;
text-align: center;
border-right: 1px solid var(--border);
cursor: pointer;
transition: background 0.2s;
background: var(--surface);
}
.step-item:last-child { border-right: none; }
.step-item:hover, .step-item.active { background: var(--surface2); }
.step-item.active .step-num { color: var(--gold); }
.step-num {
font-family: var(--font-display);
font-size: 18px;
color: var(--gold-dim);
display: block;
line-height: 1;
}
.step-label {
font-family: var(--font-deco);
font-size: 9px;
letter-spacing: 1px;
color: var(--text-dim);
text-transform: uppercase;
display: block;
margin-top: 3px;
}
.step-item.active .step-label { color: var(--text); }

/* ── OCCUPATION CARDS ── */
.occ-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
gap: 14px;
margin-top: 16px;
}
.occ-card {
background: var(--surface);
border: 1px solid var(--border);
cursor: pointer;
transition: all 0.2s;
overflow: hidden;
}
.occ-card:hover { border-color: var(--gold-dim); background: var(--surface2); }
.occ-card.expanded { border-color: var(--gold); }
.occ-header {
padding: 14px 16px;
display: flex;
justify-content: space-between;
align-items: center;
}
.occ-name {
font-family: var(--font-deco);
font-size: 13px;
letter-spacing: 0.5px;
color: var(--gold-pale);
}
.occ-icon {
font-size: 18px;
color: var(--gold-dim);
}
.occ-body {
padding: 0 16px 14px;
border-top: 1px solid var(--border);
}
.occ-desc {
font-style: italic;
color: var(--text-dim);
font-size: 13px;
margin: 10px 0;
}
.occ-formula {
font-family: var(--font-mono);
font-size: 11px;
color: var(--teal);
margin-bottom: 8px;
}
.skill-chip {
display: inline-block;
background: var(--surface3);
border: 1px solid var(--border);
font-family: var(--font-mono);
font-size: 10px;
color: var(--text);
padding: 2px 7px;
margin: 2px 2px;
}

/* ── SAN TRACK ── */
.san-track {
display: flex;
flex-wrap: wrap;
gap: 3px;
margin: 12px 0;
}
.san-pip {
width: 18px;
height: 18px;
border: 1px solid var(--border);
background: var(--surface2);
font-family: var(--font-mono);
font-size: 7px;
display: flex;
align-items: center;
justify-content: center;
color: var(--text-faint);
transition: all 0.15s;
}
.san-pip.lost { background: var(--red); border-color: var(--red-bright); color: transparent; }
.san-pip.warn { background: rgba(155,58,40,0.3); border-color: var(--red); color: var(--text-faint); }
.san-pip.ok { background: rgba(74,155,138,0.15); border-color: var(--teal-dim); color: var(--teal-dim); }

/* ── INSANITY CARDS ── */
.insanity-types {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 16px;
margin: 16px 0;
}
@media (max-width: 640px) {
.insanity-types { grid-template-columns: 1fr; }
}
.insanity-card {
background: var(--surface);
border: 1px solid var(--border);
padding: 16px;
text-align: center;
}
.insanity-icon { font-size: 32px; display: block; margin-bottom: 8px; }
.insanity-name {
font-family: var(--font-deco);
font-size: 11px;
letter-spacing: 1.5px;
color: var(--red-bright);
text-transform: uppercase;
margin-bottom: 6px;
}
.insanity-trigger {
font-family: var(--font-mono);
font-size: 10px;
color: var(--gold);
margin-bottom: 8px;
}
.insanity-desc { font-size: 13px; color: var(--text-dim); }

/* ── COMBAT ROW ── */
.combat-order {
display: flex;
align-items: stretch;
gap: 1px;
background: var(--border);
border: 1px solid var(--border);
margin: 12px 0;
overflow-x: auto;
}
.combat-step {
flex: 1;
min-width: 100px;
background: var(--surface);
padding: 12px 8px;
text-align: center;
}
.combat-step-num {
font-family: var(--font-display);
font-size: 24px;
color: var(--gold-dim);
line-height: 1;
}
.combat-step-title {
font-family: var(--font-deco);
font-size: 9px;
letter-spacing: 1px;
color: var(--text-dim);
margin-top: 4px;
text-transform: uppercase;
}
.combat-step-detail { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* ── HIGHLIGHT TAGS ── */
.tag {
display: inline-block;
font-family: var(--font-mono);
font-size: 9px;
letter-spacing: 1px;
padding: 1px 6px;
text-transform: uppercase;
margin: 1px;
vertical-align: middle;
}
.tag-gold { border: 1px solid var(--gold-dim); color: var(--gold); }
.tag-teal { border: 1px solid var(--teal-dim); color: var(--teal); }
.tag-red { border: 1px solid var(--red); color: var(--red-bright); }

/* ── PULL QUOTE ── */
.pull-quote {
border-left: 3px solid var(--gold-dim);
padding: 12px 16px;
margin: 16px 0;
font-style: italic;
color: var(--text-pale);
font-size: 14px;
background: rgba(201,168,76,0.05);
}
.pull-attr {
font-style: normal;
font-family: var(--font-mono);
font-size: 10px;
color: var(--text-dim);
margin-top: 6px;
display: block;
}

/* ── BONUS/PENALTY ── */
.die-pair {
display: flex;
gap: 12px;
margin: 12px 0;
}
.die-box {
flex: 1;
padding: 14px;
text-align: center;
border: 1px solid var(--border);
}
.die-box.bonus { border-color: var(--teal-dim); background: rgba(74,155,138,0.08); }
.die-box.penalty { border-color: var(--red); background: rgba(155,58,40,0.08); }
.die-icon { font-size: 28px; display: block; margin-bottom: 4px; }
.die-title {
font-family: var(--font-deco);
font-size: 11px;
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 6px;
}
.die-box.bonus .die-title { color: var(--teal); }
.die-box.penalty .die-title { color: var(--red-bright); }
.die-explain { font-size: 12px; color: var(--text-dim); }

/* ── DIVIDERS ── */
.deco-divider {
text-align: center;
color: var(--gold-dim);
font-size: 12px;
letter-spacing: 8px;
margin: 28px 0;
position: relative;
}
.deco-divider::before {
content: '';
position: absolute;
top: 50%;
left: 0;
right: 0;
height: 1px;
background: var(--border);
z-index: 0;
}
.deco-divider span {
background: var(--bg);
position: relative;
z-index: 1;
padding: 0 16px;
}

/* ── QUICKREF ── */
.qr-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
gap: 10px;
margin-top: 10px;
}
.qr-item {
background: var(--surface);
border: 1px solid var(--border);
padding: 12px 14px;
}
.qr-label {
font-family: var(--font-mono);
font-size: 8px;
letter-spacing: 2px;
color: var(--gold-dim);
text-transform: uppercase;
margin-bottom: 4px;
}
.qr-val {
font-family: var(--font-deco);
font-size: 15px;
color: var(--gold);
letter-spacing: 0.5px;
}
.qr-note { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── TUTORIAL OVERLAY ── */
.overlay-bg {
position: fixed;
inset: 0;
background: rgba(5,3,1,0.92);
z-index: 1000;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}
.overlay-card {
background: var(--surface);
border: 1px solid var(--gold-dim);
max-width: 680px;
width: 100%;
padding: 36px 40px;
position: relative;
max-height: 90vh;
overflow-y: auto;
}
.overlay-card::before, .overlay-card::after {
content: '';
position: absolute;
width: 18px;
height: 18px;
border-color: var(--gold-dim);
border-style: solid;
}
.overlay-card::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
.overlay-card::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

.overlay-step-icon {
text-align: center;
font-size: 48px;
margin-bottom: 16px;
display: block;
}
.overlay-step-num {
font-family: var(--font-mono);
font-size: 9px;
letter-spacing: 3px;
color: var(--teal);
text-align: center;
margin-bottom: 8px;
}
.overlay-title {
font-family: var(--font-display);
font-size: 22px;
color: var(--gold);
text-align: center;
margin-bottom: 16px;
letter-spacing: 2px;
}
.overlay-body {
font-size: 15px;
color: var(--text);
line-height: 1.7;
text-align: center;
max-width: 520px;
margin: 0 auto;
}
.overlay-dots {
display: flex;
justify-content: center;
gap: 8px;
margin: 24px 0 20px;
}
.overlay-dot {
width: 8px;
height: 8px;
border: 1px solid var(--gold-dim);
background: none;
transform: rotate(45deg);
cursor: pointer;
transition: background 0.2s;
}
.overlay-dot.active { background: var(--gold); border-color: var(--gold); }
.overlay-buttons {
display: flex;
justify-content: center;
gap: 12px;
margin-top: 4px;
}

/* ── MISC ── */
.gold { color: var(--gold); }

function buildNav(){
  var bar=document.getElementById('navBar');
  bar.innerHTML='';
  TABS.forEach(function(t){
    var b=document.createElement('button');
    b.className='nt'+(t.id===curTab?' active':'');
    b.textContent=t.label;
    b.onclick=function(){showTab(t.id);};
    bar.appendChild(b);
  });
}

function showTab(id){
  curTab=id;
  document.querySelectorAll('.nt').forEach(function(b,i){b.classList.toggle('active',TABS[i].id===id);});
  var c=document.getElementById('canvas');
  c.innerHTML=SECS[id]();
  if(id==='sanity'){initPips(50);}
  window.scrollTo({top:0,behavior:'smooth'});
}

function tog(card){
  card.classList.toggle('open');
  var a=card.querySelector('.oca');
  if(a) a.innerHTML=card.classList.contains('open')?'&#9650;':'&#9660;';
}

function initPips(v){
  var c=document.getElementById('spips');
  if(!c) return;
  c.innerHTML='';
  for(var i=1;i<=99;i++){
    var p=document.createElement('div');
    p.className='sapp';
    if(i<=v){p.classList.add(v>=70?'hi':v>=30?'mi':'lo');}
    c.appendChild(p);
  }
  var sv=document.getElementById('sv');
  var st=document.getElementById('sstat');
  if(sv) sv.textContent=v;
  if(st){
    if(v===0){st.textContent='PERMANENTLY INSANE';st.style.color='#5a0a0a';}
    else if(v<10){st.textContent='On the Brink of Oblivion';st.style.color='#8b1a1a';}
    else if(v<30){st.textContent='Unravelling';st.style.color='#a02020';}
    else if(v<50){st.textContent='Deeply Troubled';st.style.color='#c49a1e';}
    else if(v<70){st.textContent='Troubled';st.style.color='#c49a1e';}
    else{st.textContent='Stable';st.style.color='#8b6914';}
  }
}
