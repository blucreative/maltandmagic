<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CALL OF CTHULHU — INVESTIGATOR'S PRIMER</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Special+Elite&display=swap" rel="stylesheet"/>
<style>
:root {
  --parchment: #f0e8d5;
  --parchment-dark: #e0d0b0;
  --parchment-deep: #c8b890;
  --ink: #1a120a;
  --ink-faded: #3d2e1e;
  --ink-mid: #5a4030;
  --crimson: #8b1a1a;
  --crimson-dark: #5c0f0f;
  --crimson-bright: #b52020;
  --gold: #8b6914;
  --gold-bright: #c49a1e;
  --shadow: rgba(26,18,10,0.6);
  --font-display: 'Cinzel', serif;
  --font-body: 'Crimson Text', serif;
  --font-type: 'Special Elite', cursive;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f0a06;
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* PAPER TEXTURE OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

/* HEADER */
.masthead {
  background: var(--ink);
  border-bottom: 4px solid var(--gold);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 4px 30px rgba(0,0,0,0.9);
}
.masthead-inner {
  max-width: 1160px;
  margin: 0 auto;
}
.masthead-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px 6px;
  border-bottom: 1px solid #3a2a14;
}
.masthead-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--gold-bright);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.masthead-sub {
  font-family: var(--font-type);
  font-size: 11px;
  color: var(--parchment-deep);
  letter-spacing: 0.12em;
  margin-top: 1px;
}
.orient-btn {
  background: var(--crimson);
  border: 1px solid var(--crimson-bright);
  color: var(--parchment);
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  padding: 5px 12px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
.orient-btn:hover { background: var(--crimson-bright); }

/* NAV */
.nav-strip {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav-strip::-webkit-scrollbar { display: none; }
.nav-tab {
  background: transparent;
  border: none;
  border-right: 1px solid #2a1a08;
  color: var(--parchment-deep);
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 18px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  position: relative;
}
.nav-tab:hover { background: #2a1a08; color: var(--gold-bright); }
.nav-tab.active {
  background: var(--parchment-dark);
  color: var(--ink);
}
.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--crimson);
}

/* MAIN CANVAS */
.canvas {
  max-width: 1160px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* PAGE — aged paper look */
.page {
  background: var(--parchment);
  border: 1px solid var(--parchment-deep);
  box-shadow: 0 8px 40px rgba(0,0,0,0.7), inset 0 0 80px rgba(180,140,80,0.12);
  padding: 40px 44px;
  position: relative;
  overflow: hidden;
}
.page::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(200,168,100,0.08) 0%, transparent 50%, rgba(200,168,100,0.05) 100%);
  pointer-events: none;
}

/* CHAPTER HEADER */
.chap-header {
  text-align: center;
  border-bottom: 2px solid var(--gold);
  padding-bottom: 20px;
  margin-bottom: 32px;
  position: relative;
}
.chap-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 10px;
}
.ornament-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold));
  max-width: 140px;
}
.ornament-line.right {
  background: linear-gradient(to left, transparent, var(--gold));
}
.ornament-diamond {
  width: 8px; height: 8px;
  background: var(--gold);
  transform: rotate(45deg);
}
.chap-num {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.25em;
  color: var(--crimson);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.chap-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.04em;
}
.chap-byline {
  font-family: var(--font-type);
  font-size: 13px;
  color: var(--ink-mid);
  margin-top: 8px;
  font-style: italic;
}

/* COLUMNS */
.cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
.cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media (max-width: 780px) {
  .cols-2, .cols-3 { grid-template-columns: 1fr; }
  .page { padding: 24px 20px; }
}

/* SECTION BLOCKS */
.section-block {
  margin-bottom: 28px;
}
.section-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--crimson);
  text-transform: uppercase;
  border-bottom: 1px solid var(--parchment-deep);
  padding-bottom: 5px;
  margin-bottom: 12px;
}
.section-label.gold { color: var(--gold); }

.prose {
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-faded);
}
.prose + .prose { margin-top: 10px; }

/* CALLOUT BOXES */
.callout {
  background: rgba(139,105,20,0.07);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
  margin: 16px 0;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-faded);
}
.callout.crimson {
  background: rgba(139,26,26,0.06);
  border-left-color: var(--crimson);
}
.callout-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--crimson);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.callout-title.gold { color: var(--gold); }

/* STAT CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin: 12px 0; }
.stat-card {
  background: var(--ink);
  border: 1px solid var(--gold);
  padding: 12px 14px;
  text-align: center;
}
.stat-name {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--gold-bright);
  text-transform: uppercase;
}
.stat-roll {
  font-family: var(--font-type);
  font-size: 14px;
  color: var(--parchment);
  margin: 4px 0 2px;
}
.stat-desc {
  font-family: var(--font-body);
  font-size: 11px;
  font-style: italic;
  color: var(--parchment-deep);
  line-height: 1.4;
}

/* OCCUPATION CARDS */
.occ-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin: 14px 0; }
.occ-card {
  background: var(--ink);
  border: 1px solid #3a2a14;
  padding: 0;
  cursor: pointer;
  transition: all 0.2s;
  overflow: hidden;
}
.occ-card:hover { border-color: var(--gold); }
.occ-card.open { border-color: var(--crimson); }
.occ-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
}
.occ-name {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--gold-bright);
  text-transform: uppercase;
}
.occ-pts {
  font-family: var(--font-type);
  font-size: 10px;
  color: var(--parchment-deep);
}
.occ-toggle {
  font-size: 11px;
  color: var(--parchment-deep);
}
.occ-body {
  padding: 0 14px 12px;
  border-top: 1px solid #2a1a08;
}
.occ-skills {
  font-family: var(--font-type);
  font-size: 11px;
  color: var(--parchment-deep);
  line-height: 1.7;
  margin-top: 8px;
}
.occ-cr {
  font-family: var(--font-display);
  font-size: 10px;
  color: var(--crimson);
  letter-spacing: 0.06em;
  margin-top: 6px;
}

/* DICE TABLES */
.rules-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  margin: 12px 0;
}
.rules-table th {
  background: var(--ink);
  color: var(--gold-bright);
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 8px 12px;
  text-align: left;
  border: 1px solid #3a2a14;
}
.rules-table td {
  padding: 7px 12px;
  border: 1px solid var(--parchment-deep);
  color: var(--ink-faded);
  vertical-align: top;
  line-height: 1.55;
}
.rules-table tr:nth-child(even) td {
  background: rgba(200,168,100,0.07);
}
.rules-table .hl td {
  background: rgba(139,26,26,0.06);
  font-weight: 600;
}

/* SUCCESS LEVELS */
.success-row {
  display: flex;
  gap: 2px;
  margin: 12px 0;
}
.success-box {
  flex: 1;
  padding: 14px 10px;
  text-align: center;
}
.success-box.extreme { background: var(--crimson-dark); }
.success-box.hard { background: #3a2010; }
.success-box.regular { background: var(--ink); }
.success-box.fail { background: #1a0a04; }
.success-level {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.success-box.extreme .success-level { color: var(--gold-bright); }
.success-box.hard .success-level { color: var(--parchment); }
.success-box.regular .success-level { color: var(--parchment-deep); }
.success-box.fail .success-level { color: #6a4040; }
.success-val {
  font-family: var(--font-type);
  font-size: 12px;
}
.success-box.extreme .success-val { color: var(--parchment); }
.success-box.hard .success-val { color: var(--parchment-deep); }
.success-box.regular .success-val { color: #8a7060; }
.success-box.fail .success-val { color: #4a2020; }

/* SAN METER */
.san-meter {
  background: var(--ink);
  border: 1px solid var(--gold);
  padding: 20px;
  margin: 14px 0;
  text-align: center;
}
.san-label {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.san-track {
  display: flex;
  gap: 2px;
  justify-content: center;
  flex-wrap: wrap;
}
.san-pip {
  width: 14px; height: 14px;
  border: 1px solid #4a3a20;
  background: #2a1a08;
}
.san-pip.high { background: var(--gold); }
.san-pip.mid { background: var(--crimson); }
.san-pip.low { background: var(--crimson-dark); }

/* COMBAT TABLE */
.combat-list { list-style: none; }
.combat-list li {
  display: flex;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--parchment-deep);
  font-size: 14px;
  color: var(--ink-faded);
  line-height: 1.55;
}
.combat-list li:last-child { border-bottom: none; }
.combat-num {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  color: var(--crimson);
  min-width: 24px;
  padding-top: 2px;
}
.combat-term {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  min-width: 110px;
  padding-top: 2px;
  letter-spacing: 0.04em;
}

/* TUTORIAL OVERLAY */
.overlay-bg {
  position: fixed;
  inset: 0;
  background: rgba(10,6,2,0.92);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay-card {
  background: var(--parchment);
  border: 2px solid var(--gold);
  max-width: 560px;
  width: 100%;
  padding: 0;
  box-shadow: 0 20px 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(200,160,80,0.08);
  position: relative;
  overflow: hidden;
}
.overlay-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(to right, var(--crimson), var(--gold), var(--crimson));
}
.overlay-stamp {
  background: var(--ink);
  text-align: center;
  padding: 14px 20px;
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
}
.overlay-body {
  padding: 28px 32px 20px;
}
.overlay-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 14px;
  letter-spacing: 0.04em;
}
.overlay-text {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.75;
  color: var(--ink-faded);
}
.overlay-text p + p { margin-top: 10px; }
.overlay-text strong { color: var(--crimson); font-weight: 600; }
.overlay-step {
  font-family: var(--font-type);
  font-size: 11px;
  color: var(--ink-mid);
  margin-top: 12px;
  text-align: center;
}
.overlay-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 32px 24px;
  border-top: 1px solid var(--parchment-deep);
}
.overlay-dots {
  display: flex;
  gap: 6px;
}
.o-dot {
  width: 8px; height: 8px;
  border: 1px solid var(--parchment-deep);
  background: transparent;
  cursor: pointer;
  transition: all 0.2s;
}
.o-dot.active {
  background: var(--crimson);
  border-color: var(--crimson);
}
.overlay-btns { display: flex; gap: 10px; }
.btn-primary {
  background: var(--crimson);
  border: 1px solid var(--crimson-bright);
  color: var(--parchment);
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  padding: 8px 18px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--crimson-bright); }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--parchment-deep);
  color: var(--ink-mid);
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  padding: 8px 18px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--gold); color: var(--ink); }

/* DECORATIVE DIVIDER */
.deco-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 24px 0;
  color: var(--gold);
  font-size: 16px;
}
.deco-divider::before, .deco-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--parchment-deep));
}
.deco-divider::after {
  background: linear-gradient(to left, transparent, var(--parchment-deep));
}

/* DB TABLE */
.db-row {
  display: flex;
  align-items: stretch;
  border: 1px solid var(--parchment-deep);
  margin-bottom: 4px;
  font-size: 13px;
}
.db-range {
  background: var(--ink);
  color: var(--gold-bright);
  font-family: var(--font-type);
  padding: 6px 10px;
  min-width: 90px;
  display: flex;
  align-items: center;
}
.db-bonus, .db-build {
  color: var(--ink-faded);
  padding: 6px 12px;
  border-left: 1px solid var(--parchment-deep);
  display: flex;
  align-items: center;
  flex: 1;
}
.db-build { flex: 0.5; min-width: 60px; }

/* QUOTE */
.blockquote {
  border-left: 3px solid var(--crimson);
  padding: 12px 18px;
  margin: 18px 0;
  background: rgba(139,26,26,0.04);
}
.blockquote p {
  font-style: italic;
  font-size: 15px;
  color: var(--ink-mid);
  line-height: 1.7;
}
.blockquote cite {
  display: block;
  margin-top: 6px;
  font-size: 12px;
  color: var(--crimson);
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-style: normal;
}

/* SKILL CATEGORIES */
.skill-cat {
  margin-bottom: 16px;
}
.skill-cat-name {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.skill-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.skill-tag {
  background: var(--ink);
  color: var(--parchment-deep);
  font-family: var(--font-type);
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid #3a2a14;
}
.skill-tag .base {
  color: var(--crimson);
  margin-left: 3px;
}

/* QUICK REF GRID */
.qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 640px) { .qr-grid { grid-template-columns: 1fr; } }
.qr-block {
  background: var(--ink);
  border: 1px solid #3a2a14;
  padding: 14px 16px;
}
.qr-title {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--gold-bright);
  text-transform: uppercase;
  border-bottom: 1px solid #3a2a14;
  padding-bottom: 6px;
  margin-bottom: 10px;
}
.qr-item {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 3px 0;
  border-bottom: 1px solid #2a1808;
  color: var(--parchment-deep);
}
.qr-item:last-child { border-bottom: none; }
.qr-item .label { color: var(--parchment); font-family: var(--font-body); }
.qr-item .val { font-family: var(--font-type); color: var(--crimson); }

/* MOV TABLE */
.mov-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 10px 0; }
.mov-table td { padding: 5px 10px; border: 1px solid var(--parchment-deep); color: var(--ink-faded); }
.mov-table td:first-child { background: rgba(139,105,20,0.1); font-family: var(--font-type); font-size: 12px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ── DATA ─────────────────────────────────────────────────────────────────────

const TABS = [
  { id: 'intro',    label: 'I. Introduction' },
  { id: 'create',   label: 'II. Investigator Creation' },
  { id: 'rules',    label: 'III. Core Rules' },
  { id: 'combat',   label: 'IV. Combat' },
  { id: 'sanity',   label: 'V. Sanity' },
  { id: 'quickref', label: 'VI. Quick Reference' },
];

const CHARACTERISTICS = [
  { abbr:'STR', name:'Strength',    roll:'3D6 × 5', desc:'Muscle power; melee damage, carrying weight.' },
  { abbr:'CON', name:'Constitution',roll:'3D6 × 5', desc:'Health & vitality; contributes to Hit Points.' },

function RulesSection() {
  return (
    <div className="page">

          <div className="ornament-line right"/>

        <div className="chap-title">Core Rules</div>
        <div className="chap-byline">The mechanics of the percentile system — success, failure, and the push</div>
      </div>

      <div className="cols-2">
        <div>
          <div className="section-block">
            <div className="section-label">The Dice System</div>
            <p className="prose">Call of Cthulhu uses percentile dice (<strong>two ten-sided dice</strong>, read as a number from 01–100). Roll equal to or <em>under</em> your skill or characteristic value to succeed.</p>
            <p className="prose" style={{marginTop:'10px'}}>Each skill and characteristic has three values noted on your sheet:</p>
            <table className="rules-table" style={{marginTop:'12px'}}>
              <thead><tr><th>Value</th><th>Use</th></tr></thead>
              <tbody>
                <tr><td><strong>Full Value</strong></td><td>Regular success threshold</td></tr>
                <tr><td><strong>Half Value</strong></td><td>Hard success threshold (÷2)</td></tr>
                <tr><td><strong>Fifth Value</strong></td><td>Extreme success threshold (÷5)</td></tr>
              </tbody>
            </table>
          </div>

          <div className="section-block">
            <div className="section-label">Levels of Success</div>
            <div className="success-row">
              <div className="success-box extreme">
                <div className="success-level">Extreme</div>
                <div className="success-val">Roll ≤ 1/5 skill</div>
              </div>
              <div className="success-box hard">
                <div className="success-level">Hard</div>
                <div className="success-val">Roll ≤ 1/2 skill</div>
              </div>
              <div className="success-box regular">
                <div className="success-level">Regular</div>
                <div className="success-val">Roll ≤ full skill</div>
              </div>
              <div className="success-box fail">
                <div className="success-level">Failure</div>
                <div className="success-val">Roll &gt; skill</div>
              </div>
            </div>
            <div className="callout crimson" style={{marginTop:'10px'}}>
              <div className="callout-title">Fumble</div>
              A roll of <strong>96–100</strong> (for skills below 50%) or <strong>100</strong> (for skills 50%+) is always a fumble — a catastrophic failure, often with additional consequences.
            </div>
          </div>

          <div className="section-block">
            <div className="section-label">Bonus &amp; Penalty Dice</div>
            <p className="prose" style={{marginBottom:'10px'}}>Some circumstances grant a Bonus Die (advantage) or impose a Penalty Die (disadvantage).</p>
            <table className="rules-table">
              <thead><tr><th>Type</th><th>How It Works</th></tr></thead>
              <tbody>
                <tr><td><strong>Bonus Die</strong></td><td>Roll an extra tens die; use the lower tens result (better outcome).</td></tr>
                <tr><td><strong>Penalty Die</strong></td><td>Roll an extra tens die; use the higher tens result (worse outcome).</td></tr>
              </tbody>
            </table>
            <p className="prose" style={{fontSize:'13px', marginTop:'8px'}}>Only one bonus or penalty die can be applied at a time. They cancel each other out. <strong>Luck rolls are never modified by bonus or penalty dice.</strong></p>
          </div>
        </div>

        <div>
          <div className="section-block">
            <div className="section-label">When to Roll</div>
            <p className="prose"><strong>Do not roll unless the Keeper asks you to.</strong> Routine tasks require no roll. Only roll when the outcome is uncertain and dramatically significant.</p>
            <div className="callout" style={{marginTop:'10px'}}>
              <div className="callout-title gold">Setting a Goal</div>
              Before rolling, establish what success means. State your goal clearly. "I want to persuade the clerk to hand over the files." The Keeper sets the difficulty level, then you roll. Rolling before the goal is set is like signing a contract you haven't read.
            </div>
          </div>

          <div className="section-block">
            <div className="section-label">Pushed Rolls</div>
            <p className="prose">If a skill roll fails, you may attempt it again as a <strong>Pushed Roll</strong> — but only if you can justify to the Keeper what your investigator is doing differently, at greater risk or effort.</p>
            <p className="prose" style={{marginTop:'8px'}}>A failed pushed roll brings <strong>severe consequences</strong> determined by the Keeper. You can only push a roll once.</p>
          </div>

          <div className="section-block">
            <div className="section-label">Opposed Rolls</div>
            <p className="prose">When two characters directly contest each other, both roll. The winner achieves the <strong>higher level of success</strong>. On a tie, the character with the higher skill value wins (or the situation is re-evaluated).</p>
          </div>

          <div className="section-block">
            <div className="section-label">Special Rolls</div>
            <table className="rules-table">
              <thead><tr><th>Roll Type</th><th>How It Works</th></tr></thead>
              <tbody>
                <tr><td><strong>Idea Roll</strong></td><td>Roll against INT. Used when stuck—grants an intuitive nudge to move the investigation forward.</td></tr>
                <tr><td><strong>Know Roll</strong></td><td>Roll against EDU. Represents general knowledge from life experience.</td></tr>

function SanitySection() {
  const [sanValue, setSanValue] = useState(50);
  const maxSan = 99;
  const pips = Array.from({length: 99}, (_, i) => i + 1);

  return (
    <div className="page">
      <div className="chap-header">
        <div className="chap-num">Chapter V</div>
        <div className="chap-ornament">
          <div className="ornament-line"/>
          <div className="ornament-diamond"/>
          <div className="ornament-line right"/>
        </div>
        <div className="chap-title">Sanity</div>
        <div className="chap-byline">The fragile membrane between reason and the abyss</div>
      </div>

      <p className="prose" style={{marginBottom:'20px'}}>Your <strong>Sanity (SAN)</strong> begins equal to your POW characteristic. It is the measure of your investigator's psychological stability. Every encounter with the Mythos, violence, and despair grinds it away.</p>

      {/* INTERACTIVE SAN METER */}
      <div className="san-meter">
        <div className="san-label">Sanity Track — Drag to adjust: {sanValue}/99</div>
        <input type="range" min="0" max="99" value={sanValue} onChange={e => setSanValue(Number(e.target.value))}
          style={{width:'100%', marginBottom:'12px', accentColor:'var(--crimson)'}}/>
        <div className="san-track">
          {pips.map(p => {
            let cls = 'san-pip';
            if (p <= sanValue) {
              if (sanValue >= 70) cls += ' high';
              else if (sanValue >= 30) cls += ' mid';
              else cls += ' low';
            }
            return <div key={p} className={cls}/>;
          })}
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginTop:'8px', fontFamily:'var(--font-type)', fontSize:'11px', color:'var(--parchment-deep)'}}>
          <span>0 — Permanently Insane</span>
          <span style={{color: sanValue >= 70 ? 'var(--gold)' : sanValue >= 30 ? 'var(--crimson)' : 'var(--crimson-dark)'}}>
            {sanValue >= 70 ? 'Stable' : sanValue >= 30 ? 'Troubled' : sanValue > 0 ? 'Unravelling' : 'LOST'}
          </span>
          <span>99 — Maximum</span>
        </div>
      </div>

      <div className="cols-2" style={{marginTop:'24px'}}>
        <div>
          <div className="section-block">
            <div className="section-label">Making a Sanity Roll</div>
            <p className="prose" style={{marginBottom:'10px'}}>Whenever investigators encounter something unnatural, witness violence, or confront the Mythos, the Keeper calls for a <strong>Sanity roll</strong>. Roll D100 equal to or under your current SAN to succeed.</p>
            <table className="rules-table">
              <thead><tr><th>Result</th><th>SAN Loss</th></tr></thead>
              <tbody>
                <tr><td><strong>Success</strong></td><td>Minimum loss (the lower die roll shown)</td></tr>
                <tr><td><strong>Failure</strong></td><td>Full loss (the higher die roll shown)</td></tr>
              </tbody>
            </table>
            <p className="prose" style={{fontSize:'13px', marginTop:'8px'}}>SAN losses are noted as <strong>two values</strong>, e.g. <em>0/1D4 SAN</em>. Success = 0; Failure = 1D4. Reduce your current SAN accordingly.</p>
          </div>

          <div className="section-block">
            <div className="section-label">Temporary Insanity</div>
            <p className="prose">If an investigator loses <strong>5 or more SAN in a single roll</strong>, they must make a further check or fall into a temporary bout of madness.</p>
            <div className="callout crimson">
              <div className="callout-title">Bout of Madness</div>
              The Keeper takes narrative control of your investigator for the duration of the bout. They may panic, flee, act violently, babble incoherently, or simply freeze. The bout typically lasts 1D10 rounds (or longer in extended situations).
            </div>
          </div>

          <div className="section-block">
            <div className="section-label">Indefinite Insanity</div>
            <p className="prose">If an investigator loses <strong>one-fifth (20%) of their current SAN in a single day</strong>, they suffer indefinite insanity.</p>
            <div className="callout">
              <div className="callout-title gold">Tracking the 20% Line</div>
              Mark a line on your sheet. If Harvey has SAN 45, losing 9 points (20% of 45) in one day triggers indefinite insanity. The line shifts when your SAN changes.
            </div>
            <p className="prose" style={{marginTop:'8px', fontSize:'13px'}}>Recovery from indefinite insanity requires <strong>1D6 months of institutional care</strong> or therapy. The investigator gains a phobia, mania, or other disorder.</p>
          </div>
        </div>

        <div>
          <div className="section-block">
            <div className="section-label">Typical SAN Loss Examples</div>
            <table className="rules-table">
              <thead><tr><th>Trigger</th><th>SAN Loss</th></tr></thead>
              <tbody>
                <tr><td>Seeing a badly mutilated corpse</td><td>0/1D3</td></tr>
                <tr><td>Witnessing someone being killed</td><td>0/1D3</td></tr>
                <tr><td>Killing another human being</td><td>0/1D4</td></tr>
                <tr><td>Seeing a Deep One or ghoul</td><td>0/1D6</td></tr>
                <tr><td>Encountering a Mythos monster</td><td>1/1D6</td></tr>
                <tr><td>Reading a significant Mythos tome</td><td>1D4/1D10</td></tr>
                <tr><td>Encountering a Great Old One</td><td>1D10/1D100</td></tr>
              </tbody>
            </table>
          </div>

          <div className="section-block">
            <div className="section-label">Cthulhu Mythos Skill &amp; Max SAN</div>
            <p className="prose">As investigators learn more about the Mythos, they gain points in the <strong>Cthulhu Mythos</strong> skill. This knowledge corrupts sanity.</p>
            <div className="callout crimson">
              <div className="callout-title">Maximum SAN</div>
              Maximum Sanity = <strong>99 minus Cthulhu Mythos skill</strong>. A Cthulhu Mythos of 20% means your SAN can never rise above 79. Once this maximum is reached, your investigator has seen too much.
            </div>
          </div>

          <div className="section-block">
            <div className="section-label">Regaining Sanity</div>
            <table className="rules-table">
              <thead><tr><th>Method</th><th>SAN Regained</th></tr></thead>
              <tbody>
                <tr><td>Successful skill improvement at session end</td><td>+1D10 (Keeper discretion)</td></tr>
                <tr><td>Completing an investigation / defeating evil</td><td>+1D10 or more</td></tr>
                <tr><td>Psychoanalysis (monthly, 1 month treatment)</td><td>+1D3 on a successful roll</td></tr>
                <tr><td>Spending time with a Bond / loved one</td><td>+1D3 (Keeper discretion)</td></tr>
              </tbody>
            </table>
          </div>

          <div className="section-block">
            <div className="section-label">Phobias &amp; Manias</div>
            <p className="prose" style={{fontSize:'13px'}}>While <strong>sane</strong>, a phobia or mania is just a character trait you can roleplay as you wish. While <strong>insane</strong>, encountering the subject of a phobia imposes a Penalty Die on any action not directly related to fleeing or fighting the source. A mania may be triggered by the Keeper, causing you to indulge it or suffer a Penalty Die.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState('intro');
  const [showTutorial, setShowTutorial] = useState(true);

  const renderSection = () => {
    switch(tab) {
      case 'intro':    return <IntroSection/>;
      case 'create':   return <CreateSection/>;
      case 'rules':    return <RulesSection/>;
      case 'combat':   return <CombatSection/>;
      case 'sanity':   return <SanitySection/>;
      case 'quickref': return <QuickRefSection/>;
      default: return null;
    }
  };

  return (
    <>
      {showTutorial && <Tutorial onClose={() => setShowTutorial(false)}/>}

      <div className="masthead">
        <div className="masthead-inner">
          <div className="masthead-top">
            <div>
              <div className="masthead-title">Call of Cthulhu</div>
              <div className="masthead-sub">Investigator's Primer · 7th Edition · Player's Reference</div>
            </div>
            <button className="orient-btn" onClick={() => setShowTutorial(true)}>⊕ Keeper's Briefing</button>
          </div>
          <div className="nav-strip">
            {TABS.map(t => (
              <button key={t.id} className={`nav-tab ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="canvas">
        {renderSection()}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
