name: Deploy static site and naeethim command centre

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: naeethim-command-centre/package.json

      - name: Install app dependencies
        working-directory: naeethim-command-centre
        run: npm install

      - name: Build app
        working-directory: naeethim-command-centre
        run: npm run build

      - name: Assemble Pages site
        run: |
          rm -rf site
          mkdir -p site
          rsync -a --exclude='.git' --exclude='.github' --exclude='naeethim-command-centre/node_modules' --exclude='naeethim-command-centre/dist' ./ site/
          rm -rf site/naeethim-command-centre
          mkdir -p site/naeethim-command-centre
          cp -R naeethim-command-centre/dist/. site/naeethim-command-centre/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4