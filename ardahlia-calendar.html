<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ardahlian Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0d13;
      --surface:  #12151d;
      --surface2: #181c27;
      --border:   rgba(255,255,255,0.07);
      --text:     #cec3aa;
      --text-dim: rgba(180,168,146,0.55);
      --text-faint: rgba(160,150,130,0.35);
      --aurora-line: linear-gradient(90deg, transparent 0%, rgba(70,120,210,0.7) 25%, rgba(70,200,150,0.6) 55%, rgba(160,80,210,0.4) 80%, transparent 100%);
    }

    body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Palatino, Georgia, serif; min-height: 100vh; }

    /* ── HEADER ─────────────────────────────────── */
    .cal-header {
      position: relative;
      text-align: center;
      padding: 46px 24px 32px;
      border-bottom: 1px solid var(--border);
      background:
        radial-gradient(ellipse 90% 65% at 50% -5%, rgba(45,85,190,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 55% 40% at 20% 0%,  rgba(70,180,120,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 45% 30% at 80% 0%,  rgba(150,70,210,0.07) 0%, transparent 55%);
      overflow: hidden;
    }
    .cal-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--aurora-line);
    }
    .cal-eyebrow {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(140,165,210,0.6);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .cal-title {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 32px;
      font-weight: 700;
      color: #ede3cc;
      letter-spacing: 2px;
      text-shadow: 0 0 50px rgba(70,110,210,0.35);
      margin-bottom: 6px;
    }
    .cal-sub {
      font-size: 13.5px;
      color: var(--text-dim);
      font-style: italic;
      letter-spacing: 0.3px;
    }

    /* ── CONTROLS ───────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 24px 0;
      flex-wrap: wrap;
    }
    .ctrl-label {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(160,150,130,0.45);
    }
    .s-btn {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 10.5px;
      letter-spacing: 0.8px;
      padding: 5px 13px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.09);
      background: transparent;
      color: rgba(195,185,162,0.65);
      cursor: pointer;
      transition: all 0.18s;
    }
    .s-btn:hover { background: rgba(255,255,255,0.05); color: #ddd4bb; }
    .s-btn.active { color: #f0e8d5; border-color: var(--s-accent); background: var(--s-badge); box-shadow: 0 0 14px var(--s-glow); }

    /* ── WEEK BANNER ────────────────────────────── */
    .week-banner {
      margin: 16px 24px 0;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      gap: 1px;
    }
    .wb-item { text-align: center; }
    .wb-n { font-size: 8.5px; color: var(--text-faint); font-family: 'Cinzel', serif; margin-bottom: 2px; }
    .wb-d { font-size: 10.5px; color: rgba(170,160,138,0.55); font-family: 'Cinzel', serif; letter-spacing: 0.2px; }

    /* ── LEGEND ROW ─────────────────────────────── */
    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      padding: 12px 24px 0;
      align-items: center;
    }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--text-dim); white-space: nowrap; }
    .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .leg-astro { width: 8px; height: 8px; border-radius: 50%; background: #d4a040; box-shadow: 0 0 5px 1px rgba(212,160,64,0.45); flex-shrink: 0; }
    .leg-div { width: 1px; height: 16px; background: rgba(255,255,255,0.08); margin: 0 4px; }

    /* ── MOON LEGEND ────────────────────────────── */
    .moon-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      padding: 8px 24px 0;
      align-items: center;
    }
    .ml-label {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(160,150,130,0.4);
      text-transform: uppercase;
    }

    /* ── MONTH GRID ─────────────────────────────── */
    .months-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 20px 24px 40px;
    }
    @media (max-width: 780px) { .months-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 500px) { .months-grid { grid-template-columns: 1fr; padding: 14px; } }

    /* ── MONTH CARD ─────────────────────────────── */
    .month-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s;
    }
    .month-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; width: 3px;
      background: var(--s-border-grad);
    }
    .mc-head {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 11px 13px 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: var(--mc-glow);
    }
    .mc-num {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 10px;
      color: var(--s-accent);
      opacity: 0.7;
      padding-top: 4px;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .mc-info { flex: 1; min-width: 0; }
    .mc-name { font-family: 'Cinzel', Palatino, serif; font-size: 15px; font-weight: 600; color: #ede3cc; letter-spacing: 0.4px; line-height: 1.15; }
    .mc-tag { font-size: 10.5px; color: var(--text-faint); font-style: italic; margin-top: 1px; }
    .mc-badge {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 8.5px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      background: var(--s-badge);
      color: var(--s-accent);
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      margin-top: 3px;
    }
    .mc-lore {
      padding: 5px 13px 5px 18px;
      font-size: 11px;
      font-style: italic;
      color: var(--text-dim);
      opacity: 0.75;
      line-height: 1.45;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    /* ── DAY GRID ───────────────────────────────── */
    .day-grid { padding: 9px 10px 11px 13px; }
    .dg-hdr-row {
      display: grid;
      grid-template-columns: repeat(10,1fr);
      gap: 2px;
      margin-bottom: 3px;
    }
    .dg-hdr {
      text-align: center;
      font-size: 7.5px;
      color: var(--text-faint);
      font-family: 'Cinzel', Palatino, serif;
      letter-spacing: 0.1px;
    }
    .dg-row {
      display: grid;
      grid-template-columns: repeat(10,1fr);
      gap: 2px;
      margin-bottom: 2px;
    }

    /* ── DAY CELL ───────────────────────────────── */
    .day-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3px 1px 3px;
      border-radius: 3px;
      min-height: 30px;
      transition: background 0.15s;
      position: relative;
    }
    .day-cell.clickable { cursor: pointer; }
    .day-cell.clickable:hover { background: rgba(255,255,255,0.07); }
    .dc-num {
      font-size: 8.5px;
      color: var(--text-faint);
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
      font-family: 'Cinzel', Palatino, serif;
    }
    .day-cell.has-fest .dc-num { color: rgba(205,194,170,0.75); }
    .day-cell.has-moon .dc-num { color: rgba(190,180,158,0.5); }
    .day-cell.has-fest.has-moon .dc-num { color: rgba(215,205,182,0.82); }
    .dc-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-top: 2px;
      min-height: 14px;
    }
    .dc-pip {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dc-pip.astro { width: 6px; height: 6px; }

    /* ── TOOLTIP ────────────────────────────────── */
    #tooltip {
      position: fixed;
      display: none;
      z-index: 300;
      pointer-events: none;
      transform: translate(-50%, -100%);
      margin-top: -8px;
    }
    .tooltip-inner {
      background: #1c2030;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 5px;
      padding: 6px 10px;
      font-size: 11.5px;
      color: #e0d8c0;
      font-family: 'Crimson Pro', Palatino, serif;
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
      white-space: normal;
      max-width: 160px;
      text-align: center;
      line-height: 1.4;
    }
    .tt-fest { font-weight: 500; }
    .tt-moon { font-size: 10.5px; color: rgba(200,190,165,0.7); font-style: italic; margin-top: 2px; }

    /* ── MODAL ──────────────────────────────────── */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.62);
      display: flex;
      align-items: flex-end;
      z-index: 400;
    }
    #modal-panel {
      background: #13161f;
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom: none;
      border-top: 2px solid var(--m-accent);
      border-radius: 10px 10px 0 0;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      max-height: 72vh;
      overflow-y: auto;
      padding: 26px 30px 40px;
      position: relative;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(28px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    #modal-close {
      position: absolute;
      top: 14px; right: 18px;
      background: none; border: none;
      color: rgba(190,180,158,0.45);
      font-size: 24px;
      cursor: pointer;
      padding: 3px 6px;
      line-height: 1;
      transition: color 0.15s;
    }
    #modal-close:hover { color: #ddd4bb; }
    .m-where {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: rgba(155,145,125,0.55);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .m-name {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 23px;
      font-weight: 600;
      color: #f0e8d2;
      letter-spacing: 0.4px;
      line-height: 1.2;
      margin-bottom: 14px;
    }
    .m-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }
    .m-domain {
      font-family: 'Cinzel', Palatino, serif;
      font-size: 9.5px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 3px;
    }
    .m-deity { font-size: 14px; color: rgba(195,185,162,0.75); font-style: italic; }
    .m-astro-badge {
      font-size: 10.5px;
      color: #d4a040;
      background: rgba(70,52,8,0.4);
      border: 1px solid rgba(212,160,64,0.3);
      border-radius: 3px;
      padding: 2px 8px;
    }
    .m-moon-badge {
      font-size: 10.5px;
      color: rgba(210,200,178,0.65);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      padding: 2px 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .m-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--m-accent), transparent);
      opacity: 0.5;
      margin: 0 0 16px;
    }
    .m-desc {
      font-size: 15.5px;
      line-height: 1.8;
      color: #c5b9a0;
      font-style: italic;
    }
    .m-narven-note {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(212,160,64,0.07);
      border-left: 2px solid rgba(212,160,64,0.35);
      border-radius: 0 4px 4px 0;
      font-size: 12px;
      color: rgba(210,175,100,0.7);
      font-style: italic;
      line-height: 1.55;
    }
  </style>
</head>
<body>

<div id="app"></div>
<div id="tooltip"><div class="tooltip-inner" id="tt-inner"></div></div>
<div id="modal" style="display:none">
  <div id="modal-panel">
    <button id="modal-close">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════

const MONTHS = [
  { num:1,  name:"Aurveth",  short:"Aurv", season:"Winter", tag:"deep winter",    lore:"Aurora-veil — the Longnight at its height" },
  { num:2,  name:"Corath",   short:"Cor",  season:"Winter", tag:"late winter",     lore:"Shared endurance through the cold" },
  { num:3,  name:"Thalven",  short:"Thal", season:"Winter", tag:"first thaw",      lore:"Earth-waking; soil stirs, sailmakers prepare" },
  { num:4,  name:"Veloran",  short:"Vel",  season:"Spring", tag:"spring equinox",  lore:"The balanced veil — light and dark equal" },
  { num:5,  name:"Elavar",   short:"Ela",  season:"Spring", tag:"peak spring",     lore:"The growing — the world in full spring" },
  { num:6,  name:"Zephran",  short:"Zeph", season:"Spring", tag:"late spring",     lore:"Open wind — sailing season fully begun" },
  { num:7,  name:"Solareth", short:"Sol",  season:"Summer", tag:"summer solstice", lore:"Sun's height — the furthest reach of light" },
  { num:8,  name:"Arnveld",  short:"Arn",  season:"Summer", tag:"late summer",     lore:"The active field — deeds, not ceremony" },
  { num:9,  name:"Yorath",   short:"Yor",  season:"Autumn", tag:"harvest",         lore:"The yield — the earth's return" },
  { num:10, name:"Caldven",  short:"Cald", season:"Autumn", tag:"mid-autumn",      lore:"Cold coming — the year begins to seal" },
  { num:11, name:"Selaneth", short:"Sela", season:"Autumn", tag:"late autumn",     lore:"The settling — debts cleared, year balanced" },
  { num:12, name:"Kaelvar",  short:"Kael", season:"Winter", tag:"year's end",      lore:"Hearthseal — the Longnight returns" },
];

const WEEK = ["Auren","Brem","Thaelon","Keld","Narven","Glaer","Solveth","Pelk","Seradel","Kaelden"];

const SEASONS = {
  Winter: { accent:"#5a7ec8", badge:"rgba(28,42,82,0.8)", glow:"rgba(60,90,180,0.22)", border:"rgba(80,120,220,0.55)" },
  Spring: { accent:"#55a847", badge:"rgba(22,52,18,0.8)", glow:"rgba(65,145,60,0.22)", border:"rgba(75,170,65,0.55)" },
  Summer: { accent:"#c49030", badge:"rgba(60,38,8,0.8)",  glow:"rgba(185,130,35,0.22)",border:"rgba(220,158,45,0.55)" },
  Autumn: { accent:"#c05e28", badge:"rgba(58,24,8,0.8)",  glow:"rgba(185,78,32,0.22)", border:"rgba(210,98,42,0.55)" },
};

const DOMAINS = {
  life:  { dot:"#5db85c", name:"Life",         bg:"rgba(20,72,20,0.4)",  border:"rgba(93,184,92,0.5)"  },
  lum:   { dot:"#d4a040", name:"Light",        bg:"rgba(72,54,10,0.4)",  border:"rgba(212,160,64,0.5)" },
  know:  { dot:"#5090d0", name:"Knowledge",    bg:"rgba(18,50,96,0.4)",  border:"rgba(80,144,208,0.5)" },
  war:   { dot:"#c84040", name:"War",          bg:"rgba(76,18,18,0.4)",  border:"rgba(200,64,64,0.5)"  },
  trick: { dot:"#9080e0", name:"Trickery",     bg:"rgba(48,38,96,0.4)",  border:"rgba(144,128,224,0.5)"},
  prop:  { dot:"#a09080", name:"Propitiation", bg:"rgba(48,44,38,0.4)",  border:"rgba(160,144,128,0.5)"},
  multi: { dot:"#3ab898", name:"Multi-deity",  bg:"rgba(14,68,58,0.4)",  border:"rgba(58,184,152,0.5)" },
};

// Moon phase per day (same every month — 30-day lunar cycle)
const MOON_PHASE = { 1:0, 5:1, 8:2, 11:3, 15:4, 19:5, 22:6, 26:7 };
const MOON_NAMES = ["New Moon","Waxing Crescent","First Quarter","Waxing Gibbous","Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"];

// Days where all 4 astronomical markers coincide with Full Moon + Narven (market day)
const NARVEN_COINCIDENCE = { "4-15":true, "7-15":true, "9-15":true };
// New Moon on New Year Day 1
const NEWYEAR_MOON = { "1-1": true };

const FESTIVALS = {
  "1-1":  { name:"The Threshold",           deity:"Aeonius · Multi-deity",    domain:"know",
    desc:"New Year folk rite. Every household shrine is cleaned and re-dedicated. Aeonius is observed as the year's time-thread turns; multi-deity acknowledgments made at the exact hour of midnight. Folk custom: something old is burned, and the year ahead is named aloud — because a year without a name has no shape to hold." },
  "1-15": { name:"Midwinter's Watch",        deity:"Nyx · Abaddon",            domain:"prop",
    desc:"The deep dark of the year is acknowledged rather than celebrated. Candles kept burning all night; fears named aloud before the fire. Folk logic: Abaddon's domain is surprise suffering — naming your fear to him voluntarily removes his leverage. Nyx is acknowledged with the lip-touch gesture whenever anything private is spoken. No one sleeps during Midwinter's Watch in communities that keep it seriously." },
  "2-10": { name:"Ferryman's Tithe",         deity:"Charon",                   domain:"life",
    desc:"Communities gather to properly inter everyone who died since the previous Kaelvar — especially those lost to cold, illness, or hardship. Food offerings left at the town's edge at dusk. The coin placed outside the sickroom door becomes the coin placed at the crossroads. Charon is addressed, not invited: 'This for you, ferryman. The rest when it's owed.'" },
  "2-25": { name:"Seedkeeper's Night",       deity:"Elaria",                   domain:"life",
    desc:"An informal folk rite held before seeds are stored away for planting. Each seed is pressed to the lips and whispered to — what you need from the spring, told to the thing that will carry it into the earth. Elaria is not formally invoked; she is treated as already present in the seed itself. No clergy involved. No ceremony. Just the farmer, the seed, and the dark." },
  "3-10": { name:"The Greening",             deity:"Elaria",                   domain:"life",
    desc:"Elaria's major spring festival and the formal opening of planting season. Household shrines cleaned and rededicated; the first seeds go into the ground with communal rites. In many communities, couples plant the first row together as a fertility rite — whether they are planting a field or a family or both is left deliberately ambiguous. The day is considered auspicious for marriages to be announced, though the wedding happens later." },
  "3-20": { name:"First Feast",              deity:"Nalakei · Elaria",         domain:"life",
    desc:"The first outdoor communal meal of the year. Nalakei and Elaria are honoured together — joy and life acknowledged in the same breath. Communities eat outside even if it is still cold, because Nalakei doesn't hear you when you're alone. The First Feast is also the traditional moment for announcing coming-of-age declarations, betrothals, and any significant change in a community member's life that the community should know about." },
  "3-28": { name:"Voyage Opening",           deity:"Zephyrion",                domain:"life",
    desc:"In coastal and river communities, the first ships of the year are formally launched with Zephyrion's rites. The captain offers a coin to the water; the crew names their destination aloud; the oars are dipped three times before the first stroke. This is seamanship as much as religion. Experienced sailors consider skipping these rites equivalent to leaving harbour without checking the ropes." },
  "4-5":  { name:"Dawn Songs",               deity:"Lyriana",                  domain:"lum",
    desc:"Lyriana's Festival of Echoing Harmony. Music competitions, poetry gatherings, and storytelling that begins at dawn and runs until the sun is fully up. Young artists often give their first public performance here — treated as a soft coming-of-age moment for those whose vocation is creative. Folk belief: Lyriana hears music and speech more clearly at dawn than at any other hour, because that is when silence breaks for the first time each day." },
  "4-15": { name:"Spring Equinox",           deity:"Multi-deity",              domain:"multi", astronomical:true,
    desc:"No single deity owns the equinox in folk practice — it is a threshold moment acknowledged multi-deity. Elaria for the growth, Aeonius for the turning of the season's thread, Nalakei for the warmth returning. In communities with strong temple ties, clerics lead the rites; in communities without, an elder or village leader performs the acknowledgments and everyone eats outdoors until midnight." },
  "4-20": { name:"Forgemaster's Day",        deity:"Thalara",                  domain:"know",
    desc:"Thalara's crafting festival. New apprentices are formally accepted by their masters, their names entered in the workshop records. Workshop shrines cleaned and rededicated. The tradition is that completing a piece of work entirely on Forgemaster's Day makes it doubly well-made — a belief that functions as a useful fiction for getting craftspeople to work on their holy day." },
  "5-1":  { name:"Coming-of-Age Days",       deity:"Multi-deity",              domain:"multi",
    desc:"Days 1–5: The traditional window for young people to formally declare their adult devotion — which deity they affiliate with as an adult. Not an exclusive commitment, but a declaration of primary identity. Ceremonies vary: Arcturius affiliates hold endurance vigils; Nymue affiliates make first castings under open sky; Thalara affiliates complete a first independent work; Nalakei affiliates lead a community feast. Those who choose no affiliation are considered unfinished in many rural communities — not shameful, just incomplete." },
  "5-15": { name:"Festival of Molten Tides", deity:"Thalara",                  domain:"know",
    desc:"Thalara's larger and more public festival — a showcase of craft across all trades. Trade fairs, competitive demonstrations, auctions of exceptional work. Dwarven communities make major pilgrimages to Forgeheart Sanctums. The binding tradition: every master must teach one skill publicly and for free on this day. Those who don't are considered to have dishonoured Thalara regardless of their other observances." },
  "5-25": { name:"Anarion's Hunt Opening",   deity:"Anarion",                  domain:"life",
    desc:"The formal beginning of the major hunting season. Hunters invoke Anarion before their first significant hunt of the year — not for luck, but for permission. Folk understanding: Anarion doesn't control where prey is found; he controls whether the wilds cooperate with you or resist you. Entering his domain without acknowledgment is considered both rude and practically dangerous. The rite involves a moment of complete stillness in the wood before the first step of the hunt." },
  "6-15": { name:"Festival of Silver Nights",deity:"Nymue",                    domain:"know",
    desc:"Nymue's major festival, held at the full moon nearest to mid-month. Moonlit ceremonies for arcane practitioners; students of magic make their first formal casting under open sky rather than by candlelight. In elven communities, this is the holiest night of the year — the moment when the boundary between the material world and its magical underpinning is thinnest. Non-practitioners who are present at moonrise are considered to have received Nymue's notice, for better or worse." },
  "6-20": { name:"Stratagem Days",           deity:"Mae'el",                   domain:"war",
    desc:"Mae'el is observed in military communities through tactical exercises, war games, and the formal review of the season's strategic plans. Not prayer — planning done with deliberate rigour, which is how Mae'el is honoured. Officers who consult with the Council of Warwise Sages during this period are considered to have his attention for the coming campaign season. Common soldiers have almost no involvement; Stratagem Days belongs entirely to the officer class." },
  "7-14": { name:"Eve of the Long Day",      deity:"Luminastra",               domain:"lum",
    desc:"The night before the solstice, dedicated to Luminastra. In regions where auroras are visible, this is among the most spectacular nights of the year — communities gather in open places and watch. The Glowing Vigil is held: lanterns in aurora colours set on water or high ground, representing hopes carried into the longest day. The vigil runs all night without sleep; those who fall asleep are gently woken and not mocked." },
  "7-15": { name:"Festival of Radiance",     deity:"Solariel",                 domain:"lum", astronomical:true,
    desc:"Solariel's major festival and the year's greatest light celebration, held on the summer solstice. Healing ceremonies, mass dawn prayers at temples and outdoors. The sick are carried to open ground to catch first light. Pilgrimages to Sunspire Temples. Folk understanding: the sun is at its furthest reach today, and Solariel's influence travels with it — whatever you want healed or changed, today is when prayer has the furthest it can go." },
  "7-25": { name:"Tournament of Valour",     deity:"Arcturius",                domain:"war",
    desc:"Days 25–28: Arcturius's grand martial tournament across several days. Knights, soldiers, and warriors compete in all forms of combat. The Bridge Stand rite — standing exposed from sunrise to sunset — is performed by those seeking Arcturius's direct favour as a rite of passage. Military alliances are traditionally formed in Solareth — the fights on the field are often less consequential than the conversations in the stands." },
  "8-10": { name:"Night of Veils",           deity:"Nyx",                      domain:"trick",
    desc:"Nyx's major annual observance. Location passed by whisper, never announced. Attendees arrive masked; identities concealed even from each other. Secrets are traded, new alliances formed, old grudges settled under the rule of temporary neutral ground. As dawn approaches, gathered secrets are ritually offered to Nyx. The neutral ground tradition is broken often enough that attendance carries genuine risk — which most attendees consider part of the rite's authenticity." },
  "8-20": { name:"Feast of Temptations",     deity:"Lillith",                  domain:"trick",
    desc:"Lillith's observance — often unofficial, sometimes actively suppressed by light-aligned temples. Followers believe that confronting your desires directly grants power over them. In practice this ranges from philosophical gatherings about the nature of want to considerably less philosophical events. Temples of Paragon and Solariel consider this the most theologically dangerous festival in the calendar. Its persistence despite periodic suppression is itself considered evidence of Lillith's efficacy." },
  "9-1":  { name:"Harvest Moon",             deity:"Nalakei · Elaria",         domain:"life",
    desc:"The first day of harvest, marked by Nalakei and Elaria together. The most joyful period of the folk calendar begins. The tradition: the entire community brings in the first day's yield together, then feasts on what was grown the previous year. No one works alone on Harvest Moon; even those with no farm connection join in. Nalakei's presence is understood to make the labour lighter and the yield larger, though whether this is magic or psychology is a question the folk calendar does not find interesting." },
  "9-15": { name:"Yorath's Yield",           deity:"Nalakei · Multi-deity",    domain:"multi", astronomical:true,
    desc:"The great harvest festival at the autumn equinox. Communities feast, settle the year's debts, arrange marriages, and hold the season's largest market fairs. This is the most economically important festival of the year — apprenticeships concluded, contracts renewed, land agreements settled, disputes mediated before the year closes. Zelos is acknowledged at every significant transaction. Elaria is invoked at every marriage. Charon is quietly noted at every reading of the year's dead." },
  "9-28": { name:"Voyage Closing",           deity:"Zephyrion",                domain:"life",
    desc:"Days 28–30: The formal end of the sailing season. Ships are brought to harbour with Zephyrion's closing rites — the captain thanks the sea for what was given, names the dead who crossed to Charon on the water this year, and asks permission to return in Thalven. Failure to perform the closing rite is considered a guarantee of bad fortune in the next season. In some communities, a ship that returns without completing the rite is not permitted to moor until the rite is performed in harbour." },
  "10-5": { name:"Blood Offering",           deity:"Ba'haal",                  domain:"prop",
    desc:"Ba'haal is propitiated in warrior and soldier cultures before winter — historically the season of resource-scarcity conflict. The rite: a small cut to the thumb, blood pressed to gate, threshold, or weapon. The meaning is explicit and spoken aloud: 'Here is blood freely given; find your hunger answered elsewhere.' Not worship. An attempt to establish the terms of the coming dark season on your own initiative before violence establishes them for you." },
  "10-15":{ name:"Festival of Falling Leaves",deity:"Elaria",                  domain:"life",
    desc:"Elaria's autumn observance — quieter and more melancholy than the Greening. Communities mourn the year's losses, honour the dead, and collect leaves as a folk rite of release. Each leaf gathered represents something being let go: a grief, a grudge, a hope that didn't grow. These are burned rather than kept. The festival ends at dusk; what isn't released by nightfall is understood to be carried into the winter, which is considered neither good nor bad, just honest." },
  "10-25":{ name:"Eon's Remembrance",        deity:"Aeonius",                  domain:"know",
    desc:"Aeonius is observed by scholars, historians, and those whose work involves time. The year's record is formally reviewed — what was learned, what was lost, what patterns emerged. Libraries hold public readings; scholars open their notes to visitors. Folk understanding: Aeonius watches the closing of each year's thread, and documenting history carefully is a form of prayer to him. This is the one festival where the act of writing is itself the rite." },
  "11-1": { name:"Laments of the River",     deity:"Charon",                   domain:"life",
    desc:"Charon's major annual observance and one of the most universally kept festivals in Ardahlia. Community-wide death rites for everyone who died in the past year. The recently dead are formally released — possessions distributed, names spoken aloud in the town square, the ferryman's tithe paid on their behalf. Communities that skip this festival accumulate unsettled dead in the folk understanding. Charon cannot collect what hasn't been properly offered." },
  "11-15":{ name:"The Dim Day",              deity:"Paragon",                  domain:"lum",
    desc:"Paragon observed in a quiet civic-religious rite. Community disputes heard and settled before the year closes; contracts renewed or ended; the year's justice accounting done. Judgments made on this day are considered especially binding in folk tradition — Paragon's attention is understood to be most present when the year's ledger is being balanced. Magistrates and mediators consider this their most important working day. Even diminished, Paragon's folk presence in civic life is substantial." },
  "11-25":{ name:"Night of Whispered Truths",deity:"Nyx",                      domain:"prop",
    desc:"Folk tradition holds that secrets told aloud in darkness tonight reach Nyx before dawn, and that she may use them — for good or ill. This generates either a night of confessions and genuine intimacy in communities with a healthy relationship to the tradition, or a night of locked doors and absolute silence in communities that have learned to be cautious. Both responses are considered theologically appropriate. Nyx is acknowledged regardless." },
  "12-15":{ name:"Glowing Vigil",            deity:"Luminastra",               domain:"lum",
    desc:"Luminastra honoured on the water. Communities line rivers, lakes, and coastlines with lanterns in aurora colours — set afloat representing the year's drifting hopes and dreams. The vigil is kept until the lanterns drift out of sight or extinguish; watching them go is the rite, not the lighting. In communities far from water, lanterns are set on high ground and left to burn. The mood is reflective rather than celebratory — a reckoning with what was hoped for and what arrived." },
  "12-20":{ name:"Winter Feast",             deity:"Nalakei",                  domain:"life",
    desc:"Nalakei's indoor winter celebration — a deliberate act of joy before the darkest period of the year. Food made deliberately elaborate; music played continuously; no one eats alone. Folk tradition: joy refused in darkness returns as sorrow, and gathering warmth in Kaelvar stores something intangible for the cold ahead. Attendance at Winter Feast is a social obligation as much as a religious one. Absence is noted and quietly worried about." },
  "12-30":{ name:"Year's End",               deity:"Aeonius · Solariel",       domain:"multi", astronomical:true,
    desc:"The longest night and the close of the year's thread. Aeonius is observed in silence at midnight as the old year closes. Solariel is prayed to at dawn — the returning sun's first light greeted with genuine gratitude, because on this night the darkness genuinely wins and the light genuinely returns. Every household fire is kept burning through the night. No shrine is left unlit. No hearth permitted to go cold. This is not superstition — it is acknowledgment that darkness must not go uncontested, even symbolically." },
};


// ═══════════════════════════════════════════════════════════
//  MOON SVG GENERATOR
// ═══════════════════════════════════════════════════════════

function moonSVG(phase, size) {
  size = size || 11;
  const L = '#e8dfc8';
  const D = '#0b0d15';
  const O = 'rgba(210,200,178,0.28)';
  const r = (size / 2) - 0.7;
  const cx = size / 2, cy = size / 2;
  const top = cx + ',' + (cy - r);
  const bot = cx + ',' + (cy + r);
  const rx  = (r * 0.47).toFixed(2);
  const base = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+D+'" stroke="'+O+'" stroke-width="0.55"/>';

  if (phase === 0) {
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+base+'</svg>';
  }
  if (phase === 4) {
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
      +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+L+'" style="filter:drop-shadow(0 0 2px rgba(232,223,200,0.55))"/></svg>';
  }
  // Path table: [outerSweep, innerRx, innerSweep]
  // outer: 1=CW(right half), 0=CCW(left half)
  // inner: 0=CCW(concave→crescent), 1=CW(convex→gibbous)
  const configs = {
    1: [1, rx, 0],   // waxing crescent
    2: [1, null, 0], // first quarter
    3: [1, rx, 1],   // waxing gibbous
    5: [0, rx, 0],   // waning gibbous
    6: [0, null, 0], // last quarter
    7: [0, rx, 1],   // waning crescent
  };
  const [os, irx, is] = configs[phase];
  const outerArc = 'A'+r+','+r+' 0 0,'+os+' '+bot;
  const back = irx !== null
    ? 'A'+irx+','+r+' 0 0,'+is+' '+top
    : 'L'+top;
  const path = 'M'+top+' '+outerArc+' '+back+' Z';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +base+'<path d="'+path+'" fill="'+L+'"/></svg>';
}


// ═══════════════════════════════════════════════════════════
//  RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════

function renderHeader() {
  return `
    <div class="cal-header">
      <div class="cal-eyebrow">The Living World · Ardahlia</div>
      <div class="cal-title">The Ardahlian Calendar</div>
      <div class="cal-sub">12 months · 30 days each · 3 weeks of 10 · 360 days to the year</div>
    </div>`;
}

function renderControls() {
  const seasons = ['All','Winter','Spring','Summer','Autumn'];
  const btns = seasons.map(s => {
    const vars = s !== 'All'
      ? `style="--s-accent:${SEASONS[s].accent};--s-badge:${SEASONS[s].badge};--s-glow:${SEASONS[s].glow}"`
      : '';
    const active = s === 'All' ? ' active' : '';
    return `<button class="s-btn${active}" data-season="${s}" ${vars}>${s}</button>`;
  }).join('');
  return `<div class="controls"><span class="ctrl-label">Season</span>${btns}</div>`;
}

function renderWeekBanner() {
  const cells = WEEK.map((w, i) =>
    `<div class="wb-item"><div class="wb-n">${i+1}</div><div class="wb-d">${w}</div></div>`
  ).join('');
  return `<div class="week-banner">${cells}</div>`;
}

function renderLegend() {
  const domainItems = Object.entries(DOMAINS).map(([k, v]) =>
    `<div class="leg-item"><div class="leg-dot" style="background:${v.dot}"></div><span>${v.name}</span></div>`
  ).join('');
  const astroItem = `<div class="leg-item"><div class="leg-astro"></div><span>Solstice / Equinox</span></div>`;
  const divider = `<div class="leg-div"></div>`;

  // Moon legend — 4 key phases
  const moonItems = [0,2,4,6].map(p =>
    `<div class="leg-item">${moonSVG(p,11)}<span>${MOON_NAMES[p]}</span></div>`
  ).join('');
  const moonItemsAll = [1,3,5,7].map(p =>
    `<div class="leg-item">${moonSVG(p,11)}<span>${MOON_NAMES[p]}</span></div>`
  ).join('');

  return `
    <div class="legend-row">${domainItems}${divider}${astroItem}</div>
    <div class="moon-legend">
      <span class="ml-label">Moon</span>
      ${moonItems}${moonItemsAll}
    </div>`;
}

function renderDayCell(monthNum, day) {
  const fKey = `${monthNum}-${day}`;
  const festival  = FESTIVALS[fKey];
  const moonPhase = MOON_PHASE[day];
  const hasFest   = !!festival;
  const hasMoon   = moonPhase !== undefined;

  let classes = 'day-cell';
  if (hasFest)  classes += ' has-fest';
  if (hasMoon)  classes += ' has-moon';
  if (hasFest)  classes += ' clickable';

  let data = '';
  if (hasFest || hasMoon) data += ` data-month="${monthNum}" data-day="${day}"`;

  let bottom = '';
  if (hasFest || hasMoon) {
    let moonSpan = '';
    if (hasMoon) moonSpan = `<span class="dc-moon" title="${MOON_NAMES[moonPhase]}">${moonSVG(moonPhase, 11)}</span>`;

    let pipSpan = '';
    if (hasFest) {
      const d = DOMAINS[festival.domain];
      const isAstro = festival.astronomical;
      const glowStyle = isAstro ? `box-shadow:0 0 4px 1px ${d.dot}` : '';
      pipSpan = `<span class="dc-pip${isAstro?' astro':''}" style="background:${d.dot};${glowStyle}"></span>`;
    }
    bottom = `<div class="dc-bottom">${moonSpan}${pipSpan}</div>`;
  }

  return `<div class="${classes}"${data}><span class="dc-num">${day}</span>${bottom}</div>`;
}

function renderMonth(m) {
  const s = SEASONS[m.season];
  const glow = `radial-gradient(ellipse 90% 80% at 50% -10%, ${s.glow}, transparent)`;
  const borderGrad = `linear-gradient(to bottom, ${s.border}, rgba(255,255,255,0.03))`;

  const head = `
    <div class="mc-head" style="background:${glow}">
      <span class="mc-num">${String(m.num).padStart(2,'0')}</span>
      <div class="mc-info">
        <div class="mc-name">${m.name}</div>
        <div class="mc-tag">${m.tag}</div>
      </div>
      <div class="mc-badge" style="--s-badge:${s.badge};--s-accent:${s.accent}">${m.season}</div>
    </div>
    <div class="mc-lore">${m.lore}</div>`;

  const hdrRow = WEEK.map(w => `<div class="dg-hdr">${w.slice(0,3)}</div>`).join('');

  const rows = [0,1,2].map(row => {
    const cells = Array.from({length:10}, (_,col) => renderDayCell(m.num, row*10+col+1)).join('');
    return `<div class="dg-row">${cells}</div>`;
  }).join('');

  const grid = `<div class="day-grid"><div class="dg-hdr-row">${hdrRow}</div>${rows}</div>`;

  return `
    <div class="month-card" data-season="${m.season}"
      style="--s-accent:${s.accent};--s-badge:${s.badge};--s-border-grad:${borderGrad}">
      ${head}${grid}
    </div>`;
}

function renderAll() {
  const months = MONTHS.map(m => renderMonth(m)).join('');
  document.getElementById('app').innerHTML =
    renderHeader() +
    renderControls() +
    renderWeekBanner() +
    renderLegend() +
    `<div class="months-grid" id="months-grid">${months}</div>`;
}


// ═══════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════

function openModal(monthNum, day) {
  const fKey    = `${monthNum}-${day}`;
  const festival = FESTIVALS[fKey];
  if (!festival) return;

  const month   = MONTHS[monthNum - 1];
  const domain  = DOMAINS[festival.domain];
  const mPhase  = MOON_PHASE[day];

  const moonBadge = mPhase !== undefined
    ? `<div class="m-moon-badge">${moonSVG(mPhase, 13)} ${MOON_NAMES[mPhase]}</div>` : '';

  const astroBadge = festival.astronomical
    ? `<div class="m-astro-badge">✦ Astronomical Marker · Narven</div>` : '';

  // Special notes
  let note = '';
  if (NARVEN_COINCIDENCE[fKey]) {
    note = `<div class="m-narven-note">This is one of four days in the year where a solstice or equinox, the Full Moon, and Narven (market day) coincide exactly. The Council of Light considers this proof of divine design. The folk tradition considers it proof the calendar predates the Council.</div>`;
  } else if (fKey === '1-1') {
    note = `<div class="m-narven-note">The New Moon falls on New Year's Day — and always on Auren, the first day of the week. The folk calendar was not designed around this coincidence. It was noticed, and the noticing became part of the tradition.</div>`;
  } else if (fKey === '6-15') {
    note = `<div class="m-narven-note">The Festival of Silver Nights coincides with the Full Moon every year. Nymue's practitioners consider this the primary evidence that the folk calendar carries her fingerprint.</div>`;
  } else if (fKey === '12-15') {
    note = `<div class="m-narven-note">The Glowing Vigil coincides with the Full Moon — lanterns set afloat on the same night the moon is at its brightest. Whether the timing was chosen for the moon or the moon makes the timing feel inevitable is a question communities answer differently.</div>`;
  }

  document.getElementById('modal-body').innerHTML = `
    <div class="m-where">${month.name} · Day ${day}</div>
    <div class="m-name">${festival.name}</div>
    <div class="m-meta">
      <div class="m-domain" style="background:${domain.bg};border:1px solid ${domain.border};color:${domain.dot}">${domain.name}</div>
      <div class="m-deity">${festival.deity}</div>
      ${astroBadge}${moonBadge}
    </div>
    <div class="m-divider" style="background:linear-gradient(90deg,${domain.dot},transparent)"></div>
    <div class="m-desc">${festival.desc}</div>
    ${note}`;

  document.getElementById('modal-panel').style.setProperty('--m-accent', domain.dot);
  document.getElementById('modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
}


// ═══════════════════════════════════════════════════════════
//  TOOLTIP
// ═══════════════════════════════════════════════════════════

const tooltip   = document.getElementById('tooltip');
const ttInner   = document.getElementById('tt-inner');
let   ttTimeout = null;

function showTooltip(cell, x, y) {
  const mNum  = +cell.dataset.month;
  const day   = +cell.dataset.day;
  const fKey  = `${mNum}-${day}`;
  const fest  = FESTIVALS[fKey];
  const moon  = MOON_PHASE[day];

  let html = '';
  if (fest) html += `<div class="tt-fest">${fest.name}</div>`;
  if (moon !== undefined) html += `<div class="tt-moon">${moonSVG(moon, 10)} ${MOON_NAMES[moon]}</div>`;
  if (!html) return;

  ttInner.innerHTML = html;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = (y - 4) + 'px';
  tooltip.style.display = 'block';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}


// ═══════════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════════

document.addEventListener('click', function(e) {
  // Season filter
  const btn = e.target.closest('.s-btn');
  if (btn) {
    const season = btn.dataset.season;
    document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.month-card').forEach(card => {
      const show = season === 'All' || card.dataset.season === season;
      card.style.display = show ? '' : 'none';
    });
    return;
  }

  // Day cell with festival
  const cell = e.target.closest('.day-cell.clickable');
  if (cell) {
    hideTooltip();
    openModal(+cell.dataset.month, +cell.dataset.day);
    return;
  }

  // Modal backdrop
  if (e.target === document.getElementById('modal')) {
    closeModal();
    return;
  }
});

document.getElementById('modal-close').addEventListener('click', closeModal);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// Tooltip on mousemove
document.addEventListener('mouseover', function(e) {
  const cell = e.target.closest('.day-cell[data-month]');
  if (cell) {
    const rect = cell.getBoundingClientRect();
    showTooltip(cell, rect.left + rect.width / 2, rect.top);
  } else {
    hideTooltip();
  }
});
document.addEventListener('mouseout', function(e) {
  if (!e.target.closest('.day-cell[data-month]')) hideTooltip();
});

// Touch: hide tooltip on scroll
window.addEventListener('scroll', hideTooltip, true);


// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════

renderAll();
</script>
</body>
</html>
