<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Folk Worship Matrix — Ardahlia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:         #0a0c14;
  --surface:    #0f1219;
  --surface2:   #151920;
  --surface3:   #1a1f2b;
  --border:     rgba(168,128,80,0.10);
  --border-mid: rgba(168,128,80,0.22);
  --border-hi:  rgba(168,128,80,0.45);
  --gold:       #a88050;
  --gold-lt:    #c9a070;
  --txt:        #e8dcc8;
  --txt2:       #b8a880;
  --txt3:       #6a5a48;

  /* devotion type colours */
  --c-pri:   #c9a070;       /* gold  — primary */
  --c-pri-bg: rgba(201,160,112,0.22);
  --c-sec:   #4a7a9a;       /* steel — secondary */
  --c-sec-bg: rgba(74,122,154,0.18);
  --c-pro:   #a85860;       /* rose  — propitiation */
  --c-pro-bg: rgba(168,88,96,0.20);

  --font-d: 'Cinzel Decorative', Georgia, serif;
  --font-h: 'Cinzel', Georgia, serif;
  --font-b: 'Crimson Pro', Georgia, serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(60,90,140,0.35) 0%, transparent 100%),
    radial-gradient(ellipse 60% 50% at 100% 110%, rgba(120,60,40,0.20) 0%, transparent 100%);
  background-attachment: fixed;
  color: var(--txt);
  font-family: var(--font-b);
  font-size: 16px;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(circle, rgba(255,255,240,.85) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,255,240,.55) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,255,240,.40) 1px, transparent 1px);
  background-size: 400px 400px, 250px 250px, 170px 170px;
  background-position: 23px 47px, 130px 200px, 60px 310px;
  opacity: 0.18;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1060px;
  margin: 0 auto;
  padding: 0 1.5rem 2rem;
  transition: padding-bottom 0.3s;
}

/* ── header ── */
.hdr {
  text-align: center;
  padding: 2.8rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}
.hdr-orn {
  display: block;
  font-size: 11px;
  letter-spacing: 0.5em;
  color: var(--gold);
  opacity: 0.55;
  margin-bottom: 0.9rem;
}
.hdr-title {
  font-family: var(--font-d);
  font-size: clamp(1.5rem,3.5vw,2.4rem);
  font-weight: 700;
  color: var(--gold-lt);
  letter-spacing: 0.04em;
  line-height: 1.1;
  text-shadow: 0 0 50px rgba(210,160,60,0.28);
}
.hdr-sub {
  font-style: italic;
  color: var(--txt2);
  margin-top: 0.5rem;
  letter-spacing: 0.05em;
  font-size: 0.95rem;
}
.hdr-intro {
  max-width: 700px;
  margin: 1.2rem auto 0;
  font-size: 0.95rem;
  color: var(--txt2);
  line-height: 1.75;
}

/* ── legend ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem 1.6rem;
  margin-bottom: 1.5rem;
  padding: 0.9rem 1.1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  align-items: stretch;
}
.leg-item {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
}
.leg-swatch {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  margin-top: 1px;
}
.leg-swatch-p { background: var(--c-pri-bg); color: var(--c-pri); border: 1px solid rgba(184,138,40,0.35); }
.leg-swatch-s { background: var(--c-sec-bg); color: var(--c-sec); border: 1px solid rgba(70,128,190,0.35); }
.leg-swatch-x { background: var(--c-pro-bg); color: var(--c-pro); border: 1px solid rgba(180,80,96,0.35); }
.leg-text strong {
  font-family: var(--font-h);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  display: block;
  margin-bottom: 1px;
}
.leg-text span {
  font-size: 12px;
  color: var(--txt2);
  line-height: 1.4;
}
.leg-hint {
  margin-left: auto;
  font-size: 11.5px;
  font-style: italic;
  color: var(--txt3);
  align-self: center;
  white-space: nowrap;
}

/* ── table wrapper ── */
.tbl-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-b);
  min-width: 700px;
}

/* col-group header row */
.cg-row th {
  font-family: var(--font-h);
  font-size: 8.5px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--txt3);
  padding: 0 4px 5px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.cg-row .cg-name { text-align: left; }
.cg-row .cg-life { color: var(--gold); border-bottom-color: rgba(196,148,58,0.3); }
.cg-row .cg-occ  { color: #5a90c0;    border-bottom-color: rgba(70,128,190,0.3); border-left: 1px solid var(--border-mid); }

/* sub-header row */
.sh-row th {
  font-family: var(--font-h);
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--txt2);
  padding: 5px 4px 7px;
  text-align: center;
  border-bottom: 1px solid var(--border-mid);
  white-space: nowrap;
}
.sh-row .sh-name {
  text-align: left;
  padding-left: 0;
  font-size: 9px;
  color: var(--txt3);
  min-width: 130px;
}
.sh-row .sh-div { border-left: 1px solid var(--border-mid); }

/* data rows */
tbody tr {
  cursor: pointer;
  transition: background 0.12s;
}
tbody tr:hover { background: rgba(190,155,75,0.04); }
tbody tr.sel {
  background: rgba(190,155,75,0.08);
}
tbody tr.sel td.name-cell {
  border-left: 2px solid var(--gold);
  padding-left: 0px;
}
tbody tr.sel-pro td.name-cell {
  border-left: 2px solid var(--c-pro);
  padding-left: 0px;
}

tbody td {
  padding: 0;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  text-align: center;
  height: 34px;
}
tbody td.name-cell {
  text-align: left;
  padding: 6px 8px 6px 10px;
  height: auto;
}
tbody td.div-left { border-left: 1px solid var(--border-mid); }

/* name cell content */
.dname {
  font-family: var(--font-h);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--txt);
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.dname.italic {
  font-family: var(--font-b);
  font-style: italic;
  font-weight: 400;
  font-size: 13px;
  color: var(--txt2);
  letter-spacing: 0;
}
.dtag {
  display: inline-block;
  font-family: var(--font-h);
  font-size: 7.5px;
  letter-spacing: 0.1em;
  padding: 1px 5px;
  border-radius: 2px;
  margin-left: 5px;
  vertical-align: middle;
  border: 1px solid;
}
.dtag-pro {
  background: var(--c-pro-bg);
  color: var(--c-pro);
  border-color: rgba(180,80,96,0.35);
}

/* devotion cells */
.cell-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 34px;
  font-size: 13px;
}
.cell-p { background: var(--c-pri-bg); color: var(--c-pri); }
.cell-s { background: var(--c-sec-bg); color: var(--c-sec); }
.cell-x { background: var(--c-pro-bg); color: var(--c-pro); }
.cell-e { background: transparent; }

/* section divider */
.sec-divider td {
  padding: 0;
  border-bottom: none;
}
.sec-divider-inner {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 1rem 0 0.5rem;
}
.sec-divider-label {
  font-family: var(--font-h);
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--c-pro);
  white-space: nowrap;
}
.sec-divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(180,80,96,0.35), transparent);
}
.sec-divider-note {
  font-size: 11.5px;
  font-style: italic;
  color: var(--txt3);
}

/* ── detail panel ── */
.detail {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to bottom, #131628 0%, #0c0e1c 100%);
  border-top: 1px solid var(--border-mid);
  padding: 1rem 2rem 1.4rem;
  max-height: 240px;
  overflow-y: auto;
  z-index: 20;
  transform: translateY(0);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
}
.detail.hidden { transform: translateY(100%); }
.detail::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.4;
}
.dh {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  margin-bottom: 0.4rem;
}
.d-left {}
.d-name {
  font-family: var(--font-h);
  font-size: 16px;
  font-weight: 700;
  color: var(--gold-lt);
  letter-spacing: 0.03em;
}
.d-name.pro-name { color: #c06070; }
.d-type {
  font-size: 11.5px;
  font-style: italic;
  color: var(--txt3);
  margin-top: 2px;
  font-family: var(--font-b);
  letter-spacing: 0.04em;
}
.d-desc {
  font-size: 14px;
  line-height: 1.72;
  color: var(--txt2);
  font-family: var(--font-b);
  max-width: 900px;
}
.close-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--txt3);
  padding: 3px 10px;
  cursor: pointer;
  font-family: var(--font-h);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  flex-shrink: 0;
  transition: all .14s;
}
.close-btn:hover { border-color: var(--border-hi); color: var(--txt2); }

.orn {
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--txt3);
  padding: 2.5rem 0 1rem;
  border-top: 1px solid var(--border);
  margin-top: 1.5rem;
}


.back-nav {
  max-width: 1060px;
  margin: 0 auto 0.45rem;
  padding: 0.85rem 1.2rem 0;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-family: inherit;
  font-size: 0.78rem;
  line-height: 1.2;
  color: var(--color-text-secondary, var(--text-mid, var(--muted, inherit)));
  text-decoration: none;
  border: 1px solid var(--color-border-tertiary, var(--border, var(--border2, currentColor)));
  background: var(--color-background-primary, var(--surface, rgba(255,255,255,0.03)));
  border-radius: 999px;
  padding: 0.35rem 0.68rem;
  opacity: 0.92;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
}

.back-link:hover {
  opacity: 1;
  color: var(--color-text-primary, var(--text, inherit));
  background: var(--color-background-secondary, var(--surface2, rgba(255,255,255,0.07)));
}

.back-link:focus-visible {
  outline: 2px solid var(--color-text-info, var(--gold, var(--text-link, currentColor)));
  outline-offset: 2px;
}

@media (max-width: 760px) {
  .back-nav {
    padding: 0.7rem 0.8rem 0;
  }
}

<script type="text/babel">
const { useState } = React;

const LIFE = [
  { key:'birth', label:'Birth'    },
  { key:'youth', label:'Youth'    },

  { key:'wed',   label:'Marriage' },

];
const OCC = [
  { key:'farm',  label:'Farming'   },
  { key:'sea',   label:'Seafaring' },
  { key:'war',   label:'Warfare'   },
  { key:'craft', label:'Craft'     },
  { key:'trade', label:'Trade'     },
  { key:'heal',  label:'Healing'   },
];
const ALL_COLS = [...LIFE, ...OCC];

// p = primary, s = secondary, x = propitiation, '' = none
const WORSHIPPED = [
  {
    name:"Elaria",
    c:{birth:'p',youth:'p',adult:'s',wed:'p',ill:'s',death:'s',farm:'p',sea:'',war:'',craft:'',trade:'',heal:'s'},
    note:"The most universally present deity in folk life. Every household shrine begins with her. She governs the domestic cycle — birth, family, the tending of living things, and love that sustains rather than consumes. Farmers invoke her at planting; midwives invoke her at birth; communities invoke her at weddings. Her secondary presence at illness and death reflects the folk understanding that all of life's transitions are part of her cycle. In many regions she has absorbed the role of a hearth-and-family deity simply because no other god fills that need."
  },
  {
    name:"Charon",
    c:{birth:'s',youth:'',adult:'',wed:'',ill:'s',death:'p',farm:'',sea:'s',war:'',craft:'',trade:'',heal:'s'},
    note:"Folk practice treats Charon with respectful wariness rather than fear. He is present at birth — acknowledging the soul's crossing from wherever it came — and always at death. Sailors acknowledge him before every voyage as basic seamanship. The sick propitiate him by placing a coin outside the sickroom door: not to invite him, but to defer him. The folk gesture is explicit: This coin for you, ferryman. The rest later. He may be the most universally acknowledged deity in Ardahlia, if not the most prayed to."
  },
  {
    name:"Nalakei",
    c:{birth:'',youth:'s',adult:'s',wed:'p',ill:'',death:'',farm:'p',sea:'',war:'',craft:'',trade:'',heal:''},
    note:"Nalakei governs the joyful ends of the folk calendar — harvest festivals, weddings, communal feasts, the games of childhood, the relief after a hard season. Her worship is communal and almost always involves food and drink. She has essentially no private shrine culture because she has no interest in solitary prayer. The folk saying: Nalakei doesn't hear you when you're alone. She hears you when you laugh. In harvest communities she is second only to Elaria in folk importance."
  },
  {
    name:"Solariel",
    c:{birth:'',youth:'',adult:'s',wed:'',ill:'p',death:'',farm:'',sea:'',war:'',craft:'',trade:'',heal:'p'},
    note:"The primary deity of healing prayer across almost all cultures. When someone is ill, Solariel is addressed first — folk logic: she governs life and light, and illness is both a dimming of life and a retreat from light. Her rites are morning-facing. The sick are placed to catch first light through a window; prayers are timed to sunrise. The folk understanding is that her influence travels with the sun, so dawn prayers reach her most easily."
  },
  {
    name:"Zelos",
    c:{birth:'',youth:'',adult:'s',wed:'s',ill:'',death:'',farm:'',sea:'',war:'',craft:'',trade:'p',heal:''},
    note:"The merchant deity, the gambler's patron, and the god of any endeavour whose outcome is genuinely uncertain. His folk presence in trading culture is substantial — markets often have a small Zelos shrine near the entrance. Merchants toss a coin before significant transactions; the specific gesture is a flick that lets the coin fall where it will and is then deliberately left. You give the coin to fate. He is also acknowledged at weddings in many communities, because marriage is understood as the most important uncertain wager a person makes."
  },
  {
    name:"Zephyrion",
    c:{birth:'s',youth:'',adult:'',wed:'',ill:'',death:'s',farm:'',sea:'p',war:'',craft:'',trade:'',heal:''},
    note:"Among coastal and seafaring communities, Zephyrion is as present as Elaria is inland. He is addressed before every voyage, and keeping his rites is considered basic seamanship rather than religion. The folk relationship is notably transactional and non-personal — he is a force to be respected and correctly navigated, not a being to be loved. Coastal communities acknowledge him at significant life events too, because the sea touches everything in their world. He does not listen; he permits."
  },
  {
    name:"Arcturius",
    c:{birth:'',youth:'',adult:'s',wed:'',ill:'',death:'',farm:'',sea:'',war:'p',craft:'',trade:'',heal:''},
    note:"Arcturius has almost no folk presence outside military culture and knightly communities. Within those worlds, his presence is total. Young warriors make their coming-of-age dedication to him; soldiers invoke him before battle; military communities celebrate his festivals as the most important of the year. His folk rites tend toward endurance over prayer — the long vigil, the fast, the cold watch — because he honours those who persist rather than those who ask. In his communities, prayer without sacrifice is considered no prayer at all."
  },
  {
    name:"Thalara",
    c:{birth:'',youth:'',adult:'s',wed:'',ill:'',death:'',farm:'',sea:'',war:'',craft:'p',trade:'',heal:''},
    note:"Thalara's folk presence is strongest in dwarven communities but extends to craftspeople of all races. The workshop shrine is her domain — a small hammer or anvil symbol near the forge or workbench. Her rites are embedded in the craft process itself: a smith who skips the ritual cooling gesture, a carpenter who doesn't dedicate a new tool — these are understood as inviting poor work rather than divine punishment. The distinction is important: Thalara doesn't punish sloppiness. She simply isn't present when you need her."
  },
  {
    name:"Anarion",
    c:{birth:'',youth:'s',adult:'',wed:'',ill:'',death:'',farm:'s',sea:'',war:'s',craft:'',trade:'',heal:''},
    note:"Anarion's folk presence is strongest in rural, wilderness, and hunting communities. Children are understood to live in his domain — closer to animals, closer to nature, not yet shaped by civilisation's demands. Farmers invoke him for the land itself as a wild thing that must be coaxed. Hunters pray to him before setting out. He is almost never invoked in cities, where his domain feels distant and slightly alien. Folk tradition holds that Anarion doesn't hear prayers spoken indoors."
  },
  {
    name:"Nymue",
    c:{birth:'',youth:'',adult:'s',wed:'',ill:'',death:'',farm:'',sea:'',war:'',craft:'s',trade:'',heal:''},
    note:"Nymue has a specific but thin folk presence in scholarly, magical, and elven communities. The coming-of-age moment for young people entering arcane study often involves a Nymue rite — a moonlit vigil, a first casting performed under the full moon rather than by candlelight. She is the deity of the moment when someone crosses from ordinary to arcane, which is understood as irreversible. Her folk saying: You can unlearn a spell. You cannot unmake the person who learned it."
  },
  {
    name:"Aeonius",
    c:{birth:'',youth:'',adult:'s',wed:'',ill:'',death:'s',farm:'',sea:'',war:'',craft:'s',trade:'',heal:''},
    note:"Aeonius has thin but significant folk presence around times of ending and transition. He is addressed quietly at deathbeds — the dying are sometimes asked 'what do you remember?' as a rite of offering accumulated knowledge back to the cosmic record before the soul's thread closes. Scholars and timekeepers invoke him. His folk rites almost always involve stillness: the held breath, the stopped clock, the moment of complete silence before the ceremony begins. Folk saying: Aeonius doesn't move; everything else moves past him."
  },
  {
    name:"Lyriana",
    c:{birth:'',youth:'',adult:'s',wed:'',ill:'',death:'',farm:'',sea:'',war:'',craft:'s',trade:'',heal:''},
    note:"Lyriana's folk presence is primarily among artists, bards, and those for whom beauty is a vocation. The coming-of-age ceremony for a young artist often includes a Lyriana element — a first public performance, the completion of a first work. Her folk rites are performative rather than contemplative: you don't pray to Lyriana in silence. You pray through the act of making. The folk understanding is that she hears music, speech, and story more clearly than intention."
  },
];

const PROPITIATED = [
  {
    name:"Abaddon",
    c:{birth:'',youth:'',adult:'',wed:'',ill:'x',death:'',farm:'',sea:'',war:'x',craft:'',trade:'',heal:'x'},
    note:"Abaddon appears in folk practice as a force to be named before it names you. Experienced healers acknowledge that understanding pain is necessary to relieving it — some quietly recognise his domain as a professional reality, not a devotion. Soldiers acknowledge him before battle in a specific rite: they name their fear aloud to the ground. The folk logic: if you offer Abaddon your fear voluntarily, he has less use for what fear is supposed to do to you. Folk saying: Name your pain to Abaddon before he names it to you."
  },
  {
    name:"Ba'haal",
    c:{birth:'',youth:'',adult:'',wed:'',ill:'',death:'',farm:'',sea:'',war:'x',craft:'',trade:'',heal:''},
    note:"Ba'haal is propitiated before serious battle — not worshipped, but fed. The folk rite involves a small cut to the thumb and a press of blood against the earth or the weapon's pommel. The meaning is explicit: here is blood freely given; take this and find your hunger answered elsewhere. Soldiers who skip this rite are considered reckless by their peers, in the same way that a sailor who doesn't acknowledge Zephyrion before departure is considered naive. It is practical theology, not faith."
  },
  {
    name:"Nyx",
    c:{birth:'x',youth:'x',adult:'x',wed:'x',ill:'x',death:'x',farm:'x',sea:'x',war:'x',craft:'x',trade:'x',heal:'x'},
    note:"Nyx is acknowledged in almost every context as a background presence. She already knows your secrets; the folk custom is a small gesture of acknowledgment when speaking anything private or significant — a touch to the lips, a glance toward shadow, a slight lowering of the voice. You are not informing her. You are acknowledging that she already knows, which is considered basic courtesy toward an entity whose attention is permanent. Folk saying: Nyx doesn't need your secret. She already has it. But she notices when you forget that."
  },
  {
    name:"Astaroth",
    c:{birth:'',youth:'',adult:'',wed:'',ill:'',death:'',farm:'',sea:'',war:'',craft:'',trade:'x',heal:''},
    note:"Astaroth's folk presence in the merchant world reflects practical theology: his infernal contracts are understood to be absolutely binding, which makes him useful as a witness to oaths. Some merchants swear significant contracts 'in the hearing of the Arch-Devil' — not worshipping him, but invoking his attention as a cosmic guarantee of binding. This is considered dangerous and effective. Legal scholars debate whether it constitutes worship. Most merchants simply note that deals sworn this way don't break."
  },
];

const SYMBOLS = { p:'✦', s:'◉', x:'⊗', '':'' };

function Cell({ val, first }) {
  const cls = val ? `cell-${val}` : 'cell-e';
  return (
    <td className={first ? 'div-left' : ''}>
      <div className={`cell-inner ${cls}`}>
        {SYMBOLS[val] || ''}
      </div>
    </td>
  );
}

function DeityRow({ deity, propOnly, selected, onClick }) {
  const selCls = selected ? (propOnly ? 'sel-pro' : 'sel') : '';
  return (
    <tr className={selCls} onClick={onClick}>
      <td className="name-cell">
        <span className={`dname ${propOnly ? 'italic' : ''}`}>
          {deity.name}
        </span>
        {propOnly && <span className="dtag dtag-pro">propitiation</span>}
      </td>
      {LIFE.map(col => <Cell key={col.key} val={deity.c[col.key] || ''} first={false} />)}
      {OCC.map((col, i) => <Cell key={col.key} val={deity.c[col.key] || ''} first={i === 0} />)}
    </tr>
  );
}

function App() {
  const [sel, setSel] = useState(null);

  function pick(deity, propOnly) {
    if (sel?.name === deity.name) { setSel(null); return; }
    setSel({ ...deity, propOnly });
  }

  const panelOpen = !!sel;

  return (
    <div className="page" style={{ paddingBottom: panelOpen ? '270px' : '2rem' }}>

      <header className="hdr">
        <span className="hdr-orn">✦  ·  ✦  ·  ✦</span>
        <div className="hdr-title">Folk Worship of Ardahlia</div>
        <div className="hdr-sub">How ordinary people actually practise religion</div>
        <p className="hdr-intro">
          This matrix shows the folk layer of Ardahlian religion — not theology, but practice.
          What a farmer invokes at harvest, what a sailor does before departure, what a midwife whispers at a birth.
          Primary devotion means an active relationship with the deity; secondary means acknowledgment at the right moment;
          propitiation means the deity is appeased or warded, not adored. Click any row for folk practice notes.
        </p>
      </header>

      <div className="legend">
        <div className="leg-item">
          <div className="leg-swatch leg-swatch-p">{SYMBOLS.p}</div>
          <div className="leg-text">
            <strong>Primary Devotion</strong>
            <span>Active relationship — dedicated shrines, regular prayer, named rites</span>
          </div>
        </div>
        <div className="leg-item">
          <div className="leg-swatch leg-swatch-s">{SYMBOLS.s}</div>
          <div className="leg-text">
            <strong>Secondary Devotion</strong>
            <span>Acknowledged at relevant moments — folk gestures, passing invocations</span>
          </div>
        </div>
        <div className="leg-item">
          <div className="leg-swatch leg-swatch-x">{SYMBOLS.x}</div>
          <div className="leg-text">
            <strong>Propitiation</strong>
            <span>Appeased or warded — practical theology, not worship or love</span>
          </div>
        </div>
        <div className="leg-hint">↓ Click any row for notes</div>
      </div>

      <div className="tbl-wrap">
        <table>
          <thead>
            <tr className="cg-row">
              <th className="cg-name"></th>
              <th colSpan={6} className="cg-life">Life &amp; Ritual</th>
              <th colSpan={6} className="cg-occ">Vocation &amp; Labour</th>
            </tr>
            <tr className="sh-row">
              <th className="sh-name">Deity</th>
              {LIFE.map(c  => <th key={c.key}>{c.label}</th>)}
              {OCC.map((c,i) => <th key={c.key} className={i===0?'sh-div':''}>{c.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {WORSHIPPED.map(d => (
              <DeityRow key={d.name} deity={d} propOnly={false}
                selected={sel?.name === d.name}
                onClick={() => pick(d, false)} />
            ))}

            {/* Propitiation section divider */}
            <tr className="sec-divider">
              <td colSpan={13}>
                <div className="sec-divider-inner">
                  <span className="sec-divider-label">Propitiation &amp; Warding</span>
                  <span className="sec-divider-line" />
                  <span className="sec-divider-note">These deities are managed, not loved</span>
                </div>
              </td>
            </tr>

            {PROPITIATED.map(d => (
              <DeityRow key={d.name} deity={d} propOnly={true}
                selected={sel?.name === d.name}
                onClick={() => pick(d, true)} />
            ))}
          </tbody>
        </table>
      </div>

      <div className="orn">✦ · ✦ · ✦</div>

      {/* Detail panel */}
      <div className={`detail ${panelOpen ? '' : 'hidden'}`}>
        {sel && (
          <>
            <div className="dh">
              <div className="d-left">
                <div className={`d-name ${sel.propOnly ? 'pro-name' : ''}`}>{sel.name}</div>
                <div className="d-type">
                  {sel.propOnly
                    ? 'Propitiated — managed and warded, not worshipped'
                    : 'Worshipped — active folk devotion'}
                </div>
              </div>
              <button className="close-btn" onClick={() => setSel(null)}>✕ Close</button>
            </div>
            <p className="d-desc">{sel.note}</p>
          </>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
