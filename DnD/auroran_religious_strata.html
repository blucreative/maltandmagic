<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auroran Religious Strata</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,400&display=swap');

  :root {
    --bg:       #0a0c14;
    --surface:  #0f1219;
    --surface2: #151920;
    --border:   rgba(168,128,80,0.12);
    --text:     #d8cfb8;
    --text-dim: rgba(180,168,146,0.65);
    --text-faint: rgba(150,140,120,0.45);
    --empire-line: linear-gradient(90deg, transparent 0%, rgba(74,106,138,0.6) 25%, rgba(168,128,80,0.5) 55%, rgba(184,104,58,0.4) 80%, transparent 100%);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Palatino, Georgia, serif;
    min-height: 100vh;
    padding: 1.2rem;
  }

  .back-nav {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0.2rem 0 0.7rem;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-family: 'Cinzel', Palatino, serif;
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    line-height: 1.2;
    color: rgba(195,185,162,0.72);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.09);
    background: rgba(255,255,255,0.02);
    border-radius: 3px;
    padding: 5px 11px;
    transition: all 0.18s;
  }

  .back-link:hover {
    background: rgba(255,255,255,0.05);
    color: #ddd4bb;
  }

  .back-link:focus-visible {
    outline: 2px solid rgba(160,150,130,0.5);
    outline-offset: 2px;
  }

  .page {
    max-width: 1080px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .page-header {
    position: relative;
    text-align: center;
    padding: 42px 24px 28px;
    border-bottom: 1px solid var(--border);
    background:
      radial-gradient(ellipse 90% 65% at 50% -5%, rgba(60,90,140,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 55% 40% at 20% 0%,  rgba(168,128,80,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 45% 30% at 80% 0%,  rgba(184,104,58,0.06) 0%, transparent 55%);
    overflow: hidden;
  }

  .page-header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--empire-line);
  }

  .title {
    font-family: 'Cinzel', Palatino, serif;
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: 700;
    color: #e8dcc8;
    letter-spacing: 1.2px;
    text-shadow: 0 0 50px rgba(74,106,138,0.25);
    margin-bottom: 7px;
  }

  .sub {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.3px;
    margin-bottom: 14px;
  }

  .depth-label {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    font-family: 'Cinzel', Palatino, serif;
    font-size: 8.5px;
    color: var(--text-faint);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .depth-bar {
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg, #a88050 0%, rgba(74,106,138,0.6) 45%, rgba(168,128,80,0.5) 100%);
    box-shadow: 0 0 16px rgba(168,128,80,0.25);
  }

  .strata {
    display: flex;
    flex-direction: column;
    background: linear-gradient(to bottom, rgba(255,255,255,0.01), transparent);
  }

  .layer {
    border-top: 1px solid rgba(168,128,80,0.08);
  }

  .layer:first-child {
    border-top: 0;
  }

  .layer-header {
    width: 100%;
    border: 0;
    border-radius: 0;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    cursor: pointer;
    background: transparent;
    color: inherit;
    transition: background 0.15s;
  }

  .layer-header:hover {
    background: rgba(168,128,80,0.06);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(168,128,80,0.3);
  }

  .layer-title {
    flex: 1;
    font-family: 'Cinzel', Palatino, serif;
    font-size: 13px;
    letter-spacing: 0.35px;
    color: #e8dcc8;
  }

  .layer-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  .layer-chevron {
    font-size: 10px;
    color: rgba(205,194,170,0.6);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .layer.open .layer-chevron {
    transform: rotate(90deg);
  }

  .layer-body {
    padding: 0 18px 14px 34px;
    border-top: 1px solid rgba(168,128,80,0.06);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 9px 0 11px;
  }

  .tag {
    font-family: 'Cinzel', Palatino, serif;
    font-size: 9px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 2px;
    border: 1px solid rgba(168,128,80,0.12);
  }

  .tg-lum  { background: rgba(168,128,80,0.14); color: #c9a070; }
  .tg-folk { background: rgba(120,100,80,0.14); color: #a8907a; }
  .tg-prop { background: rgba(140,120,100,0.15); color: #b89878; }
  .tg-arc  { background: rgba(184,104,58,0.14); color: #d48050; }
  .tg-zel  { background: rgba(74,106,138,0.14); color: #8aacce; }
  .tg-nyx  { background: rgba(100,80,100,0.14); color: #b8a0c8; }

  .sect {
    margin-bottom: 10px;
  }

  .sect-label {
    font-family: 'Cinzel', Palatino, serif;
    font-size: 9px;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    color: rgba(170,160,138,0.62);
    margin-bottom: 3px;
  }

  .sect-text {
    font-size: 14.5px;
    color: rgba(205,194,170,0.92);
    line-height: 1.68;
  }

  .hook {
    margin-top: 9px;
    font-size: 12px;
    color: rgba(216,207,184,0.9);
    background: rgba(168,128,80,0.08);
    border-left: 2px solid rgba(168,128,80,0.42);
    border-radius: 0 4px 4px 0;
    padding: 8px 11px;
    line-height: 1.55;
  }

  .hint {
    border-top: 1px solid rgba(168,128,80,0.08);
    padding: 10px 18px 12px;
    color: var(--text-dim);
    font-size: 11px;
    font-style: italic;
  }

  @media (max-width: 760px) {
    body {
      padding: 0.8rem;
    }

    .back-nav {
      padding-bottom: 0.55rem;
    }

    .page-header,
    .layer-header,
    .layer-body,
    .hint {
      padding-left: 12px;
      padding-right: 12px;
    }

    .layer-body {
      padding-left: 24px;
    }

    .layer-sub {
      display: none;
    }

    .title {
      font-size: 1.22rem;
    }
  }

</style>

    <link rel='stylesheet' href='../assets/css/page-polish.css'>
</head>
<body class='theme-fantasy page-auroran-religious-strata'>
<nav class="back-nav" aria-label="Page navigation">

</nav>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const LAYERS = [
  {
    id: "l0",
    color: "#EF9F27",
    title: "The Imperial Family",
    sub: "Emperor · Empress · Blood heirs",
    tags: [{ cls: "tg-lum", text: "Luminastra - divine vessel" }],
    sections: [
      {
        label: "What they publicly profess",
        text: "The Imperial bloodline carries Luminastra's light. The Emperor does not pray to her - the Emperor embodies her will for the age. Coronation rites include the Radiance Rite, in which the aurora must appear in the sky at the moment of crowning. If it does not, the Council of Light interprets the weather. It has always been interpreted in favour of the heir."
      },
      {
        label: "What they actually believe",
        text: "Varies enormously by individual Emperor. Some are genuinely devout and feel the connection as a real pressure - an atmospheric sense that certain decisions are wrong, that certain moments carry weight. Others are entirely cynical and manage the spectacle with the Council as political partners. The dangerous ones are those who are neither: who believe sincerely in a Luminastra that tells them specifically what they want to hear."
      },
      {
        label: "Relationship with folk tradition",
        text: "Officially: none. The Imperial family does not propitiate lesser gods. Privately: the Imperial kitchens have had an Elaria threshold mark on the cook's door for three dynasties running. No one mentions it. No one removes it."
      }
    ],
    hook: "An heir who receives the divine connection more strongly than any Emperor in living memory - but whose claim to the throne is legally disputed. The aurora appeared at their birth. The Council of Light is having an argument it cannot have publicly."
  },
  {
    id: "l1",
    color: "#FAC775",
    title: "The Council of Light",
    sub: "High Seers · Doctrinal Interpreters · The real theological power",
    tags: [
      { cls: "tg-lum", text: "Luminastra - doctrine" },
      { cls: "tg-prop", text: "Other gods - managed" }
    ],
    sections: [
      {
        label: "Function",
        text: "The Council interprets Luminastra's will. Since Luminastra does not speak directly, this is an enormous power - they define what the divine means in every legal, political, and social context. They have ruled on succession, on war, on whether a treaty is theologically permissible. Their rulings are not infallible, but no mechanism exists to overrule them except the Emperor, and Emperors who overrule the Council tend to have turbulent reigns."
      },
      {
        label: "Relationship with folk tradition",
        text: "Sophisticated and largely cynical. The Council knows folk polytheism cannot be suppressed - every attempt in Imperial history produced martyrs and made the old practices more tenacious. Current policy is co-option: the harvest festival is now also the Yield of Luminastra's Bounty. The spring planting rites are blessed in Luminastra's name. The coin tossed at market is described as an offering to the divine light rather than to Zelos. The folk practices continue exactly as before. The labels change."
      },
      {
        label: "What they actually fear",
        text: "A cleric of Luminastra receiving direct divine communication that contradicts a Council ruling. This has happened twice in recorded Imperial history. Neither case ended well for anyone involved."
      }
    ],
    hook: "A Council member approaches the players privately - not officially. A Dawnsinger in a frontier province is performing miracles the Council cannot explain and did not sanction. They need it investigated without creating a saint."
  },
  {
    id: "l2",
    color: "#B5D4F4",
    title: "The Luminous Order",
    sub: "Elite guard · Spiritual enforcers · Paladins and senior clergy combined",
    tags: [
      { cls: "tg-lum", text: "Luminastra - oath" },
      { cls: "tg-arc", text: "Arcturius - practice" }
    ],
    sections: [
      {
        label: "The dual nature problem",
        text: "The Luminous Order is simultaneously the Empire's spiritual leadership and its elite military force. This creates a persistent theological tension that is never formally acknowledged: Luminastra governs light, life, and peace. Arcturius governs honourable war. Members of the Order swear to Luminastra. They fight by Arcturius's principles. The two are never in direct conflict - the Order fights in defence of light, which is Luminastra's mandate - but veterans of serious campaigns often speak of Luminastra in the present tense and Arcturius in the past tense. She is who they serve. He is who they are."
      },
      {
        label: "Relationship with folk tradition",
        text: "Inconsistent. Individual members range from rigidly doctrinal (folk propitiation of Ba'haal before battle is heresy and must be corrected) to quietly permissive (if a soldier needs to press his thumb to the earth before a charge, that is between him and whatever he believes in, and it is not the Order's business provided they also keep their oath to Luminastra). The Order's official position is the former. Its actual practice is heavily the latter."
      },
      {
        label: "What ordinary people see",
        text: "Gold and white armour. The aurora motif on every surface. A presence that is both protective and inspecting - they are the Empire's light, which means they both illuminate and expose. Communities with a Luminous Order garrison feel watched. They are not wrong."
      }
    ],
    hook: "An Order commander has been quietly permitting folk propitiation practices in her garrison town for years, because it keeps the peace and she's not sure she disagrees with the theology. The Council has noticed the town's unusually low incidence of religious complaints - which means its unusually high incidence of suppressed practices - and has sent an Inspector."
  },
  {
    id: "l3",
    color: "#97C459",
    title: "Dawnsingers",
    sub: "Common clergy · Parish priests of the Empire",
    tags: [
      { cls: "tg-lum", text: "Luminastra - vocation" },
      { cls: "tg-folk", text: "Folk traditions - tolerated" }
    ],
    sections: [
      {
        label: "The ground-level reality",
        text: "Dawnsingers are the face of the Luminastra faith that ordinary Aurorans interact with daily. They lead the dawn prayers at the local Luminous Spire or parish shrine. They bless births, officiate marriages, and speak at funerals. In doing all of these things, they constantly encounter folk tradition - because the people bringing their babies and their dead are also the people with Elaria's mark on their kitchen wall and a habit of glancing at the shadows when they say something private."
      },
      {
        label: "The theological compromise",
        text: "Most Dawnsingers work out a personal position somewhere between the Council's official doctrine and the reality of their parish. The official position: Luminastra encompasses all good things, so the folk acknowledgment of Elaria at planting is really an acknowledgment of Luminastra's life-giving aspect under a traditional name. This reframing allows the Dawnsinger to bless the planting rite without suppressing the folk practice, while technically maintaining doctrinal compliance. Everyone understands this is a fiction. It is a useful fiction that nobody has an interest in dismantling."
      },
      {
        label: "What they cannot tolerate",
        text: "Explicit propitiation of the dark gods. A family that quietly keeps an Elaria mark can be reframed. A family that leaves coins at the crossroads for Charon can be told they are honouring Luminastra's mercy. A household that performs the Ba'haal blood offering before a soldier's deployment cannot be reframed, and a Dawnsinger who looks the other way risks their position. Most Dawnsingers do look the other way. This is the knowledge they carry quietly."
      }
    ],
    hook: "A Dawnsinger has been performing a modified version of Charon's Laments of the River festival every Moradir, reframed as a Luminastra memorial rite. It works - the community's dead seem properly settled, the rite feels right to everyone who attends. She has no idea why. Charon has apparently decided co-option is acceptable provided the function is maintained."
  },
  {
    id: "l4",
    color: "#B4B2A9",
    title: "Urban Aurorans",
    sub: "Merchants · Craftspeople · City folk · The Empire's visible middle",
    tags: [
      { cls: "tg-lum", text: "Luminastra - public life" },
      { cls: "tg-zel", text: "Zelos - commercial life" },
      { cls: "tg-folk", text: "Elaria, Charon - private life" },
      { cls: "tg-nyx", text: "Nyx - acknowledged, never named" }
    ],
    sections: [
      {
        label: "The split life",
        text: "Urban Aurorans maintain two simultaneous religious identities without experiencing them as contradictory. In public - at the dawn prayer, at the market's Luminastra shrine, at the festival ceremonies the Order attends - they are Luminastra's people. In private - the kitchen mark, the coin tossed before a deal, the quiet acknowledgment at the bedroom threshold - they are their grandparents' people. The two identities do not interact. This is not hypocrisy; it is the natural adaptation of a folk religion to a state religion that is too large to fight and too useful to entirely abandon."
      },
      {
        label: "What Luminastra means to them",
        text: "The aurora. The Empire. The reassurance that the world has a structure that is basically benevolent. The festivals. The sense that being Auroran is being part of something larger than your city or trade. Luminastra is not someone they have a personal relationship with - she is the texture of the Empire itself, the gold in the architecture, the light at the top of the Spire. This is not nothing. It is simply different from what the Council means when it says devotion."
      },
      {
        label: "The Shimmerfen specificity",
        text: "In the capital, the Luminastra presence is heavier and more genuine. The Luminous Spire catches dawn light in ways that feel deliberately miraculous. The Imperial family's visible connection to the aurora - appearing at festivals, moving through public space with an atmospheric quality that is hard to explain - makes the state religion feel less theoretical. Shimmerfen is the one place in the Empire where the divide between public and private faith noticeably narrows, because the evidence for Luminastra's presence is visible to anyone who looks up."
      }
    ],
    hook: "A merchant guild in a major city has been conducting its significant contract signings in Astaroth's hearing - the folk propitiation practice of invoking the Arch-Devil as witness to ensure binding. The Council has discovered this. The guild argues it is a secular legal tradition, not worship. The Council disagrees. The contracts involved are worth enough that several Imperial officials have a stake in the outcome."
  },
  {
    id: "l5",
    color: "#5DCAA5",
    title: "Rural Aurorans",
    sub: "Farmers · Villagers · The Empire's invisible majority",
    tags: [
      { cls: "tg-folk", text: "Elaria - primary" },
      { cls: "tg-folk", text: "Nalakei - harvest and joy" },
      { cls: "tg-folk", text: "Charon - death" },
      { cls: "tg-lum", text: "Luminastra - the Empire" }
    ],
    sections: [
      {
        label: "The true shape of rural faith",
        text: "In the villages at the Empire's interior, Luminastra is real but abstract - the religion of officials, of tax assessors, of the Dawnsinger who arrives from the town once a month and says words over things that would have been fine without them. She is the Empire's god, and the Empire is a fact of life like weather: you arrange yourself around it. The gods that actually govern daily life - the ones with kitchen shrines and harvest prayers and coins tossed at crossroads - are Elaria and Nalakei and Charon. No one denies Luminastra. No one builds her a shrine next to the hearth."
      },
      {
        label: "The co-opted calendar in practice",
        text: "The Dawnsinger calls the spring festival the Blessing of Luminastra's Renewal. The village calls it the Greening. The Dawnsinger calls the harvest celebration Luminastra's Bounty. The village calls it Erathir's Yield. The ceremonies are identical except for the name used at the beginning and end. In between, it is simply the festival they have always held. The village considers this arrangement satisfactory. The Dawnsinger considers it a work in progress."
      },
      {
        label: "At the frontier edge",
        text: "In villages at the Empire's frontier - where the Luminous Order garrison is a day's ride away and the Dawnsinger visits quarterly - the Luminastra layer is almost entirely formal. People fly the aurora banner. They pay the temple tithe to whoever comes to collect it. They use the official calendar month names. And then, in all other respects, they practise the faith their grandparents practised, in the way their grandparents practised it, propitiation and all. The dark gods are acknowledged here with far less anxiety than in the cities, because there is no one to report it to who would care."
      }
    ],
    hook: "A frontier village has been practising an extended version of Midwinter's Watch that involves something older than the Luminastra faith - something the Dawnsinger doesn't recognise and the oldest villagers can't explain fully, only that it must be done and that the years it wasn't were bad ones. An Inspector has arrived to determine whether this constitutes heresy. The village is frightened. The players arrive in the middle of it."
  }
];

function Layer({ layer, isOpen, onToggle }) {
  return (
    <article className={"layer" + (isOpen ? " open" : "")}>
      <button className="layer-header" onClick={onToggle} aria-expanded={isOpen}>
        <span className="dot" style={{ background: layer.color }}></span>
        <span className="layer-title">{layer.title}</span>
        <span className="layer-sub">{layer.sub}</span>
        <span className="layer-chevron">▶</span>
      </button>
      {isOpen && (
        <div className="layer-body">
          <div className="tags">
            {layer.tags.map((tag, i) => (
              <span key={layer.id + "-tag-" + i} className={"tag " + tag.cls}>{tag.text}</span>
            ))}
          </div>
          {layer.sections.map((section, i) => (
            <div className="sect" key={layer.id + "-section-" + i}>
              <div className="sect-label">{section.label}</div>
              <div className="sect-text">{section.text}</div>
            </div>
          ))}
          <div className="hook"><strong>Hook:</strong> {layer.hook}</div>
        </div>
      )}
    </article>
  );
}

function App() {
  const [openIds, setOpenIds] = React.useState(new Set(["l0"]));

  const toggle = (id) => {
    setOpenIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) {
        next.delete(id);
      } else {
        next.add(id);
      }
      return next;
    });
  };

  return (
    <main className="page">
      <header className="page-header">
        <h1 className="title">Auroran Religious Strata</h1>
        <p className="sub">State doctrine, lived faith, and pressure points across the imperial social order</p>
        <div className="depth-label">
          <span>Imperial core - Luminastra total</span>
          <span>Imperial frontier - folk tradition dominant</span>
        </div>
        <div className="depth-bar"></div>
      </header>

      <section className="strata" aria-label="Religious layers">
        {LAYERS.map((layer) => (
          <Layer
            key={layer.id}
            layer={layer}
            isOpen={openIds.has(layer.id)}
            onToggle={() => toggle(layer.id)}
          />
        ))}
      </section>

      <footer className="hint">Tip: open multiple layers to compare doctrine and practice side by side.</footer>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
