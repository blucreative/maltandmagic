  <title>Campaign 2 — Epilogue Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #080e1a;
      --navy-mid: #0e1825;
      --navy-card: #111e30;
      --navy-border: #1c2e45;
      --gold: #c9a84c;
      --gold-dim: #8a6d2f;
      --gold-pale: #e8d5a0;
      --silver: #a8b8cc;
      --silver-dim: #5a6a7a;
      --text: #d4c9b8;
      --text-dim: #8a8070;
      --amber: #c97a2a;
      --rose: #9e4a5a;
      --teal: #3a8a7a;
      --violet: #7a5a9e;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--navy);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 18px;
      line-height: 1.75;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Starfield */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 12% 8%, rgba(201,168,76,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 34% 22%, rgba(200,200,220,0.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 56% 5%, rgba(201,168,76,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 15%, rgba(200,200,220,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 30%, rgba(201,168,76,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 8% 42%, rgba(200,200,220,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 25% 60%, rgba(201,168,76,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 38%, rgba(200,200,220,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 83% 55%, rgba(201,168,76,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 75%, rgba(200,200,220,0.25) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 19% 85%, rgba(201,168,76,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 90%, rgba(200,200,220,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 3% 70%, rgba(201,168,76,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 72%, rgba(200,200,220,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 50%, rgba(201,168,76,0.2) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 60vh;
      background: radial-gradient(ellipse, rgba(201,168,76,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 32px 100px;
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 64px;
    }

    .eclipse-icon {
      display: block;
      margin: 0 auto 28px;
      width: 64px;
      height: 64px;
      position: relative;
    }

    .eclipse-icon svg {
      width: 64px;
      height: 64px;
    }

    .campaign-label {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.4em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .page-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(22px, 4vw, 32px);
      color: var(--gold-pale);
      font-weight: 400;
      letter-spacing: 0.05em;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .page-subtitle {
      font-family: 'Crimson Pro', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--silver-dim);
      max-width: 520px;
      margin: 0 auto;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 40px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--navy-border), transparent);
    }

    .divider-gem {
      width: 6px;
      height: 6px;
      background: var(--gold-dim);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* General sections */
    .general-section {
      margin-bottom: 48px;
    }

    .section-heading {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--gold-dim), transparent);
    }

    .section-num {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px;
      color: var(--gold-dim);
      letter-spacing: 0.1em;
    }

    .prose p {
      margin-bottom: 16px;
      color: var(--text);
    }

    .prose p:last-child { margin-bottom: 0; }

    .prose em {
      color: var(--gold-pale);
      font-style: italic;
    }

    .prose strong {
      font-weight: 600;
      color: var(--gold-pale);
    }

    ul.prompt-list {
      list-style: none;
      padding: 0;
      margin: 16px 0;
    }

    ul.prompt-list li {
      padding: 6px 0 6px 20px;
      position: relative;
      color: var(--text);
      border-bottom: 1px solid rgba(28,46,69,0.4);
    }

    ul.prompt-list li:last-child { border-bottom: none; }

    ul.prompt-list li::before {
      content: '◆';
      position: absolute;
      left: 0;
      color: var(--gold-dim);
      font-size: 8px;
      top: 12px;
    }

    .callout {
      background: rgba(201,168,76,0.05);
      border-left: 2px solid var(--gold-dim);
      padding: 16px 20px;
      margin: 20px 0;
      border-radius: 0 4px 4px 0;
    }

    .callout p {
      font-style: italic;
      color: var(--gold-pale);
      margin: 0;
    }

    /* Characters header */
    .characters-header {
      text-align: center;
      margin: 56px 0 32px;
    }

    .characters-heading {
      font-family: 'Cinzel Decorative', serif;
      font-size: 16px;
      color: var(--gold-pale);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .characters-sub {
      font-size: 15px;
      font-style: italic;
      color: var(--silver-dim);
    }

    /* Character cards */
    .character-card {
      margin-bottom: 16px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--navy-border);
      background: var(--navy-card);
      transition: border-color 0.3s ease;
    }

    .character-card.open {
      border-color: var(--card-accent, var(--gold-dim));
      box-shadow: 0 0 24px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(201,168,76,0.04);
    }

    .card-trigger {
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      text-align: left;
      transition: background 0.2s ease;
    }

    .card-trigger:hover {
      background: rgba(201,168,76,0.04);
    }

    .card-sigil {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 14px;
      flex-shrink: 0;
      border: 1px solid;
      transition: box-shadow 0.3s ease;
    }

    .open .card-sigil {
      box-shadow: 0 0 12px var(--card-accent-glow, rgba(201,168,76,0.3));
    }

    .card-identity {
      flex: 1;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 3px;
    }

    .card-tagline {
      font-size: 14px;
      font-style: italic;
      color: var(--silver-dim);
      display: block;
    }

    .card-chevron {
      width: 20px;
      height: 20px;
      color: var(--silver-dim);
      flex-shrink: 0;
      transition: transform 0.35s ease, color 0.2s ease;
    }

    .open .card-chevron {
      transform: rotate(180deg);
      color: var(--gold);
    }

    .card-body {
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      max-height: 0;
      opacity: 0;
    }

    .card-body.open {
      max-height: 3000px;
      opacity: 1;
    }

    .card-inner {
      padding: 0 28px 32px;
      border-top: 1px solid var(--navy-border);
    }

    .card-lead {
      font-style: italic;
      color: var(--silver);
      margin: 24px 0 20px;
      font-size: 17px;
      line-height: 1.7;
      padding-left: 14px;
      border-left: 2px solid var(--card-accent, var(--gold-dim));
    }

    .card-section {
      margin-top: 28px;
    }

    .card-section-title {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--card-accent, var(--gold));
      margin-bottom: 12px;
      opacity: 0.85;
    }

    .card-section p {
      color: var(--text);
      margin-bottom: 14px;
      font-size: 17px;
    }

    .card-section p:last-child { margin-bottom: 0; }

    .reflection-box {
      margin-top: 28px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--navy-border);
      border-radius: 4px;
      padding: 18px 20px;
    }

    .reflection-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--silver-dim);
      margin-bottom: 10px;
      display: block;
    }

    .reflection-box p {
      font-style: italic;
      color: var(--silver);
      font-size: 16px;
      margin: 0;
    }

    /* Memorial styling for Edgious */
    .memorial-banner {
      text-align: center;
      padding: 14px 20px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--navy-border);
    }

    .memorial-tag {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--silver-dim);
    }

    /* Footer */
    .page-footer {
      text-align: center;
      margin-top: 72px;
      padding-top: 32px;
      border-top: 1px solid var(--navy-border);
    }

    .footer-text {
      font-style: italic;
      color: var(--text-dim);
      font-size: 16px;
    }

    .footer-gem {
      display: block;
      margin: 16px auto 0;
      width: 6px;
      height: 6px;
      background: var(--gold-dim);
      transform: rotate(45deg);
    }

    /* Practical section */
    .practical-card {
      background: rgba(201,168,76,0.04);
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      padding: 28px 32px;
      margin-top: 48px;
    }

    .practical-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .practical-list {
      list-style: none;
      counter-reset: practical;
    }

    .practical-list li {
      counter-increment: practical;
      padding: 10px 0 10px 36px;
      position: relative;
      border-bottom: 1px solid rgba(28,46,69,0.5);
      font-size: 17px;
    }

    .practical-list li:last-child { border-bottom: none; }

    .practical-list li::before {
      content: counter(practical);
      position: absolute;
      left: 0;
      top: 10px;
      width: 22px;
      height: 22px;
      background: var(--gold-dim);
      color: var(--navy);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    @media (max-width: 600px) {
      .page-wrap { padding: 40px 20px 80px; }
      .card-trigger { padding: 18px 20px; }
      .card-inner { padding: 0 20px 24px; }
      .practical-card { padding: 20px; }
    }
  </style>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CHARACTERS = [
      {
        id: "jewel",
        name: "Jewel",
        tagline: "She left to protect them. She never stopped.",
        sigil: "J",
        accent: "#c9a84c",
        accentGlow: "rgba(201,168,76,0.35)",
        lead: "Jewel's story began with shadows — with the question of why they came for her village, and the drive to make sure they never could again. Everything that followed grew from that root: the chase, Maeonora, the Triumvirate, the Mournweald. The campaign ends. The village still stands. What does that mean?",
        sections: [
          {
            title: "In the Immediate Aftermath",
            body: "When the threat is gone and the world is quiet again — what is the first thing Jewel thinks of? The village she left? The family she has been protecting from a distance all this time? Does she feel the pull to go back immediately, or does she need a moment to become someone who can walk through that door again after everything she has seen?"
          },
          {
            title: "The Shape of the Journey",
            body: "Jewel chased Maeonora believing she was the source of the danger. She was wrong — and then she wasn't, exactly. Maeonora's affinity for blood magic made her a target, and protecting her became protecting everyone else. What did it cost Jewel to discover that her certainty had been misplaced? And what did it make possible that her certainty could not have? Does she carry any guilt about how she saw Maeonora at first — and if so, how does she reckon with it now that it's over?"
          },
          {
            title: "In the Longer Term",
            body: "Does Jewel go home? And if she does — who is she when she gets there? The person who left and the person who returns are not the same. Is that a source of grief, or pride, or both? Does she build something there — something that makes the village safer, more able to protect itself? Or does the road feel more like home now than the place she started?\n\nMaeonora's memory is part of what Jewel carries forward — not as a target, but as someone she came to know truly. What does Jewel do with that?"
          },
          {
            title: "At the End of Their Days",
            body: "Where does Jewel die, and what does that look like? Is she at home, or still moving? Who is there? Did she keep her family safe? Did she build something that outlasts her?"
          }
        ],
        reflection: "Jewel's temptation was a world where Maeonora simply didn't die — where the ambiguity was erased and she was still there. Jewel walked away from that. What did walking away mean — and how does it shape the rest of their life?"
      },
      {
        id: "lex",
        name: "Lex",
        tagline: "The equation required your suffering",
        sigil: "L",
        accent: "#3a8a7a",
        accentGlow: "rgba(58,138,122,0.35)",
        lead: "You are a being pulled between two natures: the logic of Mechanus and the emotion of your Yuan-Ti blood. Your family was taken. Primus intervened. The equation required your suffering, and you became its instrument. That is the story of how Lex began. The campaign ends — so what does Lex become now that the equation is complete?",
        sections: [
          {
            title: "In the Immediate Aftermath",
            body: "Does the completion of this quest feel like resolution, or like the removal of the only structure that made sense of everything? What does Lex do when he is no longer needed by the grand design? The Mechanus part of him has been oriented toward purpose. The Yuan-Ti part has been oriented toward the people lost. Both of those orientations have now arrived somewhere. What does arrival feel like?"
          },
          {
            title: "In the Longer Term",
            body: "Does Lex find a way to hold both sides of himself — or does one finally win? Does he seek out what remains of his Yuan-Ti heritage, or does he find his peace in service to order? What does the rest of his life look like: deliberate and purposeful, or finally uncharted? Is there something he builds, or something he lays down?"
          },
          {
            title: "At the End of Their Days",
            body: "Where does Lex die, and how? Does it feel like the equation closing neatly — a designed ending — or does it come as a surprise, something outside the grand design? What is he at peace with, and what, if anything, remains unresolved? Does Primus mark his passing in any way?"
          }
        ],
        reflection: "Lex's temptation offered a world where the wound never happened — where the design required nothing of him. He rejected it. What does that rejection mean for how he understands his own life going forward? Purpose built from suffering is still purpose. Does he believe that?"
      },
      {
        id: "suri",
        name: "Suri",
        tagline: "The one who lives to see the new age",
        sigil: "S",
        accent: "#7a5a9e",
        accentGlow: "rgba(122,90,158,0.35)",
        lead: "You are an elf. The others will age. You will not — or not at the same pace. That is the truth running underneath everything else in your epilogue. You will watch the world that this campaign helped make possible unfold over a span of time your companions will never see.",
        sections: [
          {
            title: "In the Immediate Aftermath",
            body: "What is it like to stand on the other side of this with people you love, knowing — even if you don't say it — that the clock is different for you? Do you let yourself feel that? Or do you hold it at a distance for now, because the moment is too full for that particular truth to also be present in it?"
          },
          {
            title: "In the Longer Term",
            body: "What does Suri pursue in the years after? Does he stay close to the others for as long as he can, or does he find that proximity to the ending of things becomes its own kind of grief? Does he take on something — a purpose, a role, a cause — that carries the memory of this era forward into a world that will eventually forget?"
          },
          {
            title: "Into the New Age",
            body: "One by one, your closest allies will pass. The people who were part of the most defining chapter of your long life will become history — and then legend — and then, for most of the world, silence. What does Suri do with that? Does he grieve each one fully, or does he develop a different relationship with mortality over time? Does he become a keeper of the story — someone who remembers on behalf of those who can't? Or does he eventually move on and start again?\n\nWhat does Ardahlia look like to Suri a century after the restoration of Aelthas? He will see the world this party helped make possible. He will see what grows in the space that was cleared. Who is he by then?"
          }
        ],
        reflection: "Suri's temptation was the reframing of loss as accident — the suggestion that what was paid was not really a cost. He rejected that. Loss is real to him. How does that truth — held honestly — shape what it means to be the one who lives on?"
      },
      {
        id: "kavan",
        name: "Kavan",
        tagline: "The orphan who became a lord. The detective who became a father.",
        sigil: "K",
        accent: "#c97a2a",
        accentGlow: "rgba(201,122,42,0.35)",
        lead: "Kavan left the Planar Detective Agency before the finale — not in defeat, but in devotion. Mara Blackveil and their unborn child needed him more than the case did. That choice says everything about who he has become: a man who once had nothing and no one, who now has a title, a family, and something real to protect.",
        sections: [
          {
            title: "In the Immediate Aftermath",
            body: "Kavan wasn't in the Mournweald for the whole of it — he stepped away when it mattered most to him personally. What does he feel when word reaches him that it's over? Relief? A complicated guilt about not being there at the end? Or simply the quiet of a man who made the right call and knows it? Does he seek out the others, or wait for them to find him?"
          },
          {
            title: "A Life He Never Had",
            body: "Kavan grew up an orphan in Union City. He built a career, a reputation, a found family in the Agency — and then left it. Now, through Mara, he has something he never had as a child: legitimacy, belonging, a name that means something. He is effectively a lord. That is not a small thing for someone who started with nothing.\n\nHow does he carry that? Does it sit easily, or does the orphan from Union City feel like an imposter in the halls he now walks? Does he make a point of remembering where he came from — and does that shape how he leads, how he fathers, how he treats the people around him?"
          },
          {
            title: "The Shape of What Is Missing",
            body: "Kavan spent the majority of his adult life alongside Edgious. And now Edgious is gone — not lost, not estranged, but obliterated. Gone in the way that leaves no grave, no letter, no last words. Just absence.\n\nThe cruelest part is what that does to memory. Much of Kavan's adult life is now shadowed. Shared jokes with no one left to remember them. Cases that only half-exist in the telling. A version of himself that only Edgious knew. Something will always be missing — not just from his life, but from his sense of who he was.\n\nHow does he live with that? Does he talk about Edgious to Mara, to his child as they grow? Does he try to write it down before more of it fades? Or is there a grief too deep for words — one he simply carries, quietly, for the rest of his days?"
          },
          {
            title: "At the End of Their Days",
            body: "Kavan ends his story with more than he ever expected to have. A partner. A child. A title. A home. Does he die in that home, surrounded by what he built? Or does the road find him one last time? What does he leave behind — and does his child know the full story of who their father was before all of this?"
          }
        ],
        reflection: "Kavan chose family over the finale. That is not a lesser choice. What does it mean to him that the world was saved by people he loved, in a fight he wasn't there for?"
      },
      {
        id: "edgious",
        name: "Edgious",
        tagline: "He gave everything. He watches still.",
        sigil: "E",
        accent: "#9e4a5a",
        accentGlow: "rgba(158,74,90,0.35)",
        memorial: true,
        lead: "Edgious did not survive to the epilogue. He sacrificed his entire being to stop Clien the Void Lich — not in battle, not in a last stand, but in an act of total giving that left nothing of him to return to. His epilogue is not a life continued. It is a life witnessed.",
        sections: [
          {
            title: "What He Did, and What It Cost",
            body: "Think about what that sacrifice meant to your character in the moments immediately following. Not the spectacle of it — the weight of it. Edgious is gone. Not dead in the way a body falls. Gone in the way that some things simply stop existing in the world. Where does that land? What do you do with a grief that has no grave to visit, no name carved anywhere?"
          },
          {
            title: "A Different Kind of Epilogue",
            body: "Edgious exists now in a place between. From wherever the faithful go, he can observe. He can watch the people he fought alongside live out their lives — see how they carry what happened, see the world that his sacrifice helped make possible. He cannot reach through. He cannot speak. He can only witness.\n\nAs his player: what is that like? What does Edgious watch most closely? Is he at peace — or does the inability to interact cost him something even now? Who does he watch over, and what would he most want to say if he could?"
          },
          {
            title: "What He Left Behind",
            body: "How do the surviving characters mark what Edgious did? Is there a monument, a ritual, a tradition that carries his name forward? Or does his sacrifice live in something quieter — a decision someone makes differently because of him, a habit one of them keeps that was his, something they never say aloud but always remember?\n\nWhat does Edgious mean to Ardahlia? Does the world know what he did — or is he one of those heroes whose cost is invisible, whose name does not appear in the histories, but whose act is threaded through everything that follows?"
          }
        ],
        reflection: "The player of Edgious is welcome to voice what he sees from that in-between place — a moment during the epilogue, if they wish, where his perspective can be offered. Not as intervention. As witness. As one final look at the people he loved well enough to leave."
      }
    ];

    function CharacterCard({ character }) {
      const [open, setOpen] = useState(false);
      const bodyRef = useRef(null);

      const accent = character.accent;

      return (
        <div
          className={`character-card ${open ? 'open' : ''}`}
          style={{ '--card-accent': accent, '--card-accent-glow': character.accentGlow }}
        >
          {character.memorial && (
            <div className="memorial-banner">
              <span className="memorial-tag">◆ &nbsp; In Memoriam &nbsp; ◆</span>
            </div>
          )}

          <button
            className="card-trigger"
            onClick={() => setOpen(!open)}
            aria-expanded={open}
          >
            <div
              className="card-sigil"
              style={{
                background: `radial-gradient(circle at 30% 30%, ${accent}22, ${accent}08)`,
                borderColor: open ? accent : 'var(--navy-border)',
                color: accent
              }}
            >
              {character.sigil}
            </div>
            <div className="card-identity">
              <span className="card-name" style={{ color: open ? character.accent : 'var(--gold-pale)' }}>
                {character.name}
              </span>
            </div>
            <svg className="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>

          <div className={`card-body ${open ? 'open' : ''}`} ref={bodyRef}>
            <div className="card-inner">
              <p className="card-tagline" style={{ marginTop: '20px', marginBottom: '4px' }}>{character.tagline}</p>
              <p className="card-lead">{character.lead}</p>

              {character.sections.map((section, i) => (
                <div className="card-section" key={i}>
                  <div className="card-section-title">{section.title}</div>
                  {section.body.split('\n\n').map((para, j) => (
                    <p key={j}>{para}</p>
                  ))}
                </div>
              ))}

              {character.reflection && (
                <div className="reflection-box">
                  <span className="reflection-label">A Question to Sit With</span>
                  <p>{character.reflection}</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div className="page-wrap">
          {/* Header */}
          <header className="page-header">
            <div className="eclipse-icon">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="28" stroke="#8a6d2f" strokeWidth="1" fill="none" opacity="0.4"/>
                <circle cx="32" cy="32" r="18" fill="#080e1a" stroke="#c9a84c" strokeWidth="1"/>
                <circle cx="40" cy="26" r="14" fill="#080e1a"/>
                <circle cx="40" cy="26" r="13.5" stroke="#8a6d2f" strokeWidth="0.5" fill="none" opacity="0.5"/>
                {/* Corona rays */}
                {[0,45,90,135,180,225,270,315].map((deg, i) => {
                  const rad = (deg * Math.PI) / 180;
                  const x1 = 32 + Math.cos(rad) * 20;
                  const y1 = 32 + Math.sin(rad) * 20;
                  const x2 = 32 + Math.cos(rad) * 27;
                  const y2 = 32 + Math.sin(rad) * 27;
                  return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#c9a84c" strokeWidth="0.75" opacity="0.5"/>;
                })}
              </svg>
            </div>

            <p className="campaign-label">Ardahlia &nbsp;·&nbsp; Campaign II</p>
            <h1 className="page-title">Epilogue Guide</h1>
            <p className="page-subtitle">
              A guide to help you think through your character's ending — and what it means that they arrived here.
            </p>
          </header>

          {/* Part 0: Before You Plan */}
          <section className="general-section">
            <h2 className="section-heading">
              <span className="section-num">I</span>
              Before You Plan Anything
            </h2>
            <div className="prose">
              <p>Ask yourself these three questions first, before you think about scenes or details:</p>
              <ul className="prompt-list">
                <li>What was the wound, question, or drive that defined my character when this campaign began?</li>
                <li>What did they become through it — what did they gain, and what did they pay?</li>
                <li>What does that character <em>deserve</em> at the end? Not necessarily happiness. Something <em>true</em>.</li>
              </ul>
              <p>Your epilogue is the answer to those questions made visible. It doesn't have to be long. Sometimes the most powerful endings are small and specific. But it has to be honest.</p>
            </div>
          </section>

          <div className="divider"><div className="divider-line"/><div className="divider-gem"/><div className="divider-line"/></div>

          {/* Part 1: Immediate Aftermath */}
          <section className="general-section">
            <h2 className="section-heading">
              <span className="section-num">II</span>
              The Immediate Aftermath
            </h2>
            <div className="prose">
              <p>
                The restoration of Aelthas changes everything. The Shrouded Lord is not destroyed — he is <em>restored</em>, returned to himself. The Eclipse Codex is no longer driving toward an unmaking. The Mournweald begins to recede. The world did not end.
              </p>
              <p>But the party is still standing on the other side of something enormous. Before anything else, think about:</p>
              <ul className="prompt-list">
                <li><strong>Immediate reaction.</strong> When it's over and the threat is gone — what is your character's first feeling? Relief? Exhaustion? Grief? Numbness? Not every hero celebrates. What does yours do in the first breath of silence?</li>
                <li><strong>The party moment.</strong> What, if anything, do you want to happen between your character and the others before everyone goes their separate ways? This may be the last time all of you are in the same place together.</li>
                <li><strong>Where do they go first?</strong> Not forever — just first. Is there somewhere or someone they need to reach immediately? A loose thread that demands closing before anything else can begin?</li>
              </ul>
            </div>
          </section>

          <div className="divider"><div className="divider-line"/><div className="divider-gem"/><div className="divider-line"/></div>

          {/* Part 2: The Longer Arc */}
          <section className="general-section">
            <h2 className="section-heading">
              <span className="section-num">III</span>
              The Longer Arc
            </h2>
            <div className="prose">
              <p>
                These characters have lived at the edge of catastrophe for a long time. The absence of that pressure is its own kind of disruption. Once the dust settles, what does a life look like after saving the world?
              </p>
              <ul className="prompt-list">
                <li>Does your character <em>want</em> to rest — or do they struggle to stop moving?</li>
                <li>Do they return to something from before the campaign, or has that chapter closed entirely?</li>
                <li>What do they build, protect, pursue, or let go of in the years that follow?</li>
                <li>Is there a relationship — with a person, a place, an idea — that defines their later life?</li>
                <li>What do they pass on? A skill, a story, a belief, a name?</li>
              </ul>

              <div className="callout">
                <p>It's okay to grieve your character a little. That's part of closing something that mattered. Don't talk yourself out of the ending you actually want for them.</p>
              </div>
            </div>
          </section>

          <div className="divider"><div className="divider-line"/><div className="divider-gem"/><div className="divider-line"/></div>

          {/* Characters */}
          <div className="characters-header">
            <h2 className="characters-heading">Your Character</h2>
            <p className="characters-sub">Select your name below. These sections are yours.</p>
          </div>

          <div>
            {CHARACTERS.map(c => <CharacterCard key={c.id} character={c} />)}
          </div>

          {/* Practical section */}
          <div className="practical-card">
            <div className="practical-title">What to Bring to Your DM</div>
            <ol className="practical-list">
              <li>A short vision — even a sentence or two about what you imagine for your character's ending</li>
              <li>The emotional note you want to end on</li>
              <li>Any key people or places you want present or acknowledged</li>
              <li>Anything you'd like left open for potential One Shots</li>
            </ol>
          </div>

          {/* Footer */}
          <footer className="page-footer">
            <p className="footer-text">
              No wrong answers. Come with what's true to your character, and we'll make it land.
            </p>
            <span className="footer-gem"/>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
